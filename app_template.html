<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LPI Linux Essentials 010 — Guided Discovery Study</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a;--surface:#1a1a2e;--card:#16213e;--card2:#0f3460;
  --accent:#e94560;--accent2:#0ea5e9;--accent3:#8b5cf6;--green:#22c55e;--amber:#f59e0b;
  --text:#eaeaea;--muted:#94a3b8;--border:#2d3748;--radius:10px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.app{max-width:860px;margin:0 auto;padding:1rem}

/* Header */
.header{text-align:center;padding:1.5rem 0;margin-bottom:1rem}
.header h1{font-size:1.4rem;color:var(--accent2);letter-spacing:-0.5px}
.header p{color:var(--muted);font-size:0.82rem;margin-top:0.25rem}
.streak-badge{display:inline-flex;align-items:center;gap:0.3rem;background:var(--card);padding:0.3rem 0.8rem;border-radius:20px;font-size:0.8rem;margin-top:0.5rem;color:var(--amber)}

/* Navigation */
.nav{display:flex;gap:0.4rem;justify-content:center;margin-bottom:1.5rem;flex-wrap:wrap}
.nav button{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:0.55rem 1rem;border-radius:var(--radius);cursor:pointer;font-size:0.82rem;transition:all 0.2s}
.nav button:hover{color:var(--text);border-color:var(--accent2)}
.nav button.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}

/* Topic pills */
.pills{display:flex;gap:0.3rem;flex-wrap:wrap;justify-content:center;margin-bottom:1rem}
.pills button{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:0.3rem 0.7rem;border-radius:20px;cursor:pointer;font-size:0.75rem;transition:all 0.15s}
.pills button:hover,.pills button.active{color:var(--text);border-color:var(--accent2);background:var(--card2)}

/* Cards / Section list */
.grid{display:grid;gap:0.7rem}
.sec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.2rem;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.sec-card:hover{border-color:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(14,165,233,0.1)}
.sec-card h3{font-size:0.92rem;color:var(--accent2);font-weight:600}
.sec-card .meta{font-size:0.75rem;color:var(--muted);margin-top:0.25rem;display:flex;gap:0.8rem;align-items:center}
.sec-card .mastery{position:absolute;right:1rem;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700}
.mastery-0{border:2px solid var(--border);color:var(--muted)}
.mastery-1{border:2px solid var(--amber);color:var(--amber)}
.mastery-2{border:2px solid var(--accent2);color:var(--accent2)}
.mastery-3{border:2px solid var(--green);color:var(--green);background:rgba(34,197,94,0.1)}

/* Panel */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
.panel h2{font-size:1.05rem;color:var(--accent2);margin-bottom:0.8rem;font-weight:600}
.back-btn{background:none;border:none;color:var(--accent2);cursor:pointer;font-size:0.82rem;padding:0.3rem 0;margin-bottom:0.8rem;display:inline-flex;align-items:center;gap:0.3rem}
.back-btn:hover{text-decoration:underline}

/* Challenge Mode (Problem-First) */
.challenge{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
.challenge-label{display:inline-block;background:var(--accent);color:#fff;font-size:0.7rem;padding:0.2rem 0.6rem;border-radius:12px;margin-bottom:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.challenge-q{font-size:1rem;line-height:1.7;margin-bottom:1.2rem}
.challenge-hint{background:var(--surface);border-left:3px solid var(--amber);padding:0.8rem 1rem;border-radius:0 6px 6px 0;margin-bottom:1rem;font-size:0.85rem;color:var(--muted);display:none}
.challenge-hint.show{display:block}

/* Self-grading buttons */
.grade-btns{display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:1rem}
.grade-btn{padding:0.5rem 1.2rem;border-radius:6px;border:none;cursor:pointer;font-size:0.82rem;font-weight:600;transition:all 0.15s}
.grade-btn:hover{transform:scale(1.02)}
.grade-btn.wrong{background:#dc2626;color:#fff}
.grade-btn.hard{background:var(--amber);color:#000}
.grade-btn.good{background:var(--accent2);color:#fff}
.grade-btn.easy{background:var(--green);color:#fff}

/* Answer reveal */
.answer-section{margin-top:1rem;padding:1rem 1.2rem;background:var(--surface);border-radius:8px;border-left:3px solid var(--green);display:none;animation:fadeIn 0.3s}
.answer-section.show{display:block}
.reveal-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:0.6rem 1.5rem;border-radius:6px;cursor:pointer;font-size:0.85rem;transition:all 0.2s}
.reveal-btn:hover{border-color:var(--accent2)}

/* Reading mode */
.lesson-text{white-space:pre-wrap;font-size:0.88rem;line-height:1.8;color:var(--text);max-height:500px;overflow-y:auto;padding-right:0.5rem}
.lesson-text::-webkit-scrollbar{width:4px}
.lesson-text::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Flashcard */
.fc-container{perspective:1000px;margin:1.5rem auto;max-width:580px}
.fc{position:relative;width:100%;min-height:220px;cursor:pointer;transform-style:preserve-3d;transition:transform 0.4s}
.fc.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;padding:1.5rem 2rem;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.fc-front{background:linear-gradient(135deg,var(--card2),var(--card));border:1px solid var(--border)}
.fc-back{background:linear-gradient(135deg,#0c2d48,var(--card));border:1px solid var(--green);transform:rotateY(180deg)}
.fc-front h3{font-size:0.95rem;line-height:1.6}
.fc-back p{font-size:0.88rem;line-height:1.6;white-space:pre-wrap}
.fc-type{font-size:0.7rem;color:var(--muted);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.5px}
.fc-nav{display:flex;justify-content:center;align-items:center;gap:0.8rem;margin-top:1rem}
.fc-nav button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:0.45rem 0.9rem;border-radius:6px;cursor:pointer;font-size:0.8rem}
.fc-nav button:hover{border-color:var(--accent2)}
.fc-counter{color:var(--muted);font-size:0.8rem}
.fc-hint{color:var(--muted);font-size:0.75rem;text-align:center;margin-top:0.5rem}

/* Progress */
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:0.5rem 0}
.progress-fill{height:100%;border-radius:3px;transition:width 0.4s}
.pf-blue{background:var(--accent2)}
.pf-green{background:var(--green)}
.pf-amber{background:var(--amber)}
.stats{display:flex;gap:0.8rem;justify-content:center;flex-wrap:wrap;margin:1rem 0}
.stat{background:var(--card);padding:0.8rem 1.2rem;border-radius:8px;text-align:center;min-width:90px}
.stat .n{font-size:1.3rem;font-weight:700;color:var(--accent2)}
.stat .l{font-size:0.7rem;color:var(--muted);margin-top:0.15rem}

/* Difficulty badge */
.diff{display:inline-block;font-size:0.65rem;padding:0.15rem 0.5rem;border-radius:10px;text-transform:uppercase;font-weight:600;letter-spacing:0.3px}
.diff-basic{background:rgba(34,197,94,0.15);color:var(--green)}
.diff-intermediate{background:rgba(14,165,233,0.15);color:var(--accent2)}
.diff-advanced{background:rgba(139,92,246,0.15);color:var(--accent3)}

/* Tabs inside section */
.tabs{display:flex;gap:0.3rem;margin-bottom:1rem;border-bottom:1px solid var(--border);padding-bottom:0.5rem}
.tabs button{background:none;border:none;color:var(--muted);padding:0.4rem 0.8rem;cursor:pointer;font-size:0.82rem;border-radius:6px 6px 0 0;transition:all 0.15s}
.tabs button:hover{color:var(--text)}
.tabs button.active{color:var(--accent2);background:var(--card);font-weight:600}

/* Terminal */
.term-wrap{background:#0d1117;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.term-bar{background:#161b22;padding:0.4rem 0.8rem;display:flex;align-items:center;gap:0.5rem;border-bottom:1px solid var(--border)}
.term-dot{width:10px;height:10px;border-radius:50%}
.term-bar span{font-size:0.75rem;color:var(--muted);margin-left:auto}
.term-body{padding:0.8rem 1rem;font-family:'Cascadia Code','Fira Code','Courier New',monospace;font-size:0.82rem;min-height:320px;max-height:450px;overflow-y:auto}
.term-body::-webkit-scrollbar{width:4px}
.term-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.term-line{margin:0.1rem 0;white-space:pre-wrap;word-break:break-all}
.term-line .prompt{color:var(--green)}
.term-line .path{color:var(--accent2)}
.term-line .cmd{color:var(--text)}
.term-line .output{color:var(--muted)}
.term-line .error{color:var(--accent)}
.term-input-line{display:flex;align-items:center;margin-top:0.2rem}
.term-input-line .prompt{color:var(--green)}
.term-input-line .path{color:var(--accent2)}
.term-input{background:none;border:none;color:var(--text);font-family:inherit;font-size:inherit;flex:1;outline:none;margin-left:0.3rem;caret-color:var(--green)}
.term-tasks{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.2rem;margin-bottom:1rem}
.term-tasks h3{font-size:0.9rem;color:var(--accent2);margin-bottom:0.5rem}
.term-task{display:flex;align-items:flex-start;gap:0.5rem;padding:0.3rem 0;font-size:0.82rem}
.term-task .check{color:var(--green);min-width:16px}
.term-task .pending{color:var(--border);min-width:16px}
.term-task.done{color:var(--muted);text-decoration:line-through}

@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.app{padding:0.5rem}.panel{padding:1rem}.challenge{padding:1rem}}
</style>
</head>
<body>
<div class="app" id="root"></div>
<script>
// === DATA INJECTION POINT ===
const DATA = __STRUCTURED_DATA__;

const TOPICS = {
  '1': 'The Linux Community and a Career in Open Source',
  '2': 'Finding Your Way on a Linux System',
  '3': 'The Power of the Command Line',
  '4': 'The Linux Operating System',
  '5': 'Security and File Permissions'
};

// === STATE MANAGEMENT ===
const STORAGE_KEY = 'lpi_brilliant_v2';
let S = loadState();

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (saved && saved.version === 2) return saved;
  } catch(e) {}
  return defaultState();
}

function defaultState() {
  return {
    version: 2,
    mode: 'challenge',
    topicFilter: null,
    currentSection: null,
    sectionTab: 'challenge',
    // Spaced repetition data per card
    cards: {},  // cardId -> {interval, ease, due, reps, lapses}
    // Session tracking
    streak: 0,
    lastStudyDate: null,
    totalReviews: 0,
    sessionsCompleted: 0,
    // Section mastery
    mastery: {},  // secId -> {seen, correct, total, level}
    // Flashcard state
    fcIdx: 0,
    fcFlipped: false,
    fcFilter: 'due'
  };
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(S));
}

function updateStreak() {
  const today = new Date().toDateString();
  if (S.lastStudyDate !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    S.streak = (S.lastStudyDate === yesterday) ? S.streak + 1 : 1;
    S.lastStudyDate = today;
    save();
  }
}

// === SPACED REPETITION (SM-2 variant) ===
function getCardState(cardId) {
  if (!S.cards[cardId]) {
    S.cards[cardId] = { interval: 0, ease: 2.5, due: 0, reps: 0, lapses: 0 };
  }
  return S.cards[cardId];
}

function gradeCard(cardId, grade) {
  // grade: 0=wrong, 1=hard, 2=good, 3=easy
  const c = getCardState(cardId);
  const now = Date.now();
  
  if (grade === 0) {
    c.reps = 0;
    c.interval = 1;
    c.lapses++;
    c.ease = Math.max(1.3, c.ease - 0.2);
  } else {
    if (c.reps === 0) {
      c.interval = 1;
    } else if (c.reps === 1) {
      c.interval = 3;
    } else {
      c.interval = Math.round(c.interval * c.ease);
    }
    c.reps++;
    c.ease += (grade === 3) ? 0.15 : (grade === 1) ? -0.15 : 0;
    c.ease = Math.max(1.3, c.ease);
  }
  
  c.due = now + c.interval * 86400000; // ms
  S.totalReviews++;
  updateStreak();
  
  // Update mastery
  const secId = cardId.split('::')[0];
  if (!S.mastery[secId]) S.mastery[secId] = { seen: 0, correct: 0, total: 0, level: 0 };
  S.mastery[secId].seen++;
  S.mastery[secId].total++;
  if (grade >= 2) S.mastery[secId].correct++;
  S.mastery[secId].level = Math.min(3, Math.floor((S.mastery[secId].correct / Math.max(1, S.mastery[secId].total)) * 4));
  
  save();
}

function isDue(cardId) {
  const c = S.cards[cardId];
  if (!c) return true;
  return Date.now() >= c.due;
}

// === BUILD ALL CARDS ===
function buildAllCards() {
  const cards = [];
  for (const [secId, sec] of Object.entries(DATA)) {
    // Q&A pairs (highest priority - these are the exam-style questions)
    sec.qa_pairs.forEach((qa, i) => {
      cards.push({
        id: `${secId}::qa::${i}`,
        type: 'question',
        section: secId,
        topic: sec.topic_num,
        difficulty: qa.difficulty,
        front: qa.question,
        back: qa.answer,
        sectionTitle: sec.title
      });
    });
    // Commands
    sec.commands.forEach((cmd, i) => {
      if (cmd.command.length > 3 && cmd.context.length > 5) {
        cards.push({
          id: `${secId}::cmd::${i}`,
          type: 'command',
          section: secId,
          topic: sec.topic_num,
          difficulty: 'intermediate',
          front: `What does this command do?\n\n$ ${cmd.command}`,
          back: cmd.context,
          sectionTitle: sec.title
        });
      }
    });
    // Concepts (filter out low-quality ones)
    sec.concepts.forEach((c, i) => {
      if (c.term.length > 3 && c.term.length < 35 && !c.term.match(/^(There|This|But|On|The|It|A |An )/i)) {
        cards.push({
          id: `${secId}::concept::${i}`,
          type: 'concept',
          section: secId,
          topic: sec.topic_num,
          difficulty: 'basic',
          front: `What is: ${c.term}?`,
          back: c.definition,
          sectionTitle: sec.title
        });
      }
    });
  }
  return cards;
}

const ALL_CARDS = buildAllCards();

function getDueCards() {
  return ALL_CARDS.filter(c => isDue(c.id));
}

function getCardsBySection(secId) {
  return ALL_CARDS.filter(c => c.section === secId);
}

// === RENDERING ===
const $ = id => document.getElementById(id);
const root = document.getElementById('root');

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render() {
  let html = `
    <div class="header">
      <h1>🐧 LPI Linux Essentials 010</h1>
      <p>Guided Discovery Study — Version 1.6 Exam</p>
      ${S.streak > 0 ? `<div class="streak-badge">🔥 ${S.streak} day streak</div>` : ''}
    </div>
    <div class="nav" id="nav">
      <button data-m="challenge" class="${S.mode==='challenge'?'active':''}">⚡ Challenge</button>
      <button data-m="learn" class="${S.mode==='learn'?'active':''}">📖 Learn</button>
      <button data-m="terminal" class="${S.mode==='terminal'?'active':''}">💻 Terminal</button>
      <button data-m="flashcards" class="${S.mode==='flashcards'?'active':''}">🃏 Review</button>
      <button data-m="progress" class="${S.mode==='progress'?'active':''}">📊 Progress</button>
    </div>`;

  switch(S.mode) {
    case 'challenge': html += renderChallenge(); break;
    case 'learn': html += renderLearn(); break;
    case 'terminal': html += renderTerminal(); break;
    case 'flashcards': html += renderFlashcards(); break;
    case 'progress': html += renderProgress(); break;
  }
  root.innerHTML = html;
  bindEvents();
  if (S.mode === 'terminal') bindTerminalEvents();
}

function renderChallenge() {
  if (S.currentSection) return renderSectionChallenge();
  
  const due = getDueCards();
  let html = `<div class="panel" style="text-align:center;border-left:3px solid var(--accent)">
    <p style="font-size:0.85rem;color:var(--muted)">Problem-first learning: test yourself before reading the explanation.</p>
    <p style="margin-top:0.5rem;font-size:0.9rem"><strong style="color:var(--accent)">${due.length}</strong> cards due for review</p>
  </div>`;
  
  html += renderPills();
  html += `<div class="grid">`;
  for (const [id, sec] of Object.entries(DATA)) {
    if (S.topicFilter && sec.topic_num !== S.topicFilter) continue;
    const m = S.mastery[id] || { level: 0, seen: 0, total: 0 };
    const sectionDue = getCardsBySection(id).filter(c => isDue(c.id)).length;
    const totalCards = getCardsBySection(id).length;
    html += `<div class="sec-card" data-sec="${id}">
      <h3>${id} ${sec.title}</h3>
      <div class="meta">
        <span>Topic ${sec.topic_num}</span>
        <span>${sectionDue}/${totalCards} due</span>
        <span class="diff diff-${sectionDue > 5 ? 'advanced' : sectionDue > 0 ? 'intermediate' : 'basic'}">${sectionDue > 0 ? 'Practice' : 'Mastered'}</span>
      </div>
      <div class="mastery mastery-${m.level}">${['—','◔','◑','✓'][m.level]}</div>
    </div>`;
  }
  html += `</div>`;
  return html;
}

function renderSectionChallenge() {
  const sec = DATA[S.currentSection];
  const cards = getCardsBySection(S.currentSection).filter(c => isDue(c.id));
  const allCards = getCardsBySection(S.currentSection);
  
  if (cards.length === 0) {
    return `<button class="back-btn" data-back>← Back</button>
      <div class="panel" style="text-align:center">
        <h2>✓ All caught up!</h2>
        <p style="color:var(--muted);margin-top:0.5rem">All ${allCards.length} cards in this section are reviewed. Come back later for spaced repetition.</p>
      </div>`;
  }
  
  const card = cards[0];
  const cardState = getCardState(card.id);
  const isNew = cardState.reps === 0;
  
  let html = `<button class="back-btn" data-back>← Back</button>
    <div class="progress-bar"><div class="progress-fill pf-blue" style="width:${((allCards.length - cards.length) / allCards.length) * 100}%"></div></div>
    <div class="challenge">
      <span class="challenge-label">${isNew ? '🆕 New' : '🔄 Review'} — ${card.type}</span>
      <span class="diff diff-${card.difficulty}" style="margin-left:0.5rem">${card.difficulty}</span>
      <div class="challenge-q">${esc(card.front)}</div>
      <button class="reveal-btn" id="hintBtn" style="margin-right:0.5rem">💡 Hint</button>
      <button class="reveal-btn" id="revealBtn">Show Answer</button>
      <div class="challenge-hint" id="hintBox">${getHint(card)}</div>
      <div class="answer-section" id="answerBox">
        <p style="white-space:pre-wrap;font-size:0.88rem;line-height:1.7">${esc(card.back)}</p>
        <p style="margin-top:1rem;font-size:0.82rem;color:var(--muted)">How well did you know this?</p>
        <div class="grade-btns">
          <button class="grade-btn wrong" data-grade="0">❌ Wrong</button>
          <button class="grade-btn hard" data-grade="1">😓 Hard</button>
          <button class="grade-btn good" data-grade="2">👍 Good</button>
          <button class="grade-btn easy" data-grade="3">⚡ Easy</button>
        </div>
      </div>
    </div>
    <div style="text-align:center;color:var(--muted);font-size:0.75rem">${cards.length - 1} more cards remaining in this section</div>`;
  return html;
}

function getHint(card) {
  // Provide a contextual hint from the lesson
  const sec = DATA[card.section];
  if (!sec.explanations || sec.explanations.length === 0) {
    const summary = sec.summary || '';
    return esc(summary.substring(0, 200) + '...');
  }
  return esc(sec.explanations[0].substring(0, 250) + '...');
}

function renderLearn() {
  if (S.currentSection) return renderSectionLearn();
  
  let html = renderPills();
  html += `<div class="grid">`;
  for (const [id, sec] of Object.entries(DATA)) {
    if (S.topicFilter && sec.topic_num !== S.topicFilter) continue;
    const m = S.mastery[id] || { level: 0 };
    html += `<div class="sec-card" data-sec="${id}">
      <h3>${id} ${sec.title}</h3>
      <div class="meta"><span>Topic ${sec.topic_num}: ${sec.topic}</span></div>
      <div class="mastery mastery-${m.level}">${['—','◔','◑','✓'][m.level]}</div>
    </div>`;
  }
  html += `</div>`;
  return html;
}

function renderSectionLearn() {
  const sec = DATA[S.currentSection];
  const tab = S.sectionTab || 'lesson';
  
  let html = `<button class="back-btn" data-back>← Back</button>
    <div class="panel">
      <h2>${S.currentSection} — ${sec.title}</h2>
      <div class="tabs">
        <button data-tab="lesson" class="${tab==='lesson'?'active':''}">📖 Lesson</button>
        <button data-tab="concepts" class="${tab==='concepts'?'active':''}">💡 Key Concepts</button>
        <button data-tab="commands" class="${tab==='commands'?'active':''}">⌨️ Commands</button>
        <button data-tab="exercises" class="${tab==='exercises'?'active':''}">✍️ Exercises</button>
      </div>`;
  
  if (tab === 'lesson') {
    html += `<div class="lesson-text">${esc(sec.full_lesson || sec.lesson_excerpt)}</div>`;
  } else if (tab === 'concepts') {
    html += `<div style="display:grid;gap:0.6rem">`;
    sec.concepts.forEach(c => {
      if (c.term.length > 3 && c.term.length < 35 && !c.term.match(/^(There|This|But|On|The|It|A |An )/i)) {
        html += `<div style="background:var(--card);padding:0.8rem 1rem;border-radius:6px;border-left:3px solid var(--accent2)">
          <strong style="color:var(--accent2)">${esc(c.term)}</strong>
          <p style="font-size:0.85rem;margin-top:0.3rem;color:var(--muted)">${esc(c.definition)}</p>
        </div>`;
      }
    });
    if (sec.concepts.filter(c => c.term.length > 3 && c.term.length < 35 && !c.term.match(/^(There|This|But|On|The|It|A |An )/i)).length === 0) {
      html += `<p style="color:var(--muted)">See the lesson text for key concepts in this section.</p>`;
    }
    html += `</div>`;
  } else if (tab === 'commands') {
    if (sec.commands.length === 0) {
      html += `<p style="color:var(--muted)">No command-line examples in this section.</p>`;
    } else {
      html += `<div style="display:grid;gap:0.5rem">`;
      sec.commands.forEach(cmd => {
        html += `<div style="background:var(--card);padding:0.7rem 1rem;border-radius:6px;font-family:monospace">
          <code style="color:var(--green)">$ ${esc(cmd.command)}</code>
          <p style="font-size:0.8rem;color:var(--muted);margin-top:0.2rem">${esc(cmd.context)}</p>
        </div>`;
      });
      html += `</div>`;
    }
  } else if (tab === 'exercises') {
    sec.qa_pairs.forEach((qa, i) => {
      html += `<div style="margin-bottom:1.2rem;padding:1rem;background:var(--card);border-radius:6px">
        <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem">
          <strong style="color:var(--text)">Q${i+1}.</strong>
          <span class="diff diff-${qa.difficulty}">${qa.difficulty}</span>
        </div>
        <p style="font-size:0.88rem;white-space:pre-wrap;margin-bottom:0.8rem">${esc(qa.question)}</p>
        <button class="reveal-btn" onclick="this.nextElementSibling.classList.toggle('show');this.textContent=this.textContent==='Show Answer'?'Hide':'Show Answer'">Show Answer</button>
        <div class="answer-section"><p style="white-space:pre-wrap;font-size:0.85rem">${esc(qa.answer)}</p></div>
      </div>`;
    });
  }
  
  html += `</div>`;
  return html;
}

function renderFlashcards() {
  let filtered = ALL_CARDS;
  if (S.topicFilter) filtered = filtered.filter(c => c.topic === S.topicFilter);
  if (S.fcFilter === 'due') filtered = filtered.filter(c => isDue(c.id));
  
  let html = renderPills();
  html += `<div class="pills" style="margin-top:0.5rem">
    <button class="${S.fcFilter==='due'?'active':''}" data-filter="due">Due (${getDueCards().length})</button>
    <button class="${S.fcFilter==='all'?'active':''}" data-filter="all">All (${ALL_CARDS.length})</button>
    <button class="${S.fcFilter==='new'?'active':''}" data-filter="new">New</button>
  </div>`;
  
  if (filtered.length === 0) {
    html += `<div class="panel" style="text-align:center"><h2>🎉 All caught up!</h2><p style="color:var(--muted)">No cards due. Come back later or switch to "All" view.</p></div>`;
    return html;
  }
  
  const idx = S.fcIdx % filtered.length;
  const card = filtered[idx];
  
  html += `<div class="fc-container">
    <div class="fc ${S.fcFlipped ? 'flipped' : ''}" id="flashcard">
      <div class="fc-face fc-front">
        <span class="fc-type">${card.type} — ${card.sectionTitle}</span>
        <h3>${esc(card.front)}</h3>
      </div>
      <div class="fc-face fc-back">
        <span class="fc-type">Answer</span>
        <p>${esc(card.back)}</p>
      </div>
    </div>
  </div>
  <p class="fc-hint">Click to flip • Arrow keys to navigate • Space to flip</p>
  <div class="fc-nav">
    <button data-fc="prev">◀</button>
    <span class="fc-counter">${idx + 1} / ${filtered.length}</span>
    <button data-fc="next">▶</button>
    <button data-fc="shuffle">🔀</button>
  </div>`;
  
  if (S.fcFlipped) {
    html += `<div class="grade-btns" style="justify-content:center;margin-top:1rem">
      <button class="grade-btn wrong" data-grade="0" data-card="${card.id}">❌</button>
      <button class="grade-btn hard" data-grade="1" data-card="${card.id}">😓</button>
      <button class="grade-btn good" data-grade="2" data-card="${card.id}">👍</button>
      <button class="grade-btn easy" data-grade="3" data-card="${card.id}">⚡</button>
    </div>`;
  }
  return html;
}

function renderProgress() {
  const total = ALL_CARDS.length;
  const reviewed = Object.keys(S.cards).length;
  const mastered = Object.values(S.cards).filter(c => c.reps >= 3).length;
  const due = getDueCards().length;
  
  let html = `<div class="stats">
    <div class="stat"><div class="n">${S.totalReviews}</div><div class="l">Total Reviews</div></div>
    <div class="stat"><div class="n">${reviewed}</div><div class="l">Cards Seen</div></div>
    <div class="stat"><div class="n">${mastered}</div><div class="l">Mastered</div></div>
    <div class="stat"><div class="n">${due}</div><div class="l">Due Today</div></div>
    <div class="stat"><div class="n" style="color:var(--amber)">${S.streak}🔥</div><div class="l">Day Streak</div></div>
  </div>
  <div class="progress-bar" style="height:8px;margin:1rem 0"><div class="progress-fill pf-green" style="width:${(reviewed/total)*100}%"></div></div>
  <p style="text-align:center;color:var(--muted);font-size:0.8rem">${reviewed}/${total} cards studied (${Math.round((reviewed/total)*100)}%)</p>
  <div class="panel" style="margin-top:1rem"><h2>Mastery by Section</h2>`;
  
  for (const [num, name] of Object.entries(TOPICS)) {
    const secs = Object.entries(DATA).filter(([,s]) => s.topic_num === num);
    html += `<div style="margin:1rem 0 0.3rem"><strong style="color:var(--accent2);font-size:0.85rem">Topic ${num}: ${name}</strong></div>`;
    secs.forEach(([id, sec]) => {
      const m = S.mastery[id] || { level: 0, seen: 0, correct: 0, total: 0 };
      const cards = getCardsBySection(id);
      const pct = cards.length > 0 ? Math.round((cards.filter(c => !isDue(c.id)).length / cards.length) * 100) : 0;
      html += `<div style="display:flex;align-items:center;gap:0.5rem;margin:0.4rem 0;font-size:0.82rem">
        <span class="mastery mastery-${m.level}" style="position:static;transform:none;width:24px;height:24px;font-size:0.6rem">${['—','◔','◑','✓'][m.level]}</span>
        <span style="flex:1">${id} ${sec.title}</span>
        <span style="color:var(--muted);min-width:40px;text-align:right">${pct}%</span>
      </div>`;
    });
  }
  
  html += `<button onclick="if(confirm('Reset all progress?')){localStorage.removeItem('${STORAGE_KEY}');location.reload()}" style="margin-top:1.5rem;background:var(--accent);border:none;color:#fff;padding:0.5rem 1rem;border-radius:6px;cursor:pointer;font-size:0.8rem">Reset All Progress</button></div>`;
  return html;
}

function renderPills() {
  let html = `<div class="pills">
    <button class="${!S.topicFilter?'active':''}" data-topic="">All</button>`;
  for (const [num, name] of Object.entries(TOPICS)) {
    html += `<button class="${S.topicFilter===num?'active':''}" data-topic="${num}">T${num}</button>`;
  }
  html += `</div>`;
  return html;
}

// === EVENT HANDLING ===
function bindEvents() {
  // Nav
  document.querySelectorAll('[data-m]').forEach(btn => {
    btn.onclick = () => { S.mode = btn.dataset.m; S.currentSection = null; save(); render(); };
  });
  // Topic filter
  document.querySelectorAll('[data-topic]').forEach(btn => {
    btn.onclick = () => { S.topicFilter = btn.dataset.topic || null; S.fcIdx = 0; save(); render(); };
  });
  // Section cards
  document.querySelectorAll('[data-sec]').forEach(el => {
    el.onclick = () => { S.currentSection = el.dataset.sec; save(); render(); };
  });
  // Back
  document.querySelectorAll('[data-back]').forEach(el => {
    el.onclick = () => { S.currentSection = null; save(); render(); };
  });
  // Tabs
  document.querySelectorAll('[data-tab]').forEach(btn => {
    btn.onclick = () => { S.sectionTab = btn.dataset.tab; save(); render(); };
  });
  // Reveal answer in challenge
  const revealBtn = document.getElementById('revealBtn');
  if (revealBtn) revealBtn.onclick = () => document.getElementById('answerBox').classList.add('show');
  const hintBtn = document.getElementById('hintBtn');
  if (hintBtn) hintBtn.onclick = () => document.getElementById('hintBox').classList.toggle('show');
  // Grade buttons in challenge mode
  document.querySelectorAll('.grade-btn[data-grade]').forEach(btn => {
    btn.onclick = () => {
      const grade = parseInt(btn.dataset.grade);
      const cardId = btn.dataset.card;
      if (cardId) {
        // Flashcard mode grading
        gradeCard(cardId, grade);
        S.fcIdx++;
        S.fcFlipped = false;
      } else {
        // Challenge mode - grade first due card
        const cards = getCardsBySection(S.currentSection).filter(c => isDue(c.id));
        if (cards.length > 0) gradeCard(cards[0].id, grade);
      }
      save();
      render();
    };
  });
  // Flashcard interactions
  const fc = document.getElementById('flashcard');
  if (fc) fc.onclick = () => { S.fcFlipped = !S.fcFlipped; save(); render(); };
  document.querySelectorAll('[data-fc]').forEach(btn => {
    btn.onclick = () => {
      if (btn.dataset.fc === 'prev') S.fcIdx = Math.max(0, S.fcIdx - 1);
      else if (btn.dataset.fc === 'next') S.fcIdx++;
      else if (btn.dataset.fc === 'shuffle') S.fcIdx = Math.floor(Math.random() * ALL_CARDS.length);
      S.fcFlipped = false;
      save();
      render();
    };
  });
  // Filter buttons for flashcards
  document.querySelectorAll('[data-filter]').forEach(btn => {
    btn.onclick = () => {
      S.fcFilter = btn.dataset.filter;
      S.fcIdx = 0;
      S.fcFlipped = false;
      if (S.fcFilter === 'new') {
        // Show only unseen cards
      }
      save();
      render();
    };
  });
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (S.mode === 'flashcards') {
    if (e.key === 'ArrowRight') { S.fcIdx++; S.fcFlipped = false; save(); render(); }
    else if (e.key === 'ArrowLeft') { S.fcIdx = Math.max(0, S.fcIdx - 1); S.fcFlipped = false; save(); render(); }
    else if (e.key === ' ') { e.preventDefault(); S.fcFlipped = !S.fcFlipped; save(); render(); }
  }
  if (S.mode === 'challenge' && S.currentSection) {
    if (e.key === ' ') { e.preventDefault(); const ab = document.getElementById('answerBox'); if (ab) ab.classList.add('show'); }
  }
});

let termHistory = [];
let termHistIdx = -1;
let termOutput = [{ type: 'output', text: 'Welcome to the LPI Practice Terminal!\nType commands to complete the tasks. Type "help" for available commands.\nType "reset" to restart the current lab.\n' }];
let currentLab = null;
let labProgress = JSON.parse(localStorage.getItem('lpi_term_progress') || '{}');

function saveTermProgress() {
  localStorage.setItem('lpi_term_progress', JSON.stringify(labProgress));
}

function execCommand(input) {
  const cmd = input.trim();
  if (!cmd) return;
  termHistory.unshift(cmd);
  termHistIdx = -1;
  termOutput.push({ type: 'cmd', text: cmd });

  // Check lab task completion
  if (currentLab) {
    const lab = TERM_LABS.find(l => l.id === currentLab);
    if (lab) {
      const progress = labProgress[lab.id] || [];
      for (let i = 0; i < lab.tasks.length; i++) {
        if (!progress.includes(i) && lab.tasks[i].check(cmd)) {
          progress.push(i);
          labProgress[lab.id] = progress;
          saveTermProgress();
          termOutput.push({ type: 'success', text: `✓ Task completed: ${lab.tasks[i].desc}` });
          if (progress.length === lab.tasks.length) {
            termOutput.push({ type: 'success', text: '\n🎉 Lab complete! All tasks finished.' });
          }
          break;
        }
      }
    }
  }

  // Simulate command output
  const output = simulateCommand(cmd);
  if (output !== null) {
    termOutput.push({ type: output.startsWith('Error') || output.startsWith('bash:') ? 'error' : 'output', text: output });
  }
}

function simulateCommand(cmd) {
  const parts = cmd.split(/\s+/);
  const base = parts[0];

  switch(base) {
    case 'pwd': return VFS.cwd;
    case 'whoami': return VFS.user;
    case 'hostname': return 'linux-lab';
    case 'id': {
      if (parts[1] === '-un') return VFS.user;
      if (parts[1] === '-Gn') return 'student sudo users';
      return 'uid=1000(student) gid=1000(student) groups=1000(student),27(sudo),100(users)';
    }
    case 'who': return 'student  pts/0        2026-06-05 10:00 (:0)';
    case 'w': return ' 14:00:00 up 2 days,  3:42,  1 user\nUSER     TTY      FROM             LOGIN@   IDLE   JCPU   PCPU WHAT\nstudent  pts/0    :0               10:00    0.00s  0.10s  0.01s bash';
    case 'users': return 'student';
    case 'groups': return 'student sudo users';
    case 'date': return new Date().toString();
    case 'uname': return parts.includes('-a') ? 'Linux linux-lab 5.15.0-generic #1 SMP x86_64 GNU/Linux' : 'Linux';
    case 'echo': {
      let text = parts.slice(1).join(' ').replace(/^["']|["']$/g, '');
      // Variable substitution
      text = text.replace(/\$\{?(\w+)\}?/g, (_, v) => VFS.vars[v] || '');
      return text;
    }
    case 'cat': {
      const path = resolvePath(parts[1]);
      const file = VFS.files[path];
      if (!file) return `cat: ${parts[1]}: No such file or directory`;
      if (file.type === 'd') return `cat: ${parts[1]}: Is a directory`;
      return file.content || `[contents of ${parts[1]}]`;
    }
    case 'ls': {
      let target = VFS.cwd;
      let showAll = false, showLong = false, showHuman = false;
      for (let i = 1; i < parts.length; i++) {
        if (parts[i].startsWith('-')) {
          if (parts[i].includes('a')) showAll = true;
          if (parts[i].includes('l')) showLong = true;
          if (parts[i].includes('h')) showHuman = true;
        } else {
          target = resolvePath(parts[i]);
        }
      }
      const dir = VFS.files[target];
      if (!dir) return `ls: cannot access '${parts[parts.length-1]}': No such file or directory`;
      if (dir.type === 'f') {
        if (showLong) return `${dir.perms} 1 ${dir.owner} ${dir.group} ${dir.size} Jun  5 10:00 ${target.split('/').pop()}`;
        return target.split('/').pop();
      }
      let items = dir.children || [];
      if (showAll) items = ['.', '..', ...items];
      if (showLong) {
        return items.map(name => {
          if (name === '.' || name === '..') return `drwxr-xr-x 2 ${VFS.user} ${VFS.user} 4096 Jun  5 10:00 ${name}`;
          const fullPath = target + '/' + name;
          const f = VFS.files[fullPath];
          if (f) return `${f.perms} 1 ${f.owner} ${f.group} ${f.size || 4096} Jun  5 10:00 ${name}`;
          return `drwxr-xr-x 2 ${VFS.user} ${VFS.user} 4096 Jun  5 10:00 ${name}`;
        }).join('\n');
      }
      return items.join('  ');
    }
    case 'cd': {
      const target = parts[1] || VFS.home;
      const resolved = resolvePath(target === '~' ? VFS.home : target);
      const dir = VFS.files[resolved];
      if (!dir && !resolved.startsWith('/')) return `bash: cd: ${target}: No such file or directory`;
      VFS.cwd = resolved;
      return null;
    }
    case 'mkdir': {
      const name = parts[parts.length - 1];
      const path = resolvePath(name);
      VFS.files[path] = { type: 'd', children: [] };
      // Add to parent
      const parent = path.substring(0, path.lastIndexOf('/')) || '/';
      if (VFS.files[parent] && VFS.files[parent].children) VFS.files[parent].children.push(name);
      return null;
    }
    case 'touch': {
      const name = parts[1];
      const path = resolvePath(name);
      VFS.files[path] = { type: 'f', perms: '-rw-r--r--', owner: VFS.user, group: VFS.user, size: 0 };
      const parent = VFS.cwd;
      if (VFS.files[parent] && VFS.files[parent].children && !VFS.files[parent].children.includes(name)) {
        VFS.files[parent].children.push(name);
      }
      return null;
    }
    case 'cp': {
      const src = parts[1], dst = parts[parts.length - 1];
      const srcPath = resolvePath(src);
      if (!VFS.files[srcPath]) return `cp: cannot stat '${src}': No such file or directory`;
      const dstPath = resolvePath(dst);
      VFS.files[dstPath] = { ...VFS.files[srcPath] };
      const parent = VFS.cwd;
      if (VFS.files[parent] && VFS.files[parent].children) VFS.files[parent].children.push(dst);
      return null;
    }
    case 'mv': {
      const src = parts[1], dst = parts[2];
      const srcPath = resolvePath(src);
      if (!VFS.files[srcPath]) return `mv: cannot stat '${src}': No such file or directory`;
      const dstPath = resolvePath(dst);
      VFS.files[dstPath] = VFS.files[srcPath];
      delete VFS.files[srcPath];
      return null;
    }
    case 'rm': {
      const flags = parts.filter(p => p.startsWith('-')).join('');
      const target = parts.filter(p => !p.startsWith('-'))[1];
      if (!target) return 'rm: missing operand';
      const path = resolvePath(target);
      if (!VFS.files[path]) return `rm: cannot remove '${target}': No such file or directory`;
      delete VFS.files[path];
      return null;
    }
    case 'rmdir': {
      const target = parts[1];
      const path = resolvePath(target);
      if (!VFS.files[path]) return `rmdir: failed to remove '${target}': No such file or directory`;
      delete VFS.files[path];
      return null;
    }
    case 'chmod': return null;
    case 'chown': return null;
    case 'grep': {
      const pattern = parts[1]?.replace(/['"]/g, '');
      const file = parts[2];
      if (!file) return 'Usage: grep PATTERN FILE';
      const path = resolvePath(file);
      const f = VFS.files[path];
      if (!f) return `grep: ${file}: No such file or directory`;
      if (f.content) {
        return f.content.split('\n').filter(l => l.includes(pattern)).join('\n') || '';
      }
      return `[matching lines for "${pattern}" in ${file}]`;
    }
    case 'wc': {
      const file = parts[parts.length - 1];
      const path = resolvePath(file);
      const f = VFS.files[path];
      if (!f) return `wc: ${file}: No such file or directory`;
      if (f.content) {
        const lines = f.content.split('\n').length;
        const words = f.content.split(/\s+/).length;
        const chars = f.content.length;
        if (parts.includes('-l')) return `${lines} ${file}`;
        return `  ${lines}  ${words} ${chars} ${file}`;
      }
      if (parts.includes('-l')) return `5 ${file}`;
      return `  5  25 ${f.size || 100} ${file}`;
    }
    case 'head': {
      const nIdx = parts.indexOf('-n');
      const n = nIdx > -1 ? parseInt(parts[nIdx + 1]) : (parts[1]?.startsWith('-') ? parseInt(parts[1].slice(1)) : 10);
      const file = parts[parts.length - 1];
      const path = resolvePath(file);
      const f = VFS.files[path];
      if (!f) return `head: cannot open '${file}': No such file or directory`;
      if (f.content) return f.content.split('\n').slice(0, n).join('\n');
      return `[first ${n} lines of ${file}]`;
    }
    case 'tail': {
      const file = parts[parts.length - 1];
      return `[last 10 lines of ${file}]`;
    }
    case 'find': return `/etc/resolv.conf\n/etc/ssh/sshd_config\n/etc/fstab`;
    case 'tar': return null;
    case 'gzip': return null;
    case 'gunzip': return null;
    case 'man': return `[Manual page for ${parts[1] || '?'} - press q to exit]\n\nNAME\n    ${parts[1]} - ${getManDesc(parts[1])}\n\nSYNOPSIS\n    ${parts[1]} [OPTION]... [FILE]...\n\n(End)`;
    case 'type': {
      const c2 = parts[1];
      const builtins = ['cd', 'echo', 'exit', 'export', 'alias', 'type', 'source', 'history'];
      return builtins.includes(c2) ? `${c2} is a shell builtin` : `${c2} is /usr/bin/${c2}`;
    }
    case 'apropos': return `cp (1)               - copy files and directories\ncpio (1)             - copy files to and from archives`;
    case 'help': return 'Available commands: ls, cd, pwd, cat, cp, mv, rm, mkdir, rmdir, touch, chmod,\nchown, grep, find, wc, head, tail, tar, gzip, echo, man, type, apropos,\nwhoami, id, groups, who, ping, ifconfig, ip, dig, host, route, uname, date\n\nLab commands: hint, reset, labs';
    case 'hint': {
      if (currentLab) {
        const lab = TERM_LABS.find(l => l.id === currentLab);
        const progress = labProgress[lab.id] || [];
        const nextTask = lab.tasks.findIndex((_, i) => !progress.includes(i));
        if (nextTask >= 0) return `💡 Hint: ${lab.tasks[nextTask].hint}`;
        return 'All tasks complete!';
      }
      return 'Start a lab first. Type "labs" to see available labs.';
    }
    case 'reset': {
      if (currentLab) {
        labProgress[currentLab] = [];
        saveTermProgress();
        return 'Lab progress reset.';
      }
      return 'No active lab.';
    }
    case 'labs': return TERM_LABS.map((l, i) => {
      const done = (labProgress[l.id] || []).length;
      return `  ${i+1}. ${l.title} (${done}/${l.tasks.length})`;
    }).join('\n');
    case 'clear': { termOutput = []; return null; }
    case 'exit': return 'Use the navigation to leave the terminal.';
    case 'ifconfig': return 'eth0: flags=4163<UP,BROADCAST,RUNNING,MULTICAST>  mtu 1500\n        inet 192.168.1.100  netmask 255.255.255.0  broadcast 192.168.1.255\n        inet6 fe80::1  prefixlen 64  scopeid 0x20<link>';
    case 'ip': {
      if (parts[1] === 'addr' || parts[1] === 'a') return '2: eth0: <BROADCAST,MULTICAST,UP> mtu 1500\n    inet 192.168.1.100/24 brd 192.168.1.255 scope global eth0\n    inet6 fe80::1/64 scope link';
      if (parts[1] === 'route') return 'default via 192.168.1.1 dev eth0\n192.168.1.0/24 dev eth0 proto kernel scope link src 192.168.1.100';
      return `Usage: ip [ addr | route | link ]`;
    }
    case 'ping': return `PING google.com (142.250.80.46): 56 data bytes\n64 bytes from 142.250.80.46: icmp_seq=0 ttl=118 time=12.3 ms\n64 bytes from 142.250.80.46: icmp_seq=1 ttl=118 time=11.8 ms\n64 bytes from 142.250.80.46: icmp_seq=2 ttl=118 time=12.1 ms\n--- google.com ping statistics ---\n3 packets transmitted, 3 received, 0% packet loss`;
    case 'route': return 'Kernel IP routing table\nDestination     Gateway         Genmask         Flags Metric Ref    Use Iface\ndefault         192.168.1.1     0.0.0.0         UG    100    0        0 eth0\n192.168.1.0     0.0.0.0         255.255.255.0   U     100    0        0 eth0';
    case 'dig': return `;; ANSWER SECTION:\n${parts[1] || 'google.com'}.    300  IN  A  142.250.80.46`;
    case 'nslookup': return `Server:   192.168.1.1\nAddress:  192.168.1.1#53\n\nNon-authoritative answer:\nName: ${parts[1] || 'google.com'}\nAddress: 142.250.80.46`;
    case 'host': return `${parts[1] || 'google.com'} has address 142.250.80.46\n${parts[1] || 'google.com'} has IPv6 address 2607:f8b0:4004:800::200e`;
    case 'netstat': return 'Active Internet connections\nProto Recv-Q Send-Q Local Address           Foreign Address         State\ntcp        0      0 192.168.1.100:22        0.0.0.0:*               LISTEN';
    case 'printenv': return parts[1] ? (VFS.vars[parts[1]] || '') : Object.entries(VFS.vars).map(([k,v]) => `${k}=${v}`).join('\n');
    case 'env': return Object.entries(VFS.vars).map(([k,v]) => `${k}=${v}`).join('\n');
    case 'export': { const m = cmd.match(/export\s+(\w+)=(.*)/); if (m) VFS.vars[m[1]] = m[2].replace(/['"]/g, ''); return null; }
    case 'less': case 'more': return `[displaying ${parts[1]} - press q to exit]`;
    case 'stat': { const p = resolvePath(parts[1]); const f = VFS.files[p]; return f ? `  File: ${parts[1]}\n  Size: ${f.size||4096}\tBlocks: 8\t${f.type==='d'?'directory':'regular file'}\nAccess: (${f.perms||'0644/-rw-r--r--'})\tUid: ( ${f.owner==='root'?'0':'1000'}/${f.owner||VFS.user})\tGid: ( ${f.group==='root'?'0':'1000'}/${f.group||VFS.user})` : `stat: cannot stat '${parts[1]}': No such file or directory`; }
    default: {
      // Variable assignment
      const varMatch = cmd.match(/^(\w+)=(.*)$/);
      if (varMatch) { VFS.vars[varMatch[1]] = varMatch[2].replace(/['"]/g, ''); return null; }
      // Pipe handling
      if (cmd.includes('|')) return '[pipe output]';
      return `bash: ${base}: command not found`;
    }
  }
}

function resolvePath(p) {
  if (!p) return VFS.cwd;
  if (p.startsWith('~')) p = VFS.home + p.slice(1);
  if (p.startsWith('/')) return p.replace(/\/+$/, '') || '/';
  // Relative path
  let resolved = VFS.cwd + '/' + p;
  // Handle ..
  const parts = resolved.split('/').filter(Boolean);
  const stack = [];
  parts.forEach(part => { if (part === '..') stack.pop(); else if (part !== '.') stack.push(part); });
  return '/' + stack.join('/');
}

function getManDesc(cmd) {
  const descs = { ls:'list directory contents', cd:'change directory', cp:'copy files', mv:'move files', rm:'remove files', mkdir:'make directories', chmod:'change file mode bits', grep:'print lines matching a pattern', find:'search for files', tar:'archive utility', cat:'concatenate files', wc:'word count', head:'output first part of files', tail:'output last part of files', man:'manual pager', ping:'send ICMP packets', ip:'show routing and devices' };
  return descs[cmd] || 'command description';
}

function renderTerminal() {
  let html = '';
  
  if (!currentLab) {
    // Lab selection
    html += `<div class="panel"><h2>💻 Practice Terminal</h2>
      <p style="color:var(--muted);font-size:0.85rem;margin-bottom:1rem">Hands-on labs to practice Linux commands. Complete tasks in the simulated terminal below.</p>
      <div class="grid">`;
    TERM_LABS.forEach(lab => {
      const done = (labProgress[lab.id] || []).length;
      const total = lab.tasks.length;
      const pct = Math.round((done / total) * 100);
      html += `<div class="sec-card" data-lab="${lab.id}">
        <h3>${lab.title}</h3>
        <div class="meta"><span>Section ${lab.section}</span><span>${done}/${total} tasks</span></div>
        <div class="mastery mastery-${done===total?3:done>0?1:0}">${done===total?'✓':done>0?'◔':'—'}</div>
      </div>`;
    });
    html += `</div></div>`;
  } else {
    const lab = TERM_LABS.find(l => l.id === currentLab);
    const progress = labProgress[lab.id] || [];
    
    // Task list
    html += `<button class="back-btn" data-termback>← Back to Labs</button>
      <div class="term-tasks"><h3>📋 ${lab.title}</h3>`;
    lab.tasks.forEach((task, i) => {
      const done = progress.includes(i);
      html += `<div class="term-task ${done?'done':''}"><span class="${done?'check':'pending'}">${done?'✓':'○'}</span><span>${task.desc}</span></div>`;
    });
    html += `</div>`;
    
    // Terminal
    html += `<div class="term-wrap"><div class="term-bar">
      <div class="term-dot" style="background:#ff5f57"></div>
      <div class="term-dot" style="background:#febc2e"></div>
      <div class="term-dot" style="background:#28c840"></div>
      <span>student@linux-lab: ${VFS.cwd}</span>
    </div><div class="term-body" id="termBody">`;
    
    termOutput.forEach(line => {
      if (line.type === 'cmd') {
        html += `<div class="term-line"><span class="prompt">student@linux-lab</span>:<span class="path">${VFS.cwd}</span>$ <span class="cmd">${esc(line.text)}</span></div>`;
      } else if (line.type === 'error') {
        html += `<div class="term-line"><span class="error">${esc(line.text)}</span></div>`;
      } else if (line.type === 'success') {
        html += `<div class="term-line"><span style="color:var(--green)">${esc(line.text)}</span></div>`;
      } else {
        html += `<div class="term-line"><span class="output">${esc(line.text)}</span></div>`;
      }
    });
    
    html += `<div class="term-input-line"><span class="prompt">student@linux-lab</span>:<span class="path">${VFS.cwd}</span>$ <input class="term-input" id="termInput" type="text" autofocus spellcheck="false" autocomplete="off"></div>`;
    html += `</div></div>`;
    html += `<p style="color:var(--muted);font-size:0.75rem;margin-top:0.5rem;text-align:center">Type "hint" for help • "reset" to restart • "clear" to clear screen</p>`;
  }
  return html;
}

// Terminal-specific event binding (called after render)
function bindTerminalEvents() {
  const input = document.getElementById('termInput');
  if (input) {
    input.focus();
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        execCommand(input.value);
        render();
        setTimeout(() => {
          const newInput = document.getElementById('termInput');
          if (newInput) { newInput.focus(); }
          const body = document.getElementById('termBody');
          if (body) body.scrollTop = body.scrollHeight;
        }, 10);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (termHistIdx < termHistory.length - 1) {
          termHistIdx++;
          input.value = termHistory[termHistIdx];
        }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (termHistIdx > 0) {
          termHistIdx--;
          input.value = termHistory[termHistIdx];
        } else {
          termHistIdx = -1;
          input.value = '';
        }
      } else if (e.key === 'Tab') {
        e.preventDefault();
        // Basic tab completion
        const val = input.value;
        const cmds = ['ls','cd','pwd','cat','cp','mv','rm','mkdir','rmdir','touch','chmod','grep','find','wc','head','tail','tar','gzip','echo','man','type','whoami','id','groups','ping','ifconfig','clear','hint','reset','labs'];
        const match = cmds.filter(c => c.startsWith(val));
        if (match.length === 1) input.value = match[0] + ' ';
      }
    });
  }
  // Lab selection
  document.querySelectorAll('[data-lab]').forEach(el => {
    el.onclick = () => { currentLab = el.dataset.lab; termOutput = [{ type: 'output', text: `Lab: ${TERM_LABS.find(l=>l.id===currentLab).title}\nComplete the tasks listed above. Type "hint" if you get stuck.\n` }]; render(); };
  });
  document.querySelectorAll('[data-termback]').forEach(el => {
    el.onclick = () => { currentLab = null; render(); };
  });
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (S.mode === 'terminal') return; // Terminal handles its own keys
  if (S.mode === 'flashcards') {
    if (e.key === 'ArrowRight') { S.fcIdx++; S.fcFlipped = false; save(); render(); }
    else if (e.key === 'ArrowLeft') { S.fcIdx = Math.max(0, S.fcIdx - 1); S.fcFlipped = false; save(); render(); }
    else if (e.key === ' ') { e.preventDefault(); S.fcFlipped = !S.fcFlipped; save(); render(); }
  }
  if (S.mode === 'challenge' && S.currentSection) {
    if (e.key === ' ') { e.preventDefault(); const ab = document.getElementById('answerBox'); if (ab) ab.classList.add('show'); }
  }
});

// Initial render
updateStreak();
render();
</script>
