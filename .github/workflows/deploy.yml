name: Deploy to GitHub Pages

on:
  push:
    branches: [master, feat/react-restructure]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lpi-app/package-lock.json
      - run: npm ci
        working-directory: lpi-app
      - run: npm run build
        working-directory: lpi-app
      - uses: actions/upload-pages-artifact@v3
        with:
          path: lpi-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
