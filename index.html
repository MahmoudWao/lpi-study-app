        break;
      }
    }
  }
  const output=simulateCommand(cmd);
  if(output!==null)termOutput.push({type:output.startsWith('bash:')?'error':'output',text:output});
}

function simulateCommand(cmd){
  const parts=cmd.split(/\s+/),base=parts[0];
  switch(base){
    case'pwd':return VFS.cwd;
    case'whoami':return VFS.user;
    case'hostname':return'linux-lab';
    case'id':return parts[1]==='-un'?VFS.user:parts[1]==='-Gn'?'student sudo users':'uid=1000(student) gid=1000(student) groups=1000(student),27(sudo)';
    case'who':return'student  pts/0  2026-06-05 10:00';
    case'w':return' 14:00 up 2 days, 1 user\nUSER  TTY   FROM  LOGIN@  WHAT\nstudent pts/0 :0    10:00   bash';
    case'users':return'student';
    case'groups':return'student sudo users';
    case'date':return new Date().toString();
    case'uname':return parts.includes('-a')?'Linux linux-lab 5.15.0 x86_64 GNU/Linux':'Linux';
    case'echo':{let t=parts.slice(1).join(' ').replace(/^["']|["']$/g,'');t=t.replace(/\$\{?(\w+)\}?/g,(_,v)=>VFS.vars[v]||'');return t}
    case'cat':{const p=resolvePath(parts[1]),f=VFS.files[p];if(!f)return`cat: ${parts[1]}: No such file or directory`;if(f.type==='d')return`cat: ${parts[1]}: Is a directory`;return f.content||`[contents of ${parts[1]}]`}
    case'ls':{let target=VFS.cwd,showAll=false,showLong=false;for(let i=1;i<parts.length;i++){if(parts[i].startsWith('-')){if(parts[i].includes('a'))showAll=true;if(parts[i].includes('l'))showLong=true}else target=resolvePath(parts[i])}const dir=VFS.files[target];if(!dir)return`ls: cannot access '${parts[parts.length-1]}': No such file or directory`;if(dir.type==='f'){return showLong?`${dir.perms} 1 ${dir.owner} ${dir.group} ${dir.size} Jun 5 10:00 ${target.split('/').pop()}`:target.split('/').pop()}let items=dir.children||[];if(showAll)items=['.','..', ...items];if(showLong)return items.map(n=>{if(n==='.'||n==='..')return`drwxr-xr-x 2 student student 4096 Jun 5 10:00 ${n}`;const fp=target+'/'+n,f=VFS.files[fp];return f?`${f.perms} 1 ${f.owner} ${f.group} ${f.size||4096} Jun 5 10:00 ${n}`:`drwxr-xr-x 2 student student 4096 Jun 5 10:00 ${n}`}).join('\n');return items.join('  ')}
    case'cd':{const t=parts[1]||VFS.home;VFS.cwd=resolvePath(t==='~'?VFS.home:t);return null}
    case'mkdir':{const n=parts[parts.length-1],p=resolvePath(n);VFS.files[p]={type:'d',children:[]};const par=VFS.cwd;if(VFS.files[par]&&VFS.files[par].children)VFS.files[par].children.push(n);return null}
    case'touch':{const n=parts[1],p=resolvePath(n);VFS.files[p]={type:'f',perms:'-rw-r--r--',owner:VFS.user,group:VFS.user,size:0};const par=VFS.cwd;if(VFS.files[par]&&VFS.files[par].children&&!VFS.files[par].children.includes(n))VFS.files[par].children.push(n);return null}
    case'cp':{const s=parts[1],d=parts[2];const sp=resolvePath(s);if(!VFS.files[sp])return`cp: cannot stat '${s}': No such file or directory`;VFS.files[resolvePath(d)]={...VFS.files[sp]};return null}
    case'mv':{const s=parts[1],d=parts[2];const sp=resolvePath(s);if(!VFS.files[sp])return`mv: cannot stat '${s}': No such file or directory`;VFS.files[resolvePath(d)]=VFS.files[sp];delete VFS.files[sp];return null}
    case'rm':{const target=parts.filter(p=>!p.startsWith('-'))[1];if(!target)return'rm: missing operand';const p=resolvePath(target);if(!VFS.files[p])return`rm: cannot remove '${target}': No such file or directory`;delete VFS.files[p];return null}
    case'rmdir':{const p=resolvePath(parts[1]);delete VFS.files[p];return null}
    case'chmod':case'chown':return null;
    case'grep':{const pat=parts[1]?.replace(/['"]/g,''),file=parts[2];if(!file)return'Usage: grep PATTERN FILE';const p=resolvePath(file),f=VFS.files[p];if(!f)return`grep: ${file}: No such file or directory`;return f.content?f.content.split('\n').filter(l=>l.includes(pat)).join('\n'):`[matches for "${pat}"]`}
    case'wc':{const file=parts[parts.length-1],p=resolvePath(file),f=VFS.files[p];if(!f)return`wc: ${file}: No such file or directory`;if(f.content){const l=f.content.split('\n').length;return parts.includes('-l')?`${l} ${file}`:`  ${l}  ${f.content.split(/\s+/).length} ${f.content.length} ${file}`}return parts.includes('-l')?`5 ${file}`:`  5  25 100 ${file}`}
    case'head':{const n=parts.indexOf('-n')>-1?parseInt(parts[parts.indexOf('-n')+1]):parts[1]?.startsWith('-')?parseInt(parts[1].slice(1)):10;const file=parts[parts.length-1],p=resolvePath(file),f=VFS.files[p];if(!f)return`head: cannot open '${file}'`;return f.content?f.content.split('\n').slice(0,n).join('\n'):`[first ${n} lines]`}
    case'tail':return`[last 10 lines of ${parts[parts.length-1]}]`;
    case'find':return'/etc/resolv.conf\n/etc/ssh/sshd_config';
    case'tar':case'gzip':case'gunzip':return null;
    case'man':return`NAME\n    ${parts[1]} - manual page\n\nSYNOPSIS\n    ${parts[1]} [OPTION]... [FILE]...\n\n(press q to exit)`;
    case'type':{const builtins=['cd','echo','exit','export','type'];return builtins.includes(parts[1])?`${parts[1]} is a shell builtin`:`${parts[1]} is /usr/bin/${parts[1]}`}
    case'apropos':return'cp (1) - copy files and directories';
    case'help':return'Commands: ls cd pwd cat cp mv rm mkdir rmdir touch chmod grep find\nwc head tail tar gzip echo man type whoami id groups ping ip\n\nLab: hint, reset, labs, clear';
    case'hint':{if(!currentLab)return'Start a lab first.';const lab=TERM_LABS.find(l=>l.id===currentLab),pr=labProgress[lab.id]||[];const next=lab.tasks.findIndex((_,i)=>!pr.includes(i));return next>=0?`💡 ${lab.tasks[next].hint}`:'All done!'}
    case'reset':{if(currentLab){labProgress[currentLab]=[];saveTermProgress();return'Lab reset.'}return'No active lab.'}
    case'labs':return TERM_LABS.map((l,i)=>`${i+1}. ${l.title} (${(labProgress[l.id]||[]).length}/${l.tasks.length})`).join('\n');
    case'clear':termOutput=[];return null;
    case'ifconfig':return'eth0: inet 192.168.1.100  netmask 255.255.255.0';
    case'ip':if(parts[1]==='addr'||parts[1]==='a')return'2: eth0: inet 192.168.1.100/24';if(parts[1]==='route')return'default via 192.168.1.1 dev eth0\n192.168.1.0/24 dev eth0';return'Usage: ip [addr|route]';
    case'ping':return'PING google.com (142.250.80.46)\n64 bytes: icmp_seq=1 ttl=118 time=12ms\n64 bytes: icmp_seq=2 ttl=118 time=11ms\n64 bytes: icmp_seq=3 ttl=118 time=12ms\n--- 3 packets, 0% loss';
    case'route':return'default  192.168.1.1  UG  eth0\n192.168.1.0/24  *  U  eth0';
    case'dig':return`;; ANSWER:\n${parts[1]||'google.com'}. 300 IN A 142.250.80.46`;
    case'nslookup':return`Name: ${parts[1]||'google.com'}\nAddress: 142.250.80.46`;
    case'host':return`${parts[1]||'google.com'} has address 142.250.80.46`;
    case'netstat':return'tcp 0 0 192.168.1.100:22 0.0.0.0:* LISTEN';
    case'printenv':return parts[1]?(VFS.vars[parts[1]]||''):Object.entries(VFS.vars).map(([k,v])=>`${k}=${v}`).join('\n');
    case'env':return Object.entries(VFS.vars).map(([k,v])=>`${k}=${v}`).join('\n');
    case'export':{const m=cmd.match(/export\s+(\w+)=(.*)/);if(m)VFS.vars[m[1]]=m[2].replace(/['"]/g,'');return null}
    case'stat':{const p=resolvePath(parts[1]),f=VFS.files[p];return f?`File: ${parts[1]}\nSize: ${f.size||4096}\nAccess: ${f.perms||'0644'}\nOwner: ${f.owner||VFS.user}`:`stat: cannot stat '${parts[1]}'`}
    default:{const vm=cmd.match(/^(\w+)=(.*)$/);if(vm){VFS.vars[vm[1]]=vm[2].replace(/['"]/g,'');return null}if(cmd.includes('|'))return'[pipe output]';return`bash: ${base}: command not found`}
  }
}
function resolvePath(p){if(!p)return VFS.cwd;if(p.startsWith('~'))p=VFS.home+p.slice(1);if(p.startsWith('/'))return p.replace(/\/+$/,'')||'/';const parts=(VFS.cwd+'/'+p).split('/').filter(Boolean),stack=[];parts.forEach(x=>{if(x==='..')stack.pop();else if(x!=='.')stack.push(x)});return'/'+stack.join('/')}

function renderTerminal(){
  if(!currentLab){
    let html=`<div style="text-align:center;margin-bottom:1rem;color:var(--muted);font-size:0.85rem">Practice Linux commands in a simulated terminal</div><div class="grid">`;
    TERM_LABS.forEach(lab=>{const done=(labProgress[lab.id]||[]).length,total=lab.tasks.length;
      html+=`<div class="sec-card" data-lab="${lab.id}"><div class="icon" style="background:${done===total?'var(--green-light)':'var(--card)'}">💻</div><div class="info"><h3>${lab.title}</h3><div class="meta">Section ${lab.section} · ${done}/${total} tasks</div></div><div class="ring ${done===total?'ring-3':done>0?'ring-1':''}">${done===total?'✓':done>0?done:'-'}</div></div>`});
    return html+`</div>`;
  }
  const lab=TERM_LABS.find(l=>l.id===currentLab),progress=labProgress[lab.id]||[];
  let html=`<button class="back-btn" data-termback>← Back to Labs</button>
    <div class="term-tasks"><h3>📋 ${lab.title}</h3>`;
  lab.tasks.forEach((t,i)=>{const d=progress.includes(i);html+=`<div class="term-task ${d?'done':''}"><span class="${d?'check':'pending'}">${d?'✓':'○'}</span><span>${t.desc}</span></div>`});
  html+=`</div><div class="term-wrap"><div class="term-bar"><div class="term-dot" style="background:#f38ba8"></div><div class="term-dot" style="background:#f9e2af"></div><div class="term-dot" style="background:#a6e3a1"></div><span>student@linux-lab:${VFS.cwd}</span></div><div class="term-body" id="termBody">`;

    else if(l.type==='success')html+=`<div class="term-line"><span style="color:#a6e3a1">${esc(l.text)}</span></div>`;

    const grade=parseInt(b.dataset.grade),cardId=b.dataset.card;
    if(cardId){gradeCard(cardId,grade);S.fcIdx++;S.fcFlipped=false}
    else{const cards=getCardsBySection(S.currentSection).filter(c=>isDue(c.id));if(cards.length)gradeCard(cards[0].id,grade);S.fcFlipped=false}
    lastGrade=grade;showEncouragement=grade>=2;save();render();
  }});

  const fc=document.getElementById('flashcard');
  const fcWrap=fc&&fc.parentElement;
  if(fcWrap)fcWrap.onclick=()=>{S.fcFlipped=!S.fcFlipped;save();render()};
  document.querySelectorAll('[data-fc]').forEach(b=>{b.onclick=()=>{if(b.dataset.fc==='prev')S.fcIdx=Math.max(0,S.fcIdx-1);else if(b.dataset.fc==='next')S.fcIdx++;else{ALL_CARDS.sort(()=>Math.random()-0.5);S.fcIdx=0}S.fcFlipped=false;save();render()}});
  // Exam bindings
  document.querySelectorAll('[data-exam]').forEach(b=>{b.onclick=()=>{
    if(b.dataset.exam==='menu'){examState.mode='menu';render()}
    else{startExam(b.dataset.exam)}
  }});
  document.querySelectorAll('[data-opt]').forEach(b=>{b.onclick=()=>{
    if(examState.answered)return;
    examState.answered=true;
    const q=examState.questions[examState.idx],i=parseInt(b.dataset.opt);
    if(i===q.a){examState.score++;b.style.borderColor='var(--green)';b.style.background='var(--green-light)'}
    else{b.style.borderColor='var(--red)';b.style.background='var(--red-light)';examState.missed.push({q:q.q,ans:q.opts[q.a]});
      document.querySelectorAll('[data-opt]')[q.a].style.borderColor='var(--green)';document.querySelectorAll('[data-opt]')[q.a].style.background='var(--green-light)'}
    render();
  }});
  document.querySelectorAll('[data-exnext]').forEach(b=>{b.onclick=()=>{
    examState.idx++;examState.answered=false;
    if(examState.idx>=examState.questions.length)examState.mode='results';
    render();
  }});
  document.querySelectorAll('[data-filter]').forEach(b=>{b.onclick=()=>{S.fcFilter=b.dataset.filter;S.fcIdx=0;S.fcFlipped=false;save();render()}});
}

function bindTerminalEvents(){
  const input=document.getElementById('termInput');
  const termBody=document.getElementById('termBody');
  if(termBody)termBody.addEventListener('click',()=>{if(input)input.focus()});
  if(input){input.focus();input.addEventListener('keydown',e=>{
    if(e.key==='Enter'){execCommand(input.value);render();setTimeout(()=>{const i=document.getElementById('termInput');if(i)i.focus();const b=document.getElementById('termBody');if(b)b.scrollTop=b.scrollHeight},10)}
    else if(e.key==='ArrowUp'){e.preventDefault();if(termHistIdx<termHistory.length-1){termHistIdx++;input.value=termHistory[termHistIdx]}}
    else if(e.key==='ArrowDown'){e.preventDefault();if(termHistIdx>0){termHistIdx--;input.value=termHistory[termHistIdx]}else{termHistIdx=-1;input.value=''}}
    else if(e.key==='Tab'){e.preventDefault();const cmds=['ls','cd','pwd','cat','cp','mv','rm','mkdir','rmdir','touch','chmod','grep','find','wc','head','tail','tar','echo','man','type','whoami','id','groups','ping','clear','hint','reset'];const m=cmds.filter(c=>c.startsWith(input.value));if(m.length===1)input.value=m[0]+' '}
  })}
  document.querySelectorAll('[data-lab]').forEach(e=>{e.onclick=()=>{currentLab=e.dataset.lab;termOutput=[{type:'output',text:`Lab: ${TERM_LABS.find(l=>l.id===currentLab).title}\nType commands to complete tasks. "hint" for help.\n`}];render()}});
  document.querySelectorAll('[data-termback]').forEach(e=>{e.onclick=()=>{currentLab=null;render()}});
}

document.addEventListener('keydown',e=>{
  if(S.mode==='terminal')return;
  if(S.mode==='flashcards'){if(e.key==='ArrowRight'){S.fcIdx++;S.fcFlipped=false;save();render()}else if(e.key==='ArrowLeft'){S.fcIdx=Math.max(0,S.fcIdx-1);S.fcFlipped=false;save();render()}else if(e.key===' '){e.preventDefault();S.fcFlipped=!S.fcFlipped;save();render()}}
  if(S.mode==='challenge'&&S.currentSection&&e.key===' '){e.preventDefault();S.fcFlipped=!S.fcFlipped;save();render()}
});

if(localStorage.getItem('lpi_dark')==='true')document.body.classList.add('dark');
// Lesson TTS (Piper neural voice with browser fallback)
let lessonTtsActive=false;
let ttsChunks=[];
let ttsChunkIdx=0;
let ttsInterval=null;
let ttsEstTotal=0;
let ttsAudio=null;
const TTS_CHUNK_SIZE=200;
const TTS_SERVER='http://localhost:5111/tts';

async function checkTTSServer(){try{const r=await fetch('http://localhost:5111/health');return r.ok}catch(e){return false}}

async function toggleLessonTTS(){
  if(lessonTtsActive){stopLessonTTS();return}
  const el=document.getElementById('lessonText');
  if(!el)return;
  const text=(el.textContent||el.innerText).substring(0,5000).trim();
  if(!text)return;
  lessonTtsActive=true;
  const b=document.getElementById('lessonTtsBtn');if(b)b.innerHTML='&#x23F9;&#xFE0F; Stop';
  const prog=document.getElementById('ttsProgress');if(prog)prog.style.display='flex';
  // Try Piper server first
  const serverUp=await checkTTSServer();
  if(serverUp){
    try{
      const resp=await fetch(TTS_SERVER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
      if(resp.ok){
        const blob=await resp.blob();
        const url=URL.createObjectURL(blob);
        ttsAudio=new Audio(url);
        ttsAudio.onended=()=>stopLessonTTS();
        ttsAudio.ontimeupdate=()=>{
          const seek=document.getElementById('ttsSeek');
          const time=document.getElementById('ttsTime');
          if(seek&&ttsAudio.duration){seek.value=Math.round((ttsAudio.currentTime/ttsAudio.duration)*100);
            time.textContent=fmtTime(Math.round(ttsAudio.currentTime))+' / '+fmtTime(Math.round(ttsAudio.duration))}
        };
        ttsAudio.play();
        return;
      }
    }catch(e){console.log('Piper unavailable, using browser TTS')}
  }
  // Fallback: browser TTS
  const synth=window.speechSynthesis;synth.cancel();
  ttsChunks=[];
  for(let i=0;i<text.length;i+=TTS_CHUNK_SIZE)ttsChunks.push(text.substring(i,i+TTS_CHUNK_SIZE));
  ttsChunkIdx=0;
  speakChunk();
}

function speakChunk(){
  if(ttsChunkIdx>=ttsChunks.length){stopLessonTTS();return}
  const synth=window.speechSynthesis;synth.cancel();
  const u=new SpeechSynthesisUtterance(ttsChunks[ttsChunkIdx]);
  u.lang='en-US';u.rate=0.9;
  u.onend=()=>{ttsChunkIdx++;updateTTSProgress();if(lessonTtsActive)speakChunk()};
  u.onerror=()=>stopLessonTTS();
  synth.speak(u);updateTTSProgress();
  clearInterval(ttsInterval);
  ttsInterval=setInterval(()=>{if(synth.speaking)synth.resume()},8000);
}

function updateTTSProgress(){
  const seek=document.getElementById('ttsSeek');const time=document.getElementById('ttsTime');
  if(!seek||!time)return;
  const pct=ttsChunks.length?Math.round((ttsChunkIdx/ttsChunks.length)*100):0;
  seek.value=pct;
  ttsEstTotal=Math.round(ttsChunks.length*TTS_CHUNK_SIZE/5/150*60/0.9);
  time.textContent=fmtTime(Math.round(ttsChunkIdx*TTS_CHUNK_SIZE/5/150*60/0.9))+' / '+fmtTime(ttsEstTotal);
}

function fmtTime(s){return Math.floor(s/60)+':'+String(Math.round(s)%60).padStart(2,'0')}

function seekTTS(val){
  if(ttsAudio){ttsAudio.currentTime=(parseInt(val)/100)*ttsAudio.duration;return}
  ttsChunkIdx=Math.floor((parseInt(val)/100)*ttsChunks.length);
  if(lessonTtsActive)speakChunk();
}

function stopLessonTTS(){
  if(ttsAudio){ttsAudio.pause();ttsAudio=null}
  speechSynthesis.cancel();clearInterval(ttsInterval);
  lessonTtsActive=false;
  const b=document.getElementById('lessonTtsBtn');if(b)b.innerHTML='&#x1F50A; Read Aloud';
  const prog=document.getElementById('ttsProgress');if(prog)prog.style.display='none';
}

updateStreak();render();
