tion": "User ID of the root (superuser) account"}, {"term": "UID 1000", "definition": "Typical UID of the first standard user account"}, {"term": "/etc/passwd", "definition": "User account info file. Readable by all. Fields: user:x:UID:GID:comment:home:shell"}, {"term": "/etc/shadow", "definition": "Encrypted password file. Readable only by root. !! means account locked."}, {"term": "/etc/group", "definition": "Group information file. Lists groups and their members."}, {"term": "SUID bit", "definition": "Set User ID. File executes with owner's permissions. Why normal users can run passwd."}, {"term": "# vs $", "definition": "# = root prompt. $ = normal user prompt."}, {"term": "/ vs /root", "definition": "/ = filesystem root directory. /root = root user's home directory."}, {"term": "su -", "definition": "Switch to root user with root's environment"}, {"term": "sudo", "definition": "Execute a single command with root privileges"}], "commands": [{"command": "whoami", "context": "Display current username"}, {"command": "id", "context": "Show UID, GID, and group memberships"}, {"command": "who", "context": "List currently logged-in users"}, {"command": "w", "context": "Show who is logged in and what they're doing"}, {"command": "last", "context": "Show recent login history"}, {"command": "sudo command", "context": "Run a command as root"}, {"command": "su -", "context": "Switch to root user"}, {"command": "cat /etc/passwd", "context": "View user account information"}, {"command": "cat /etc/shadow", "context": "View encrypted passwords (root only)"}], "qa_pairs": [{"question": "Consider the following output of the id command:\n$ id emma\nuid=1000(emma) gid=1000(emma)\ngroups=1000(emma),4(adm),5(tty),10(uucp),20(dialout),27(sudo),46(plugdev)\nIn which files are the following attributes stored?\nUID and GID\nGroups\n◦Additionally, in which file is the user password stored?", "answer": "Consider the following output of the id command:\n$ id emma\nuid=1000(emma) gid=1000(emma)\ngroups=1000(emma),4(adm),5(tty),10(uucp),20(dialout),27(sudo),46(plugdev)\nIn which files are the following attributes stored?\nUID and GID /etc/passwd\nGroups /etc/group\n◦Additionally, in which file is the user password stored?\nThe hashed user password is stored in /etc/shadow .", "difficulty": "intermediate"}, {"question": "Which of the following types of cryptography is used by default to store passwords locally on a\nLinux system?\n◦Asymmetric\n◦One-way Hash\n◦Symmetric\n◦ROT13", "answer": "Which of the following types of cryptography is used by default to store passwords locally on a\nLinux system?\nBy default, a one-way hash is used to store passwords.", "difficulty": "intermediate"}, {"question": "If an account has a User ID (UID) enumerated under 1000, what type of account is this?", "answer": "If an account has a User ID (UID) enumerated under 1000, what type of account is this?\nAccounts with a UID lower than 1000 generally are system accounts.", "difficulty": "basic"}, {"question": "How can you get a list of the active logins in your system, and a count of them as well?", "answer": "How can you get a list of the active logins in your system, and a count of them as well?\nUse the w command. Besides a list of all active logins, it will also show information like how\nmany users are logged in, along the system load and uptime.", "difficulty": "intermediate"}, {"question": "Using the grep command, we got the result below with information about the user emma.\n$ grep emma /etc/passwd\nemma:x:1000:1000:Emma Smith,42 Douglas St,555.555.5555,:/home/emma:/bin/ksh\nFill in the blanks of the chart with the appropriate information using the output of the previous\ncommand.\n\nUsername\nPassword\nUID\nPrimary GID\nGECOS\nHome Directory\nShell", "answer": "Using the grep command, we got the result below with information about the user emma.\n$ grep emma /etc/passwd\nemma:x:1000:1000:Emma Smith,42 Douglas St,555.555.5555,:/home/emma:/bin/ksh\nFill in the blanks of the chart with the appropriate information using the output of the previous\ncommand.\nUsername emma\n\n      \nPassword x - should always be x for a valid, active user\nlogin\nUID 1000\nPrimary GID 1000\nGECOS Emma Smith,42 Douglas St,555.555.5555\nHome Directory /home/emma\nShell /bin/ksh", "difficulty": "intermediate"}], "explanations": [], "summary": "sudo\nSwitch User (or Superuser) Do, if entitled, the current user enters their own password (if\nrequired) to raise privilege.\nchsh\nChange a user’s shell.\nchfn\nChange the user’s information on the GECOS field.", "lesson_excerpt": "Introduction\nThis lesson will focus on the basic terminology of the accounts, access controls and security of\nlocal Linux systems, the command line interface (CLI) tools in a Linux system for basic security\naccess controls and the basic files to support user and group accounts, including those used for\nelementary privilege escalation.\nBasic security in Linux systems is modeled after Unix access controls that, despite being nearly\nfifty years-old, are quite effective in comparison to some popular consumer operating systems of\nmuch newer lineage. Even some other, popular, Unix-based operating systems tend to “take\nliberties” that are focused on “ease-of-access,” while Linux does not.\nModern Linux desktop environments and interfaces simplify the creation and management of\nusers and often automate the assignment of access controls when a user logs in — e.g., to the\ndisplay, audio and other services — requiring virtually no manual system administrator\nintervention. However, it is important to understand the basic concepts of an underlying Linux\noperating system.\n\nAccounts\nSecurity involves many concepts, one of the most common being the general concept of access\ncontrols. Before one can tackle file access controls such as ownership and permissions, one must\nunderstand the basic concepts of Linux user accounts , which are broken out into several types.\nEvery user on a Linux system has an associated account which besides login information (like\nusername and password) also defines how, and where, the user can interact with the system.\nPrivileges and access controls define the “boundaries” within which each user can operate.\nIdentifiers (UIDs/GIDs)\nThe User and Group Identifiers (UIDs/GIDs) are the basic, enumerated references to accounts. Early\nimplementations were limited 16-bit (values 0 to 65535) integers, but 21st century systems support\n64-bit UIDs and GIDs. Users and groups are enumerated independently, so the same ID can stand\nfor both a user and group.\nEvery user has not only an UID, but also a primary GID . The primary GID for a user can be unique\nto that user alone, and may end up not being used by any other users. However, this group could\nalso be a group shared by numerous users. In addition to these primary groups, each user can be\nmember of other groups, too.\nBy default on Linux systems, every user is assigned to a group with the same name as their\nusername, and same GID as their UID. E.g., create a new user named newuser and, by default, its\ndefault group is newuser as well.\nThe Superuser Account\nOn Linux the superuser account is root, which always has UID 0. The superuser is sometimes\ncalled the system administrator , and has unlimited access and control over the system, including\nother users.\nThe default group for the superuser has the GID 0 and is also named root. The home directory for\nthe superuser is a dedicated, top level directory, /root, only accessible by the root user himself.\nStandard User Accounts\nAll accounts other than root ", "full_lesson": "Introduction\nThis lesson will focus on the basic terminology of the accounts, access controls and security of\nlocal Linux systems, the command line interface (CLI) tools in a Linux system for basic security\naccess controls and the basic files to support user and group accounts, including those used for\nelementary privilege escalation.\nBasic security in Linux systems is modeled after Unix access controls that, despite being nearly\nfifty years-old, are quite effective in comparison to some popular consumer operating systems of\nmuch newer lineage. Even some other, popular, Unix-based operating systems tend to “take\nliberties” that are focused on “ease-of-access,” while Linux does not.\nModern Linux desktop environments and interfaces simplify the creation and management of\nusers and often automate the assignment of access controls when a user logs in — e.g., to the\ndisplay, audio and other services — requiring virtually no manual system administrator\nintervention. However, it is important to understand the basic concepts of an underlying Linux\noperating system.\n\nAccounts\nSecurity involves many concepts, one of the most common being the general concept of access\ncontrols. Before one can tackle file access controls such as ownership and permissions, one must\nunderstand the basic concepts of Linux user accounts , which are broken out into several types.\nEvery user on a Linux system has an associated account which besides login information (like\nusername and password) also defines how, and where, the user can interact with the system.\nPrivileges and access controls define the “boundaries” within which each user can operate.\nIdentifiers (UIDs/GIDs)\nThe User and Group Identifiers (UIDs/GIDs) are the basic, enumerated references to accounts. Early\nimplementations were limited 16-bit (values 0 to 65535) integers, but 21st century systems support\n64-bit UIDs and GIDs. Users and groups are enumerated independently, so the same ID can stand\nfor both a user and group.\nEvery user has not only an UID, but also a primary GID . The primary GID for a user can be unique\nto that user alone, and may end up not being used by any other users. However, this group could\nalso be a group shared by numerous users. In addition to these primary groups, each user can be\nmember of other groups, too.\nBy default on Linux systems, every user is assigned to a group with the same name as their\nusername, and same GID as their UID. E.g., create a new user named newuser and, by default, its\ndefault group is newuser as well.\nThe Superuser Account\nOn Linux the superuser account is root, which always has UID 0. The superuser is sometimes\ncalled the system administrator , and has unlimited access and control over the system, including\nother users.\nThe default group for the superuser has the GID 0 and is also named root. The home directory for\nthe superuser is a dedicated, top level directory, /root, only accessible by the root user himself.\nStandard User Accounts\nAll accounts other than root are technically regular user accounts, but on a Linux system the\ncolloquial term user account often means a “regular” (unprivileged) user account. They typically\nhave the following properties, with select exceptions:\n•UIDs starting at 1000 (4 digits), although some legacy systems may start at 500.\n\n     \n•A defined home directory, usually a subdirectory of /home, depending on the site-local\nconfiguration.\n•A defined login shell. In Linux the default shell is usually the Bourne Again Shell (/bin/bash ),\nthough others may be available.\nIf a user account does not have a valid shell in their attributes, the user will not be able to open an\ninteractive shell. Usually /sbin/nologin is used as an invalid shell. This may be purposeful, if the\nuser will only be authenticated for services other than console or SSH access, e.g., Secure FTP\n(sftp) access only.\nNOTETo avoid confusion, the term user account will only apply to standard or regular\nuser accounts going forward. E.g., system account will be used to explain a Linux\nuser account that is of the system user account type.\nSystem Accounts\nSystem accounts are typically pre-created at system installation time. These are for facilities,\nprograms and services that will not run as the superuser. In an ideal world, these would all be\noperating system facilities.\nThe system accounts vary, but their attributes include:\n•UIDs are usually under 100 (2-digit) or 500-1000 (3-digit).\n•Either no dedicated home directory or a directory that is usually not under /home.\n•No valid login shell (typically /sbin/nologin ), with rare exceptions.\nMost system accounts on Linux will never login, and do not need a defined shell in their\nattributes. Many processes owned and executed by system accounts are forked into their own\nenvironment by the system management, running with the specified, system account. These\naccounts usually have limited or, more often than not, no privileges.\nNOTEFrom the standpoint of the LPI Linux Essentials, system accounts"}, "5.2": {"title": "Creating Users and Groups", "topic": "Security and File Permissions", "topic_num": "5", "concepts": [{"term": "useradd", "definition": "Create a new user account"}, {"term": "usermod", "definition": "Modify an existing user account"}, {"term": "userdel", "definition": "Delete a user account"}, {"term": "groupadd", "definition": "Create a new group"}, {"term": "passwd", "definition": "Set or change a user's password"}, {"term": "/etc/skel/", "definition": "Skeleton directory. Files here are copied to new user's home directory."}], "commands": [{"command": "useradd -m newuser", "context": "Create user with home directory"}, {"command": "useradd -M newuser", "context": "Create user WITHOUT home directory"}, {"command": "passwd newuser", "context": "Set password for newuser"}, {"command": "groupadd devs", "context": "Create a new group called devs"}, {"command": "usermod -aG sudo user", "context": "Add user to sudo group (-a=append, -G=group)"}, {"command": "chsh -s /bin/zsh", "context": "Change login shell to zsh"}, {"command": "id newuser", "context": "Show UID/GID/groups for newuser"}], "qa_pairs": [{"question": "For each of the following entries, indicate the file to which it refers:\n◦developer:x:1010:frank,grace,dave\n◦root:x:0:0:root:/root:/bin/bash\n◦henry:$1$.AbCdEfGh123456789A1b2C3d4.:18015:20:90:5:30::\n◦henry:x:1000:1000:User Henry:/home/henry:/bin/bash\n◦staff:!:dave:carol,emma", "answer": "For each of the following entries, indicate the file to which it refers:\n◦developer:x:1010:frank,grace,dave\n/etc/group\n◦root:x:0:0:root:/root:/bin/bash\n/etc/passwd\n◦henry:$1$.AbCdEfGh123456789A1b2C3d4.:18015:20:90:5:30::\n/etc/shadow\n◦henry:x:1000:1000:User Henry:/home/henry:/bin/bash\n/etc/passwd\n◦staff:!:dave:carol,emma\n/etc/gshadow", "difficulty": "intermediate"}, {"question": "Observe the following output to answer the next seven questions:\n# cat /etc/passwd | tail -3\ndave:x:1050:1050:User Dave:/home/dave:/bin/bash\ncarol:x:1051:1015:User Carol:/home/carol:/bin/sh\nhenry:x:1052:1005:User Henry:/home/henry:/bin/tcsh\n# cat /etc/group | tail -3\nweb_admin:x:1005:frank,emma\nweb_developer:x:1010:grace,kevin,christian\ndave:x:1050:\n# cat /etc/shadow | tail -3\ndave:$6$AbCdEfGh123456789A1b2C3D4e5F6G7h8i9:0:20:90:7:30::\ncarol:$6$q1w2e3r4t5y6u7i8AbcDeFgHiLmNoPqRsTu:18015:0:60:7:::\nhenry:!$6$123456789aBcDeFgHa1B2c3d4E5f6g7H8I9:18015:0:20:5:::\n# cat /etc/gshadow | tail -3\nweb_admin:!:frank:frank,emma\nweb_developer:!:kevin:grace,kevin,christian\ndave:!::\n◦What is the User ID (UID) and Group ID (GID) of carol?\n◦What shell is set for dave and henry?\n\n      \n◦What is the name of the primary group of henry?\n◦What are the members of the web_developer  group? Which of these are group\nadministrators?\n◦Which user cannot log into the system?\n◦Which user should change the password the next time they log into the system?\n◦How many days must pass before a password change is required for carol?", "answer": "Observe the following output to answer the next seven questions:\n# cat /etc/passwd | tail -3\ndave:x:1050:1050:User Dave:/home/dave:/bin/bash\ncarol:x:1051:1015:User Carol:/home/carol:/bin/sh\nhenry:x:1052:1005:User Henry:/home/henry:/bin/tcsh\n# cat /etc/group | tail -3\nweb_admin:x:1005:frank,emma\nweb_developer:x:1010:grace,kevin,christian\ndave:x:1050:\n# cat /etc/shadow | tail -3\ndave:$6$AbCdEfGh123456789A1b2C3D4e5F6G7h8i9:0:20:90:7:30::\ncarol:$6$q1w2e3r4t5y6u7i8AbcDeFgHiLmNoPqRsTu:18015:0:60:7:::\nhenry:!$6$123456789aBcDeFgHa1B2c3d4E5f6g7H8I9:18015:0:20:5:::\n# cat /etc/gshadow | tail -3\nweb_admin:!:frank:frank,emma\nweb_developer:!:kevin:grace,kevin,christian\ndave:!::\n◦What is the User ID (UID) and Group ID (GID) of carol?\n\n      \nThe UID is 1051 and the GID is 1015 (the third and fourth fields in /etc/passwd ).\n◦What shell is set for dave and henry?\ndave uses /bin/bash and henry uses /bin/tcsh (the seventh field in /etc/passwd ).\n◦What is the name of the primary group of henry?\nThe group name is web_admin  (the first field in /etc/group ).\n◦What are the members of the web_developer  group? Which of these are group\nadministrators?\nThe members are grace, kevin and christian  (the fourth field in /etc/group ), but only\nkevin is the administrator of the group (the third field in /etc/gshadow ).\n◦Which user cannot log into the system?\nThe henry user account is locked (it has an exclamation mark in front of the password\nhashes in /etc/shadow ).\n◦Which user should change the password the next time they log into the system?\nIf the third field (Date of Last Password Change) in /etc/shadow  is 0, the user should\nchange their password the next time they log into the system. Therefore, dave must change\ntheir password.\n◦How many days must pass before a password change is required for carol?\n60 days (the fifth field in /etc/shadow ).", "difficulty": "intermediate"}], "explanations": [], "summary": "Summary\nIn this lesson, you learned:\n•The fundamentals of user and group management in Linux\n•Manage user and group information stored in password and group databases\n•Maintain the skeleton directory\n•Add and remove user accounts\n•Add and remove group accounts\n•Change the password of user accounts\nThe following commands were discussed in this lesson:\nuseradd\nCreate a new user account.\ngroupadd\nCreate a new group account.\nuserdel\nDelete a user account.\ngroupdel\nDelete a group account.\npasswd\nChange the password of user accounts and control all aspects of password aging.", "lesson_excerpt": "Introduction\nManaging users and groups on a Linux machine is one of the key aspects of system\nadministration. In fact, Linux is a multi-user operating system in which multiple users can use the\nsame machine at the same time.\nInformation about users and groups is stored in four files within the /etc/ directory tree:\n/etc/passwd\na file of seven colon-delimited fields containing basic information about users\n/etc/group\na file of four colon-delimited fields containing basic information about groups\n/etc/shadow\na file of nine colon-delimited fields containing encrypted user passwords\n/etc/gshadow\na file of four colon-delimited fields file containing encrypted group passwords\n\nAll of these files are updated by a suite of command-line tools for user and group management,\nwhich we’ll discuss later in this lesson. They can also be managed by graphical applications,\nspecific to each Linux distribution, which provide simpler and more immediate management\ninterfaces.\nWARNINGEven though the files are plain text, do not edit them directly. Always use the\ntools provided with your distribution for this purpose.\nThe File /etc/passwd\n/etc/passwd is a world-readable file that contains a list of users, each on a separate line:\nfrank:x:1001:1001::/home/frank:/bin/bash\nEach line consists of seven colon-delimited fields:\nUsername\nThe name used when the user logs into the system.\nPassword\nThe encrypted password (or an x if shadow passwords are used).\nUser ID (UID)\nThe ID number assigned to the user in the system.\nGroup ID (GID)\nThe primary group number of the user in the system.\nGECOS\nAn optional comment field, which is used to add extra information about the user (such as the\nfull name). The field can contain multiple comma-separated entries.\nHome directory\nThe absolute path of the user’s home directory.\nShell\nThe absolute path of the program that is automatically launched when the user logs into the\nsystem (usually an interactive shell such as /bin/bash ).\n\n     \nThe File /etc/group\n/etc/group is a world-readable file that contains a list of groups, each on a separate line:\ndeveloper:x:1002:\nEach line consists of four colon-delimited fields:\nGroup Name\nThe name of the group.\nGroup Password\nThe encrypted password of the group (or an x if shadow passwords are used).\nGroup ID (GID)\nThe ID number assigned to the group in the system.\nMember list\nA comma-delimited list of users belonging to the group, except those for whom this is the\nprimary group.\nThe File /etc/shadow\n/etc/shadow is a file readable only by root and users with root privileges and contains the\nencrypted passwords of the users, each on a separate line:\nfrank:$6$i9gjM4Md4MuelZCd$7jJa8Cd2bbADFH4dwtfvTvJLOYCCCBf/.jYbK1IMYx7Wh4fErXcc2xQVU2N1gb97yI\nYaiqH.jjJammzof2Jfr/:18029:0:99999:7:::\nEach line consists of nine colon-delimited fields:\nUsername\nThe name used when user logs into the system.\nEncrypted password\nThe encrypted password of the user (if the value is !, the account is locked).\nDate of last password cha", "full_lesson": "Introduction\nManaging users and groups on a Linux machine is one of the key aspects of system\nadministration. In fact, Linux is a multi-user operating system in which multiple users can use the\nsame machine at the same time.\nInformation about users and groups is stored in four files within the /etc/ directory tree:\n/etc/passwd\na file of seven colon-delimited fields containing basic information about users\n/etc/group\na file of four colon-delimited fields containing basic information about groups\n/etc/shadow\na file of nine colon-delimited fields containing encrypted user passwords\n/etc/gshadow\na file of four colon-delimited fields file containing encrypted group passwords\n\nAll of these files are updated by a suite of command-line tools for user and group management,\nwhich we’ll discuss later in this lesson. They can also be managed by graphical applications,\nspecific to each Linux distribution, which provide simpler and more immediate management\ninterfaces.\nWARNINGEven though the files are plain text, do not edit them directly. Always use the\ntools provided with your distribution for this purpose.\nThe File /etc/passwd\n/etc/passwd is a world-readable file that contains a list of users, each on a separate line:\nfrank:x:1001:1001::/home/frank:/bin/bash\nEach line consists of seven colon-delimited fields:\nUsername\nThe name used when the user logs into the system.\nPassword\nThe encrypted password (or an x if shadow passwords are used).\nUser ID (UID)\nThe ID number assigned to the user in the system.\nGroup ID (GID)\nThe primary group number of the user in the system.\nGECOS\nAn optional comment field, which is used to add extra information about the user (such as the\nfull name). The field can contain multiple comma-separated entries.\nHome directory\nThe absolute path of the user’s home directory.\nShell\nThe absolute path of the program that is automatically launched when the user logs into the\nsystem (usually an interactive shell such as /bin/bash ).\n\n     \nThe File /etc/group\n/etc/group is a world-readable file that contains a list of groups, each on a separate line:\ndeveloper:x:1002:\nEach line consists of four colon-delimited fields:\nGroup Name\nThe name of the group.\nGroup Password\nThe encrypted password of the group (or an x if shadow passwords are used).\nGroup ID (GID)\nThe ID number assigned to the group in the system.\nMember list\nA comma-delimited list of users belonging to the group, except those for whom this is the\nprimary group.\nThe File /etc/shadow\n/etc/shadow is a file readable only by root and users with root privileges and contains the\nencrypted passwords of the users, each on a separate line:\nfrank:$6$i9gjM4Md4MuelZCd$7jJa8Cd2bbADFH4dwtfvTvJLOYCCCBf/.jYbK1IMYx7Wh4fErXcc2xQVU2N1gb97yI\nYaiqH.jjJammzof2Jfr/:18029:0:99999:7:::\nEach line consists of nine colon-delimited fields:\nUsername\nThe name used when user logs into the system.\nEncrypted password\nThe encrypted password of the user (if the value is !, the account is locked).\nDate of last password change\nThe date of the last password change, as number of days since 01/01/1970. A value of 0 means\n\nthat the user must change the password at the next access.\nMinimum password age\nThe minimum number of days, after a password change, which must pass before the user will\nbe allowed to change the password again.\nMaximum password age\nThe maximum number of days that must pass before a password change is required.\nPassword warning period\nThe number of days, before the password expires, during which the user is warned that the\npassword must be changed.\nPassword inactivity period\nThe number of days after a password expires during which the user should update the\npassword. After this period, if the user does not change the password, the account will be\ndisabled.\nAccount expiration date\nThe date, as number of days since 01/01/1970, in which the user account will be disabled. An\nempty field means that the user account will never expire.\nA reserved field\nA field that is reserved for future use.\nThe File /etc/gshadow\n/etc/gshadow is a file readable only by root and by users with root privileges that contains\nencrypted passwords for groups, each on a separate line:\ndeveloper:$6$7QUIhUX1WdO6$H7kOYgsboLkDseFHpk04lwAtweSUQHipoxIgo83QNDxYtYwgmZTCU0qSCuCkErmyR2\n63rvHiLctZVDR7Ya9Ai1::\nEach line consists of four colon-delimited fields:\nGroup name\nThe name of the group.\nEncrypted password\nThe encrypted password for the group (it is used when a user, who is not a member of the\n\n     \ngroup, wants to join the group using the newgrp command — if the password starts with !, no\none is allowed to access the group with newgrp).\nGroup administrators\nA comma-delimited list of the administrators of the group (they can change the password of the\ngroup and can add or remove group members with the gpasswd command).\nGroup members\nA comma-delimited list of the members of the group.\nNow that we’ve seen where user and group information is stored, let’s talk about the most\nimportant command-line tools to up"}, "5.3": {"title": "Managing File Permissions and Ownership", "topic": "Security and File Permissions", "topic_num": "5", "concepts": [{"term": "Permission Types", "definition": "r=read(4), w=write(2), x=execute(1)"}, {"term": "Permission Classes", "definition": "u=user/owner, g=group, o=others, a=all"}, {"term": "Octal Permissions", "definition": "Three digits: owner-group-others. e.g., 755 = rwxr-xr-x"}, {"term": "umask", "definition": "Default permission mask. Subtracted from 666(files)/777(dirs). umask 022 → files=644, dirs=755"}, {"term": "Sticky Bit", "definition": "Set on /tmp. Prevents users from deleting files they don't own. Shown as 't'."}, {"term": "SUID", "definition": "Set User ID bit. File runs as file owner. Shown as 's' in owner execute position."}, {"term": "SGID", "definition": "Set Group ID bit. File runs as file's group. On dir: new files inherit group."}, {"term": "chown", "definition": "Change file owner (and optionally group)"}, {"term": "chgrp", "definition": "Change file group only"}, {"term": "chmod", "definition": "Change file permissions"}], "commands": [{"command": "chmod 755 file", "context": "Set rwxr-xr-x (owner full, group+others read+execute)"}, {"command": "chmod 644 file", "context": "Set rw-r--r-- (owner read+write, others read only)"}, {"command": "chmod u+x file", "context": "Add execute permission for owner"}, {"command": "chmod go-w file", "context": "Remove write permission from group and others"}, {"command": "chmod +t /dir", "context": "Set sticky bit on directory"}, {"command": "chown user:group file", "context": "Change owner and group"}, {"command": "chown -R user dir/", "context": "Change owner recursively"}, {"command": "umask", "context": "Display current umask value"}, {"command": "umask 022", "context": "Set umask (new files get 644, dirs get 755)"}, {"command": "ls -l file", "context": "View permissions, owner, group, size, date"}, {"command": "stat file", "context": "Detailed file info including permissions in octal"}], "qa_pairs": [{"question": "Create a directory named emptydir  using the command mkdir emptydir . Now, using ls, list\nthe permissions for the directory emptydir .", "answer": "Create a directory named emptydir  using the command mkdir emptydir . Now, using ls, list\nthe permissions for the directory emptydir .\nAdd the -d parameter to ls to see the file attributes of a directory, instead of listing its\ncontents. Therefore the answer is:\nls -l -d emptydir\nBonus points if you merged the two parameters in one, as in ls -ld emptydir .", "difficulty": "intermediate"}, {"question": "Create an empty file named emptyfile  with the command touch emptyfile . Now, using\nchmod with symbolic notation, add execute permissions for the owner of the file emptyfile ,\nand remove write and execute permissions for everyone else. Do this using only one chmod\ncommand.", "answer": "Create an empty file named emptyfile  with the command touch emptyfile . Now, using\nchmod in symbolic notation, add execute permissions for the owner of the file emptyfile , and\nremove write and execute permissions for everyone else. Do this using only one chmod\ncommand.\nThink about it this way:\n◦“For the user who owns the file ( u) add ( +) execute ( x) permissions”, so u+x.\n◦“For the group ( g) and other users ( o), remove ( -) write ( w) and execute ( x) permissions”, so\ngo-wx.\nTo combine these two sets of permissions, we add a comma between them. So the final\nresult is:\nchmod u+x,go-wx emptyfile", "difficulty": "intermediate"}, {"question": "What will be the permissions for a file called text.txt  after you use the command chmod 754\ntext.txt ?", "answer": "What will be the permissions of a file called text.txt  after I use the command chmod 754\ntext.txt ?\nRemember that in numeric notation each digit represents a set of three permissions, each one\nwith a respective value: read  is 4, write  is 2, execute  is 1 and no permission is 0. We get the\nvalue for a digit by adding the corresponding values for each permission. 7 is 4+2+1, or rwx, 5\nis 4+0+1, so r-x and 4 is just read, or r--. The permissions for text.txt  would be\nrwxr-xr--", "difficulty": "basic"}, {"question": "Let’s assume a file named test.sh is a shell script with the following permissions and\nownership:\n-rwxr-sr-x 1 carol root     33 Dec 11 10:36 test.sh\n◦What are the permissions for the owner of the file?\n◦If the user john runs this script, under which user’s privileges will it be run?\n◦Using the numeric notation, which should be the syntax of chmod to “unset” the special\npermission granted to this file?", "answer": "Let’s assume a file named test.sh is a shell script with the following permissions and\n\n      \nownership:\n-rwxr-sr-x 1 carol root     33 Dec 11 10:36 test.sh\n◦What are the permissions for the owner of the file?\nThe permissions for the owner (2nd to 4th characters in the output of ls -l) are rwx, so the\nanswer is: “to read, to write to and to execute the file”.\n◦If the user john runs this script, under which user’s privileges will it be run?\nPay attention to the permissions for the group . They are r-s, which means the SGID bit is\nset. The group who owns this file is root, so the script, even when started by a regular user,\nwill be run with root privileges.\n◦Using the numeric notation, which should be the syntax of chmod to “unset” the special\npermission granted to this file?\nWe can “unset” the special permissions by passing a 4th digit, 0, to chmod. The current\npermissions are 755, so the command should be chmod 0755 .", "difficulty": "intermediate"}, {"question": "Consider this file:\n$ ls -l /dev/sdb1\nbrw-rw---- 1 root disk 8, 17 Dec 21 18:51 /dev/sdb1\nWhich kind of file is sdb1? And who can write to it?", "answer": "Consider this file:\n$ ls -l /dev/sdb1\nbrw-rw---- 1 root disk 8, 17 Dec 21 18:51 /dev/sdb1\nWhich kind of file is sdb1? And who can write to it?\nThe first character of the output from ls -l shows the kind of file. b is a block device , usually a\ndisk (internal or external), connected to the machine. The owner ( root) and any users of the\ngroup disk can write to it.", "difficulty": "intermediate"}, {"question": "Consider the following 4 files:\ndrwxr-xr-t 2 carol carol 4,0K Dec 20 18:46 Another_Directory\n----r--r-- 1 carol carol    0 Dec 11 10:55 foo.bar\n-rw-rw-r-- 1 carol carol 1,2G Dec 20 18:22 HugeFile.zip\ndrwxr-sr-x 2 carol users 4,0K Jan 18 17:26 Sample_Directory\nWrite down the corresponding permissions for each file and directory using numeric 4-digit\nnotation.\nAnother_Directory\nfoo.bar\nHugeFile.zip\nSample_Directory", "answer": "Consider the following 4 files:\ndrwxr-xr-t 2 carol carol 4,0K Dec 20 18:46 Another_Directory\n----r--r-- 1 carol carol    0 Dec 11 10:55 foo.bar\n-rw-rw-r-- 1 carol carol 1,2G Dec 20 18:22 HugeFile.zip\ndrwxr-sr-x 2 carol users 4,0K Jan 18 17:26 Sample_Directory\nWrite down the corresponding permissions for each file and directory using 4-digit numeric\nnotation.\n\nThe corresponding permissions, in numeric notation, are as follows:\nAnother_Directory\nAnswer: 1755\n1 for the sticky bit, 755 for the regular permissions ( rwx for the user, r-x for group and\nothers).\nfoo.bar\nAnswer: 0044\nNo special permissions (so the first digit is 0), no permissions for the user ( ---) and just read\n(r—r--) for group and others.\nHugeFile.zip\nAnswer: 0664\nNo special permissions, so the first digit is 0. 6 (rw-) for the user and group, 4 (r--) for the\nothers.\nSample_Directory\nAnswer: 2755\n2 for the SGID bit, 7 (rwx) for the user, 5 (r-x) for the group and others.", "difficulty": "basic"}], "explanations": ["belonging to the shadow group.\n8.Run the ls -l /usr/bin/passwd  command. Which special bit is set and what is its meaning?\n# ls -l /usr/bin/passwd\n-rwsr-xr-x 1 root root 42096 mag 17  2015 /usr/bin/passwd\nThe passwd command has the SUID bit set (the fourth character of this line), which means that\nthe command is executed with the privileges of the file’s owner (thus root). This is how\nordinary users can change their password."], "summary": "Summary\nAs a multi-user system, Linux needs a way to track who owns and who can access each file. This is\ndone through a three-level permissions system, and in this lesson we learned all about how this\nsystem works.\nIn this lesson you have learned how use ls to get information about file permissions, how to\ncontrol or change who can create, delete or modify a file with chmod, both in numeric  and\nsymbolic  notation and how to change the ownership of files with chown and chgrp.\nThe following commands were discussed in this lesson:\nls\nList files, optionally including details such as permissions.\nchmod\nChange the permissions of a file or directory.\nchown\nChange the owning user and/or group of a file or directory.\nchgrp\nChange the owning group of a file or directory.", "lesson_excerpt": "Introduction\nBeing a multi-user system, Linux needs some way to track who owns each file and whether or not\na user is allowed to perform actions on that file. This is to ensure the privacy of users who might\nwant to keep the content of their files confidential, as well as to ensure collaboration by making\ncertain files accessible to multiple users.\nThis is done through a three-level permissions system: every file on disk is owned by a user and a\nuser group and has three sets of permissions: one for its owner, one the group who owns the file\nand one for everyone else. In this lesson, you will learn how to query the permissions for a file\nand how to manipulate them.\nQuerying Information about Files and Directories\nThe command ls is used to get a listing of the contents of any directory. In this basic form, all you\nget are the filenames:\n$ ls\n\n     \nAnother_Directory picture.jpg text.txt\nBut there is much more information available for each file, including type, size, ownership and\nmore. To see this information you must ask ls for a “long form” listing, using the -l parameter:\n$ ls -l\ntotal 536\ndrwxrwxr-x 2 carol carol 4096 Dec 10 15:57 Another_Directory\n-rw------- 1 carol carol 539663 Dec 10 10:43 picture.jpg\n-rw-rw-r-- 1 carol carol 1881 Dec 10 15:57 text.txt\nEach column on the output above has a meaning:\n•The first column on the listing shows the file type and permissions.\nFor example, on drwxrwxr-x :\n◦The first character, d, indicates the file type.\n◦The next three characters, rwx, indicate the permissions for the owner of the file, also\nreferred to as user or u.\n◦The next three characters, rwx, indicate the permissions of the group owning the file, also\nreferred to as g.\n◦The last three characters, r-x, indicate the permissions for anyone else, also known as\nothers or o.\n•The second column indicates the number of hard links pointing to that file. For a directory, this\nmeans the number of subdirectories, plus a link to itself ( .) and the parent directory ( ..).\n•The third and fourth columns show ownership information: respectively the user and group\nthat own the file.\n•The fifth column shows the filesize, in bytes.\n•The sixth column shows the precise date and time, or timestamp , when the file was last\nmodified.\n•The seventh and last column shows the file name.\nIf you wish to see the filesizes in “human readable” format, add the -h parameter to ls. Files less\nthan one kilobyte in size will have the size shown in bytes. Files with more than one kilobyte and\nless than one megabyte will have a K added after the size, indicating the size is in kilobytes. The\nsame follows for filesizes in the megabyte ( M) and gigabyte ( G) ranges:\n\n$ ls -lh\ntotal 1,2G\ndrwxrwxr-x 2 carol carol 4,0K Dec 10 17:59 Another_Directory\n----r--r-- 1 carol carol 0 Dec 11 10:55 foo.bar\n-rw-rw-r-- 1 carol carol 1,2G Dec 20 18:22 HugeFile.zip\n-rw------- 1 carol carol 528K Dec 10 10:43 picture.jpg\n---xr-xr-x 1 carol carol 33 Dec 11 10:36 test.sh\n-rwxr--r-- 1 carol carol 1,9K Dec", "full_lesson": "Introduction\nBeing a multi-user system, Linux needs some way to track who owns each file and whether or not\na user is allowed to perform actions on that file. This is to ensure the privacy of users who might\nwant to keep the content of their files confidential, as well as to ensure collaboration by making\ncertain files accessible to multiple users.\nThis is done through a three-level permissions system: every file on disk is owned by a user and a\nuser group and has three sets of permissions: one for its owner, one the group who owns the file\nand one for everyone else. In this lesson, you will learn how to query the permissions for a file\nand how to manipulate them.\nQuerying Information about Files and Directories\nThe command ls is used to get a listing of the contents of any directory. In this basic form, all you\nget are the filenames:\n$ ls\n\n     \nAnother_Directory picture.jpg text.txt\nBut there is much more information available for each file, including type, size, ownership and\nmore. To see this information you must ask ls for a “long form” listing, using the -l parameter:\n$ ls -l\ntotal 536\ndrwxrwxr-x 2 carol carol 4096 Dec 10 15:57 Another_Directory\n-rw------- 1 carol carol 539663 Dec 10 10:43 picture.jpg\n-rw-rw-r-- 1 carol carol 1881 Dec 10 15:57 text.txt\nEach column on the output above has a meaning:\n•The first column on the listing shows the file type and permissions.\nFor example, on drwxrwxr-x :\n◦The first character, d, indicates the file type.\n◦The next three characters, rwx, indicate the permissions for the owner of the file, also\nreferred to as user or u.\n◦The next three characters, rwx, indicate the permissions of the group owning the file, also\nreferred to as g.\n◦The last three characters, r-x, indicate the permissions for anyone else, also known as\nothers or o.\n•The second column indicates the number of hard links pointing to that file. For a directory, this\nmeans the number of subdirectories, plus a link to itself ( .) and the parent directory ( ..).\n•The third and fourth columns show ownership information: respectively the user and group\nthat own the file.\n•The fifth column shows the filesize, in bytes.\n•The sixth column shows the precise date and time, or timestamp , when the file was last\nmodified.\n•The seventh and last column shows the file name.\nIf you wish to see the filesizes in “human readable” format, add the -h parameter to ls. Files less\nthan one kilobyte in size will have the size shown in bytes. Files with more than one kilobyte and\nless than one megabyte will have a K added after the size, indicating the size is in kilobytes. The\nsame follows for filesizes in the megabyte ( M) and gigabyte ( G) ranges:\n\n$ ls -lh\ntotal 1,2G\ndrwxrwxr-x 2 carol carol 4,0K Dec 10 17:59 Another_Directory\n----r--r-- 1 carol carol 0 Dec 11 10:55 foo.bar\n-rw-rw-r-- 1 carol carol 1,2G Dec 20 18:22 HugeFile.zip\n-rw------- 1 carol carol 528K Dec 10 10:43 picture.jpg\n---xr-xr-x 1 carol carol 33 Dec 11 10:36 test.sh\n-rwxr--r-- 1 carol carol 1,9K Dec 20 18:13 text.txt\n-rw-rw-r-- 1 carol carol 2,6M Dec 11 22:14 Zipped.zip\nTo only show information on a specific set of files, add the names of these files to ls:\n$ ls -lh HugeFile.zip test.sh\ntotal 1,2G\n-rw-rw-r-- 1 carol carol 1,2G Dec 20 18:22 HugeFile.zip\n---xr-xr-x 1 carol carol 33 Dec 11 10:36 test.sh\nWhat about Directories?\nIf you try to query information about a directory using ls -l, it will show you a listing of the\ndirectory contents instead:\n$ ls -l Another_Directory/\ntotal 0\n-rw-r--r-- 1 carol carol 0 Dec 10 17:59 another_file.txt\nTo avoid this and query information about the directory itself, add the -d parameter to ls:\n$ ls -l -d Another_Directory/\ndrwxrwxr-x 2 carol carol 4096 Dec 10 17:59 Another_Directory/\nSeeing Hidden Files\nThe directory listing we have retrieved using ls -l before is incomplete:\n$ ls -l\ntotal 544\ndrwxrwxr-x 2 carol carol 4096 Dec 10 17:59 Another_Directory\n\n     \n-rw------- 1 carol carol 539663 Dec 10 10:43 picture.jpg\n-rw-rw-r-- 1 carol carol 1881 Dec 10 15:57 text.txt\nThere are three other files in that directory, but they are hidden. On Linux, files whose name\nstarts with a period ( .) are automatically hidden. To see them we need to add the -a parameter to\nls:\n$ ls -l -a\ntotal 544\ndrwxrwxr-x 3 carol carol 4096 Dec 10 16:01 .\ndrwxrwxr-x 4 carol carol 4096 Dec 10 15:56 ..\ndrwxrwxr-x 2 carol carol 4096 Dec 10 17:59 Another_Directory\n-rw------- 1 carol carol 539663 Dec 10 10:43 picture.jpg\n-rw-rw-r-- 1 carol carol 1881 Dec 10 15:57 text.txt\n-rw-r--r-- 1 carol carol 0 Dec 10 16:01 .thisIsHidden\nThe file .thisIsHidden is simply hidden because its name starts with ..\nThe directories . and .. however are special. . is a pointer to the current directory, while .. is a\npointer to the parent directory (the directory which contains the current directory). In Linux,\nevery directory contains at least these two special directories.\nTIPYou can combine multiple parameters for ls (and many other Linux commands). ls\n-l -a can, for example, be w"}, "5.4": {"title": "Special Directories and Files", "topic": "Security and File Permissions", "topic_num": "5", "concepts": [{"term": "Symbolic Link", "definition": "Pointer to another file path. Can cross filesystems. Created with ln -s."}, {"term": "Hard Link", "definition": "Additional directory entry pointing to same inode. Cannot cross filesystems."}, {"term": "Inode", "definition": "Data structure storing file metadata (permissions, owner, timestamps, block locations)"}, {"term": "/tmp", "definition": "World-writable temp directory. Sticky bit prevents others deleting your files. Cleared on reboot."}, {"term": "/var/tmp", "definition": "Temporary files that persist across reboots"}, {"term": ".hidden files", "definition": "Files/dirs starting with dot. Not shown by default. Use ls -a to see."}, {"term": ".bashrc", "definition": "Bash configuration file run for each interactive non-login shell"}, {"term": ".profile", "definition": "Profile file run at login. Sets up environment."}], "commands": [{"command": "ln -s target link", "context": "Create symbolic link"}, {"command": "ln target link", "context": "Create hard link"}, {"command": "ls -la", "context": "List all files including hidden, in long format"}, {"command": "ls -d */", "context": "List only directories"}, {"command": "file myfile", "context": "Determine file type by contents (not extension)"}, {"command": "stat myfile", "context": "Show detailed file metadata (inode, permissions, timestamps)"}], "qa_pairs": [{"question": "Imagine a program needs to create a one-use temporary file that will never be needed again\nafter the program is closed. What would be the correct directory in which to to create this file?", "answer": "Imagine a program needs to create a one-use temporary file that will never be needed again\nafter the program is closed. What would be the correct directory in which to create this file?\nSince we don’t care about the file after the program finishes running, the correct directory is\n/tmp.", "difficulty": "intermediate"}, {"question": "Which is the temporary directory that must  be cleared during the boot process?", "answer": "Which is the temporary directory that must  be cleared during the boot process?\nThe directory is /run or, on some systems, /var/run .", "difficulty": "intermediate"}, {"question": "What is the parameter for chmod in symbolic  mode to enable the sticky bit on a directory?", "answer": "What is the parameter for chmod in symbolic  mode to enable the sticky bit on a directory?\nThe symbol for the sticky bit in symbolic mode is t. Since we want to enable (add) this\npermission to the directory, the parameter should be +t.", "difficulty": "basic"}, {"question": "Imagine there is a file named document.txt  on the directory /home/carol/Documents . What\nis the command to create a symbolic link to it named text.txt  on the current directory?", "answer": "Imagine there is a file named document.txt  on the directory /home/carol/Documents . What\nis the command to create a symbolic link to it named text.txt  in the current directory?\nln -s is the command to create a symbolic link. Since you should specify the full path to the\nfile you are linking to, the command is:\n$ ln -s /home/carol/Documents/document.txt text.txt", "difficulty": "intermediate"}, {"question": "Explain the difference between a hard link to a file and a copy of this file.\n\n      \nExplorational Exercises", "answer": "Explain the difference between a hard link to a file and a copy of this file.\nA hard link is just another name for a file. Even though it looks like a duplicate of the original\nfile, for all purposes both the link and the original are the same, as they point to the same data\non disk. Changes made to the contents of the link will be reflected on the original, and vice-\nversa. A copy is a completely independent entity, occupying a different place on disk. Changes\nto the copy will not be reflected on the original, and vice-versa.\n\nAnswers to Explorational Exercises", "difficulty": "advanced"}, {"question": "Imagine that inside a directory you create a file called recipes.txt . Inside this directory, you\nwill also create a hard link to this file, called receitas.txt , and a symbolic (or soft) link to this\ncalled rezepte.txt .\n$ touch recipes.txt\n$ ln recipes.txt receitas.txt\n$ ln -s receitas.txt rezepte.txt\nThe contents of the directory should appear like so:\n$ ls -lhi\ntotal 160K\n5388833 -rw-r--r-- 4 carol carol 77K jun 17 17:25 receitas.txt\n5388833 -rw-r--r-- 4 carol carol 77K jun 17 17:25 recipes.txt\n5388837 lrwxrwxrwx 1 carol carol  12 jun 24 10:12 rezepte.txt -> receitas.txt\nRemember that, as a hard link, receitas.txt  points to the same inode that recipes.txt .\nWhat would happen to the soft link rezepte.txt  if the name receitas.txt  is deleted? Why?", "answer": "Imagine a program needs to create a one-use temporary file that will never be needed again\nafter the program is closed. What would be the correct directory in which to create this file?\nSince we don’t care about the file after the program finishes running, the correct directory is\n/tmp.", "difficulty": "advanced"}, {"question": "Imagine you have a flash drive plugged into your system, and mounted on\n/media/youruser/FlashA . You want to create in your home directory a link called\nschematics.pdf , pointing to the file esquema.pdf  in the root directory of the flash drive. So,\nyou type the command:\n$ ln /media/youruser/FlashA/esquema.pdf ~/schematics.pdf\nWhat would happen? Why?", "answer": "Which is the temporary directory that must  be cleared during the boot process?\nThe directory is /run or, on some systems, /var/run .", "difficulty": "advanced"}, {"question": "Consider the following output of ls -lah:\n$ ls -lah\ntotal 3,1M\ndrwxr-xr-x 2 carol carol 4,0K jun 17 17:27 .\ndrwxr-xr-x 5 carol carol 4,0K jun 17 17:29 ..\n-rw-rw-r-- 1 carol carol 2,8M jun 17 15:45 compressed.zip\n-rw-r--r-- 4 carol carol  77K jun 17 17:25 document.txt\n-rw-rw-r-- 1 carol carol 216K jun 17 17:25 image.png", "answer": "What is the parameter for chmod in symbolic  mode to enable the sticky bit on a directory?\nThe symbol for the sticky bit in symbolic mode is t. Since we want to enable (add) this\npermission to the directory, the parameter should be +t.", "difficulty": "basic"}], "explanations": [], "summary": "Summary\nIn this lesson, you learned:\n•Where temporary files are stored.\n•What is the special permission applied to them.\n•What links are.\n•The difference between symbolic  and hard  links.\n•How to create links.\n•How to move, rename or remove them.\nThe following commands were discussed in this lesson:\n•ln\n•The -i parameter to ls", "lesson_excerpt": "Introduction\nOn Linux, everything is treated as a file. However, some files get a special treatment, either\nbecause of the place they are stored, such as temporary files, or the way they interact with the\nfilesystem, such as links. In this lesson, we will learn where such files are located, how they work\nand how to manage them.\nTemporary Files\nTemporary files are files used by programs to store data that is only needed for a short time. These\ncan be the data of running processes, crash logs, scratch files from an autosave, intermediary files\nused during a file conversion, cache files and so on.\nLocation of temporary files\nVersion 3.0 of the Filesystem Hierarchy Standard (FHS) defines standard locations for temporary\nfiles on Linux systems. Each location has a different purpose and behavior, and it is\nrecommended that developers follow the conventions set by the FHS when writing temporary\ndata to disk.\n\n/tmp\nAccording to the FHS, programs should not assume that files written here will be preserved\nbetween invocations of a program. The recommendation is that this directory be cleared (all\nfiles erased) during system boot-up, although this is not mandatory .\n/var/tmp\nAnother location for temporary files, but this one should not be cleared during the system boot-\nup, i.e. files stored here will usually persist between reboots.\n/run\nThis directory contains run-time variable data used by running processes, such as process\nidentifier files ( .pid). Programs that need more than one run-time file may create\nsubdirectories here. This location must be cleared during system boot-up. The purpose of this\ndirectory was once served by /var/run , and on some systems /var/run may be a symbolic\nlink to /run.\nNote that there is nothing which prevents a program to create temporary files elsewhere on the\nsystem, but it is good practice to respect the conventions set by the FHS.\nPermissions on temporary files\nHaving system-wide temporary directories on a multiuser system presents some challenges\nregarding access permissions. At first thought one may think that such directories would be\n“world-writable”, i.e. any user could write or delete data in it. But if this were to be true, how\ncould we prevent a user from erasing or modifying files created by another?\nThe solution is a special permission called the sticky bit , which applies both to directories and\nfiles. However, for security reasons, the Linux kernel ignores the sticky bit when it is applied to\nfiles. When this special bit is set for a directory, it prevents users from removing or renaming a\nfile within that directory unless they own the file.\nDirectories with the sticky bit set show a t replacing the x on the permission for others in the\noutput of ls -l. For example, let’s check the permissions for the /tmp and /var/tmp directories:\n$ ls -ldh /tmp/ /var/tmp/\ndrwxrwxrwt 25 root root 4,0K Jun 7 18:52 /tmp/\ndrwxrwxrwt 16 root root 4,0K Jun 7 09:15 /var/tmp/\nAs you can see by the t replacing the x on the permissio", "full_lesson": "Introduction\nOn Linux, everything is treated as a file. However, some files get a special treatment, either\nbecause of the place they are stored, such as temporary files, or the way they interact with the\nfilesystem, such as links. In this lesson, we will learn where such files are located, how they work\nand how to manage them.\nTemporary Files\nTemporary files are files used by programs to store data that is only needed for a short time. These\ncan be the data of running processes, crash logs, scratch files from an autosave, intermediary files\nused during a file conversion, cache files and so on.\nLocation of temporary files\nVersion 3.0 of the Filesystem Hierarchy Standard (FHS) defines standard locations for temporary\nfiles on Linux systems. Each location has a different purpose and behavior, and it is\nrecommended that developers follow the conventions set by the FHS when writing temporary\ndata to disk.\n\n/tmp\nAccording to the FHS, programs should not assume that files written here will be preserved\nbetween invocations of a program. The recommendation is that this directory be cleared (all\nfiles erased) during system boot-up, although this is not mandatory .\n/var/tmp\nAnother location for temporary files, but this one should not be cleared during the system boot-\nup, i.e. files stored here will usually persist between reboots.\n/run\nThis directory contains run-time variable data used by running processes, such as process\nidentifier files ( .pid). Programs that need more than one run-time file may create\nsubdirectories here. This location must be cleared during system boot-up. The purpose of this\ndirectory was once served by /var/run , and on some systems /var/run may be a symbolic\nlink to /run.\nNote that there is nothing which prevents a program to create temporary files elsewhere on the\nsystem, but it is good practice to respect the conventions set by the FHS.\nPermissions on temporary files\nHaving system-wide temporary directories on a multiuser system presents some challenges\nregarding access permissions. At first thought one may think that such directories would be\n“world-writable”, i.e. any user could write or delete data in it. But if this were to be true, how\ncould we prevent a user from erasing or modifying files created by another?\nThe solution is a special permission called the sticky bit , which applies both to directories and\nfiles. However, for security reasons, the Linux kernel ignores the sticky bit when it is applied to\nfiles. When this special bit is set for a directory, it prevents users from removing or renaming a\nfile within that directory unless they own the file.\nDirectories with the sticky bit set show a t replacing the x on the permission for others in the\noutput of ls -l. For example, let’s check the permissions for the /tmp and /var/tmp directories:\n$ ls -ldh /tmp/ /var/tmp/\ndrwxrwxrwt 25 root root 4,0K Jun 7 18:52 /tmp/\ndrwxrwxrwt 16 root root 4,0K Jun 7 09:15 /var/tmp/\nAs you can see by the t replacing the x on the permission for others , both directories have the\nsticky bit set.\n\n     \nTo set the sticky bit on a directory using chmod in numeric mode, use the four-digit notation and 1\nas the first digit. For example:\n$ chmod 1755 temp\nwill set the sticky bit for the directory named temp and the permissions as rwxr-xr-t .\nWhen using the symbolic mode, use the parameter t. So, +t to set the sticky bit, and -t to disable\nit. Like so:\n$ chmod +t temp\nUnderstanding Links\nWe have already said that on Linux everything is treated as a file. But there is a special kind of\nfile, called a link, and there are two types of links on a Linux system:\nSymbolic links\nAlso called soft links , they point to the path of another file. If you delete the file the link points\nto (called target ) the link will still exist, but it “stops working”, as it now points to “nothing”.\nHard links\nThink of a hard link as a second name for the original file. They are not duplicates, but instead\nare an additional entry in the file system pointing to the same place (inode) on the disk.\nTIPAn inode is a data structure that stores attributes for an object (like a file or directory)\non a filesystem. Among those attributes are the filename, permissions, ownership and\non which blocks of the disk the data for the object is stored. Think of it as an entry on\nan index, hence the name, which comes from “index node”.\nWorking with Hard Links\nCreating Hard Links\nThe command to create a hard link on Linux is ln. The basic syntax is:\n$ ln TARGET LINK_NAME\nThe TARGET must exist already (this is the file the link will point to), and if the target is not on the\n\ncurrent directory, or if you want to create the link elsewhere, you must specify the full path to it.\nFor example, the command\n$ ln target.txt /home/carol/Documents/hardlink\nwill create a file named hardlink on the directory /home/carol/Documents/ , linked to the file\ntarget.txt on the current directory.\nIf you leave out the last parameter ( LINK_NAME ), a link with the same name as"}};

const STORAGE_KEY = 'lpi_brilliant_v2';
let S = loadState();

function loadState(){try{const s=JSON.parse(localStorage.getItem(STORAGE_KEY));if(s&&s.version===2)return s}catch(e){}return defaultState()}
function defaultState(){return{version:2,mode:'challenge',topicFilter:null,currentSection:null,sectionTab:'lesson',cards:{},streak:0,lastStudyDate:null,totalReviews:0,mastery:{},fcIdx:0,fcFlipped:false,fcFilter:'due'}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(S))}

function updateStreak(){
  const today=new Date().toDateString();
  if(S.lastStudyDate!==today){
    const yesterday=new Date(Date.now()-86400000).toDateString();
    S.streak=(S.lastStudyDate===yesterday)?S.streak+1:1;
    S.lastStudyDate=today;save();
  }
}

function getCardState(id){if(!S.cards[id])S.cards[id]={interval:0,ease:2.5,due:0,reps:0,lapses:0};return S.cards[id]}
function gradeCard(cardId,grade){
  const c=getCardState(cardId),now=Date.now();
  if(grade===0){c.reps=0;c.interval=1;c.lapses++;c.ease=Math.max(1.3,c.ease-0.2)}
  else{if(c.reps===0)c.interval=1;else if(c.reps===1)c.interval=3;else c.interval=Math.round(c.interval*c.ease);c.reps++;c.ease+=grade===3?0.15:grade===1?-0.15:0;c.ease=Math.max(1.3,c.ease)}
  c.due=now+c.interval*86400000;S.totalReviews++;updateStreak();
  const secId=cardId.split('::')[0];
  if(!S.mastery[secId])S.mastery[secId]={seen:0,correct:0,total:0,level:0};
  S.mastery[secId].seen++;S.mastery[secId].total++;
  if(grade>=2)S.mastery[secId].correct++;
  S.mastery[secId].level=Math.min(3,Math.floor((S.mastery[secId].correct/Math.max(1,S.mastery[secId].total))*4));
  save();
}
function isDue(id){const c=S.cards[id];return !c||Date.now()>=c.due}

function buildAllCards(){
  const cards=[];
  for(const[secId,sec]of Object.entries(DATA)){
    // Q&A pairs - ONLY include single-concept questions with complete answers
    sec.qa_pairs.forEach((qa,i)=>{
      const q=qa.question,a=qa.answer;
      // Skip: multi-part questions, too long, essay prompts, truncated answers
      if(q.length>200||a.length<10||a.endsWith('...'))return;
      if(/name (two|three|four|five|\d+)/i.test(q))return;
      if(/list (two|three|four|five|\d+)/i.test(q))return;
      if((q.match(/\?/g)||[]).length>1)return;
      if(/\n.*\d+\./m.test(q))return; // contains sub-numbered items
      cards.push({id:`${secId}::qa::${i}`,type:'question',section:secId,topic:sec.topic_num,difficulty:qa.difficulty,front:q.substring(0,200),back:a.substring(0,300),sectionTitle:sec.title});
    });
    // Commands: forward AND reverse - keep only short, clear ones with clean context
    sec.commands.forEach((cmd,i)=>{if(cmd.command.length>3&&cmd.command.length<60&&cmd.context.length>8&&cmd.context.length<120){
      // Clean up context: trim trailing/leading punctuation fragments, capitalize
      let ctx=cmd.context.trim().replace(/^[\(\)\[\]:;,.\s]+|[\(\):;,\s]+$/g,'').trim();
      ctx=ctx.charAt(0).toUpperCase()+ctx.slice(1);
      if(!ctx.endsWith('.'))ctx+='.';
      if(/^(Is |Are |Was |Were |Has |Have |Had |Can |Will |Does |Did |Creates? |Contains? )/.test(ctx))return;
      if(ctx.length<15)return;
      cards.push({id:`${secId}::cmd::${i}`,type:'command',section:secId,topic:sec.topic_num,difficulty:'intermediate',front:`$ ${cmd.command}`,back:ctx,sectionTitle:sec.title});
      cards.push({id:`${secId}::cmdR::${i}`,type:'reverse',section:secId,topic:sec.topic_num,difficulty:'intermediate',front:`${ctx}`,back:`$ ${cmd.command}`,sectionTitle:sec.title});
    }});
    // Concepts: forward AND reverse - one term = one card
    sec.concepts.forEach((c,i)=>{if(c.term.length>3&&c.term.length<60&&!/^(There|This|But|On|The|It|A |An )/i.test(c.term)){
      if(c.definition.length<10)return;
      cards.push({id:`${secId}::concept::${i}`,type:'concept',section:secId,topic:sec.topic_num,difficulty:'basic',front:c.term,back:c.definition,sectionTitle:sec.title});
      cards.push({id:`${secId}::conceptR::${i}`,type:'reverse',section:secId,topic:sec.topic_num,difficulty:'basic',front:c.definition.substring(0,150),back:c.term,sectionTitle:sec.title});
    }});
  }
  return shuffleArray(cards);
}
function shuffleArray(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
const ALL_CARDS=buildAllCards();
function getDueCards(){return ALL_CARDS.filter(c=>isDue(c.id))}
function getCardsBySection(secId){return ALL_CARDS.filter(c=>c.section===secId)}

const root=document.getElementById('root');
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function formatLesson(raw){
  let text=esc(raw);
  // Split into paragraphs on double newlines
  let paras=text.split(/\n{2,}/);
  let html='';
  paras.forEach(p=>{
    p=p.trim();if(!p)return;
    // Headings
    if(/^(Introduction|Summary|Guided Exercises|Explorational Exercises)$/.test(p)){html+=`<h3 style="color:var(--primary);font-size:1rem;margin:1.5rem 0 0.5rem;font-family:-apple-system,sans-serif">${p}</h3>`;return}
    // Command blocks (starts with $)
    if(/^\$ /.test(p)){html+=`<pre style="background:var(--card);padding:0.8rem 1rem;border-radius:8px;font-family:monospace;font-size:0.85rem;overflow-x:auto;margin:0.8rem 0;border:1px solid var(--border)">${p}</pre>`;return}
    // Bullet lists
    if(/^[•◦]/.test(p)){
      const items=p.split(/\n/).map(l=>l.replace(/^[•◦]\s*/,'').trim()).filter(Boolean);
      html+=`<ul style="margin:0.8rem 0 0.8rem 1.2rem">${items.map(i=>`<li style="margin-bottom:0.3rem">${i}</li>`).join('')}</ul>`;return}
    // Normal paragraph - join single newlines into flowing text
    const joined=p.replace(/\n/g,' ').replace(/\s{2,}/g,' ');
    html+=`<p style="margin-bottom:1rem">${joined}</p>`;
  });
  return html;
}
function stripQuestion(answer,question){
  // Remove repeated question text from start of answer
  const qFirst50=question.substring(0,50).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const idx=answer.search(new RegExp(qFirst50.substring(0,30)));
  if(idx>=0){const nlIdx=answer.indexOf('\n',idx+question.length-10);if(nlIdx>0)return answer.substring(nlIdx+1).trim()}
  return answer;
}

  }
  showEncouragement=false;

  if(S.currentSection) return renderSectionChallenge();
  const due=getDueCards();
  let html=renderPills();
  html+=`<div style="text-align:center;margin-bottom:1.2rem;color:var(--muted);font-size:0.85rem"><strong style="color:var(--primary)">${due.length}</strong> questions waiting for you</div>`;
  html+=`<div class="grid">`;
  for(const[id,sec]of Object.entries(DATA)){

    const totalCards=getCardsBySection(id).length;
    const pct=totalCards?Math.round(((totalCards-sectionDue)/totalCards)*100):0;
    const colors=['var(--card)','var(--amber-light)','var(--primary-light)','var(--green-light)'];
    html+=`<div class="sec-card" data-sec="${id}">

      <div class="info"><h3>${sec.title}</h3><div class="meta">Topic ${sec.topic_num} · ${sectionDue} due</div></div>
      <div class="ring ring-${m.level}">${pct}%</div>
    </div>`;
  }
  html+=`</div>`;
  return html;
}

function renderSectionChallenge(){
  const sec=DATA[S.currentSection];
  const cards=getCardsBySection(S.currentSection).filter(c=>isDue(c.id));
  const allCards=getCardsBySection(S.currentSection);
  const done=allCards.length-cards.length;
  const pct=allCards.length?Math.round((done/allCards.length)*100):100;

  if(cards.length===0){
    return`<button class="back-btn" data-back>← Back</button>
      <div class="encourage"><div class="big">🎉</div><h3>Section complete!</h3><p>All ${allCards.length} cards reviewed. Come back later for spaced review.</p></div>`;
  }
  const card=cards[0];
  const isNew=!S.cards[card.id]||S.cards[card.id].reps===0;

  return`<button class="back-btn" data-back>← Back</button>
    <div class="focus">
      <div class="focus-progress"><div class="bar"><div class="fill" style="width:${pct}%"></div></div><span>${done}/${allCards.length}</span></div>
      <div class="focus-label">${isNew?'🆕 New':'🔄 Review'} · ${card.type==='command'?'What does this command do?':card.type==='reverse'?'What command does this?':card.type==='concept'?'Define this term':'Answer the question'}</div>
      <div class="fc-wrap"><div class="fc ${S.fcFlipped?'flipped':''}" id="challengeCard">
        <div class="fc-face fc-front"><h3>${esc(card.front)}</h3></div>
        <div class="fc-face fc-back"><p>${esc(stripQuestion(card.back,card.front))}</p></div>
      </div></div>
      <p class="fc-hint">Tap card to flip</p>
      <div class="grades ${S.fcFlipped?'':'answer-hidden'}" id="gradeBox">
        <div class="grade grade-0" data-grade="0"><span class="emoji">😵</span><span class="label">Missed</span></div>
        <div class="grade grade-1" data-grade="1"><span class="emoji">😅</span><span class="label">Hard</span></div>
        <div class="grade grade-2" data-grade="2"><span class="emoji">👍</span><span class="label">Good</span></div>
        <div class="grade grade-3" data-grade="3"><span class="emoji">⚡</span><span class="label">Easy</span></div>
      </div>
    </div>`;
}

function getHint(card){
  const sec=DATA[card.section];
  const qStart=card.front.substring(0,30);
  if(sec.explanations&&sec.explanations.length>0){
    const h=sec.explanations[0];
    if(!h.includes(qStart))return esc(h.substring(0,250));
  }
  const lines=(sec.summary||sec.lesson_excerpt||'').split('\n').filter(l=>l.trim().length>20&&!l.includes(qStart));
  return lines.length?esc(lines[0].substring(0,200)):esc('Review the lesson material for this section.');
}

function renderProgress(){
  const total=ALL_CARDS.length,reviewed=Object.keys(S.cards).length;
  const mastered=Object.values(S.cards).filter(c=>c.reps>=3).length;
  const due=getDueCards().length;
  let html=`<div class="stats">
    <div class="stat"><div class="n">${S.totalReviews}</div><div class="l">Reviews</div></div>
    <div class="stat"><div class="n">${reviewed}/${total}</div><div class="l">Cards Seen</div></div>
    <div class="stat"><div class="n">${mastered}</div><div class="l">Mastered</div></div>
    <div class="stat"><div class="n">${due}</div><div class="l">Due</div></div>
  </div>
  <div class="progress-bar" style="margin-bottom:1.5rem"><div class="progress-fill pf-primary" style="width:${(reviewed/total)*100}%"></div></div>`;

  for(const[num,name]of Object.entries(TOPICS)){
    html+=`<div style="margin-bottom:1rem"><div style="font-weight:600;font-size:0.85rem;margin-bottom:0.4rem">Topic ${num}: ${name}</div>`;
    Object.entries(DATA).filter(([,s])=>s.topic_num===num).forEach(([id,sec])=>{
      const m=S.mastery[id]||{level:0};
      const cards=getCardsBySection(id);
      const pct=cards.length?Math.round((cards.filter(c=>!isDue(c.id)).length/cards.length)*100):0;
      html+=`<div style="display:flex;align-items:center;gap:0.5rem;padding:0.3rem 0;font-size:0.82rem">
        <span>${['⬜','🟨','🟦','🟩'][m.level]}</span><span style="flex:1">${sec.title}</span><span style="color:var(--muted)">${pct}%</span></div>`;
    });
    html+=`</div>`;
  }
  html+=`<button class="btn btn-outline btn-sm" onclick="if(confirm('Reset all progress?')){localStorage.removeItem('${STORAGE_KEY}');location.reload()}">Reset Progress</button>`;
  return html;
}

function renderPills(){
  let h=`<div class="pills"><button class="${!S.topicFilter?'active':''}" data-topic="">All</button>`;
  for(const[num,name]of Object.entries(TOPICS))h+=`<button class="${S.topicFilter===num?'active':''}" data-topic="${num}">T${num}</button>`;
  return h+`</div>`;
}

let examState = {active:false, questions:[], idx:0, score:0, answered:false, missed:[], mode:'menu'};

function renderExam(){
  if(examState.mode==='menu') return renderExamMenu();
  if(examState.mode==='active') return renderExamQuestion();
  if(examState.mode==='results') return renderExamResults();
}

function renderExamMenu(){
  const lastScore=localStorage.getItem('lpi_last_exam');
  return `<div class="panel" style="text-align:center">
    <h2>🎯 Practice Exam</h2>
    <p style="color:var(--muted);margin-bottom:1.5rem">Test yourself under exam conditions</p>
    ${lastScore?`<p style="margin-bottom:1rem;font-size:0.85rem">Last score: <strong style="color:var(--primary)">${lastScore}%</strong></p>`:''}
    <div class="grid" style="gap:0.8rem;max-width:400px;margin:0 auto">
      <button class="btn btn-primary" style="width:100%" data-exam="mock">📝 40-Question Mock Exam</button>
      <button class="btn btn-outline" style="width:100%" data-exam="quick">⚡ Quick 20 (Random)</button>
      <button class="btn btn-outline" style="width:100%" data-exam="topic">📚 Topic Focus (10 per topic)</button>
    </div>
  </div>`;
}

function startExam(type){
  examState={active:true,questions:[],idx:0,score:0,answered:false,missed:[],mode:'active'};
  if(type==='mock'){
    examState.questions=[...MOCK_EXAM].sort(()=>Math.random()-0.5);
  } else if(type==='quick'){
    examState.questions=[...MOCK_EXAM].sort(()=>Math.random()-0.5).slice(0,20);
  } else if(type==='topic'){
    // 2 per topic from mock, fill rest randomly
    const byTopic={};
    MOCK_EXAM.forEach(q=>{if(!byTopic[q.d])byTopic[q.d]=[];byTopic[q.d].push(q)});
    let picked=[];
    Object.values(byTopic).forEach(qs=>{const s=[...qs].sort(()=>Math.random()-0.5);picked.push(...s.slice(0,Math.min(10,s.length)))});
    examState.questions=picked.sort(()=>Math.random()-0.5);
  }
  render();
}

function renderExamQuestion(){

  let html=`<div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.8rem;font-size:0.8rem;color:var(--muted)">
      <span>Q ${examState.idx+1}/${total}</span><span>Topic ${q.d}</span><span>Score: ${examState.score}</span>
    </div>
    <div class="progress-bar" style="margin-bottom:1.2rem"><div class="progress-fill pf-primary" style="width:${pct}%"></div></div>
    <p style="font-size:1rem;line-height:1.7;margin-bottom:1.2rem">${q.q}</p>
    <div style="display:grid;gap:0.5rem" id="examOpts">`;
  q.opts.forEach((opt,i)=>{
    html+=`<button class="sec-card" style="cursor:pointer;padding:0.8rem 1rem;text-align:left" data-opt="${i}"><strong style="color:var(--primary);margin-right:0.5rem">${KEYS[i]}.</strong>${opt}</button>`;
  });

  if(examState.answered){
    html+=`<div class="answer" style="display:block;margin-top:1rem">${q.e}</div>
      <div style="margin-top:1rem;text-align:right"><button class="btn btn-primary btn-sm" data-exnext>Next →</button></div>`;
  }
  html+=`</div>`;
  return html;
}

function renderExamResults(){
  const total=examState.questions.length,pct=Math.round(examState.score/total*100);
  localStorage.setItem('lpi_last_exam',pct.toString());
  const pass=pct>=65;
  let html=`<div class="panel" style="text-align:center">
    <div style="font-size:3rem;margin-bottom:0.5rem">${pass?'🎉':'📚'}</div>
    <h2 style="font-size:2rem;color:var(--primary)">${pct}%</h2>
    <p style="color:var(--muted)">${examState.score}/${total} correct</p>
    <p style="margin-top:0.8rem;font-size:0.9rem">${pass?'Passing score! Keep reviewing weak areas.':'Below 65% passing threshold. Focus on missed topics.'}</p>
  </div>`;
  if(examState.missed.length>0){
    html+=`<div class="panel"><h2>Review Missed (${examState.missed.length})</h2>`;
    examState.missed.forEach(m=>{
      html+=`<div style="border-left:3px solid var(--red);padding:0.6rem 1rem;margin-bottom:0.6rem;border-radius:0 6px 6px 0;background:var(--card);font-size:0.85rem">
        <p style="margin-bottom:0.3rem">${m.q}</p>
        <p style="color:var(--green)">✓ ${m.ans}</p>
      </div>`;
    });
    html+=`</div>`;
  }
  html+=`<div style="text-align:center;margin-top:1rem"><button class="btn btn-primary" data-exam="menu">← Back to Exam Menu</button></div>`;
  return html;
}

let termHistory=[],termHistIdx=-1,termOutput=[{type:'output',text:'Welcome! Complete the tasks above using Linux commands.\nType "hint" for help · "reset" to restart · "clear" to clear\n'}],currentLab=null;

function execCommand(input){
  const cmd=input.trim();if(!cmd)return;
  termHistory.unshift(cmd);termHistIdx=-1;
  termOutput.push({type:'cmd',text:cmd});
  if(currentLab){
    const lab=TERM_LABS.find(l=>l.id===currentLab);
    const progress=labProgress[lab.id]||[];
    for(let i=0;i<lab.tasks.length;i++){
      if(!progress.includes(i)&&lab.tasks[i].check(cmd)){
        progress.push(i);labProgress[lab.id]=progress;saveTermProgress();
