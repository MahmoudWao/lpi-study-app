 stored in /etc/shadow .", "difficulty": "intermediate"}, {"question": "Which of the following types of cryptography is used by default to store passwords locally on a\nLinux system?\n◦Asymmetric\n◦One-way Hash\n◦Symmetric\n◦ROT13", "answer": "Which of the following types of cryptography is used by default to store passwords locally on a\nLinux system?\nBy default, a one-way hash is used to store passwords.", "difficulty": "intermediate"}, {"question": "If an account has a User ID (UID) enumerated under 1000, what type of account is this?", "answer": "If an account has a User ID (UID) enumerated under 1000, what type of account is this?\nAccounts with a UID lower than 1000 generally are system accounts.", "difficulty": "basic"}, {"question": "How can you get a list of the active logins in your system, and a count of them as well?", "answer": "How can you get a list of the active logins in your system, and a count of them as well?\nUse the w command. Besides a list of all active logins, it will also show information like how\nmany users are logged in, along the system load and uptime.", "difficulty": "intermediate"}, {"question": "Using the grep command, we got the result below with information about the user emma.\n$ grep emma /etc/passwd\nemma:x:1000:1000:Emma Smith,42 Douglas St,555.555.5555,:/home/emma:/bin/ksh\nFill in the blanks of the chart with the appropriate information using the output of the previous\ncommand.\n\nUsername\nPassword\nUID\nPrimary GID\nGECOS\nHome Directory\nShell", "answer": "Using the grep command, we got the result below with information about the user emma.\n$ grep emma /etc/passwd\nemma:x:1000:1000:Emma Smith,42 Douglas St,555.555.5555,:/home/emma:/bin/ksh\nFill in the blanks of the chart with the appropriate information using the output of the previous\ncommand.\nUsername emma\n\n      \nPassword x - should always be x for a valid, active user\nlogin\nUID 1000\nPrimary GID 1000\nGECOS Emma Smith,42 Douglas St,555.555.5555\nHome Directory /home/emma\nShell /bin/ksh", "difficulty": "intermediate"}], "explanations": [], "summary": "sudo\nSwitch User (or Superuser) Do, if entitled, the current user enters their own password (if\nrequired) to raise privilege.\nchsh\nChange a user’s shell.\nchfn\nChange the user’s information on the GECOS field.", "lesson_excerpt": "5.1 Basic Security and Identifying User Types\nReference to LPI objectives\nLinux Essentials version 1.6, Exam 010, Objective 5.1\nWeight\n2\nKey knowledge areas\n•Root and standard users\n•System users\nPartial list of the used files, terms and utilities\n•/etc/passwd , /etc/shadow , /etc/group\n•id, last, who, w\n•sudo, su\n\n      \n5.1 Lesson 1\nCertificate: Linux Essentials\nVersion: 1.6\nTopic: 5 Security and File Permissions\nObjective: 5.1 Basic Security and Identifying User Types\nLesson: 1 of 1\nIntroduction\nThis lesson will focus on the basic terminology of the accounts, access controls and security of\nlocal Linux systems, the command line interface (CLI) tools in a Linux system for basic security\naccess controls and the basic files to support user and group accounts, including those used for\nelementary privilege escalation.\nBasic security in Linux systems is modeled after Unix access controls that, despite being nearly\nfifty years-old, are quite effective in comparison to some popular consumer operating systems of\nmuch newer lineage. Even some other, popular, Unix-based operating systems tend to “take\nliberties” that are focused on “ease-of-access,” while Linux does not.\nModern Linux desktop environments and interfaces simplify the creation and management of\nusers and often automate the assignment of access controls when a user logs in — e.g., to the\ndisplay, audio and other services — requiring virtually no manual system administrator\nintervention. However, it is important to understand the basic concepts of an underlying Linux\noperating system.\n\nAccounts\nSecurity involves many concepts, one of the most common being the general concept of access\ncontrols. Before one can tackle file access controls such as ownership and permissions, one must\nunderstand the basic concepts of Linux user accounts , which are broken out into several types.\nEvery user on a Linux system has an associated account which besides login information (like\nusername and password) also defines how, and where, the user can interact with the system.\nPrivileges and access controls define the “boundaries” within which each user can operate.\nIdentifiers (UIDs/GIDs)\nThe User  and Group Identifiers  (UIDs/GIDs) are the basic, enumerated references to accounts. Early\nimplementations were limited 16-bit (values 0 to 65535) integers, but 21st century systems support\n64-bit UIDs and GIDs. Users and groups are enumerated independently, so the same ID can stand\nfor both a user and group.\nEvery user has not only an UID, but also a primary GID . The primary GID for a user can be unique\nto that user alone, and may end up not being used by any other users. However, this group could\nalso be a group shared by numerous users. In addition to these primary groups, each user can be\nmember of other groups, too.\nBy default on Linux systems, every user is assigned to a group with the same name as their\nusername, and same GID as their UID. E.g., create a new user named newuser and, by default, its\ndefault group ", "full_lesson": "5.1 Basic Security and Identifying User Types\nReference to LPI objectives\nLinux Essentials version 1.6, Exam 010, Objective 5.1\nWeight\n2\nKey knowledge areas\n•Root and standard users\n•System users\nPartial list of the used files, terms and utilities\n•/etc/passwd , /etc/shadow , /etc/group\n•id, last, who, w\n•sudo, su\n\n      \n5.1 Lesson 1\nCertificate: Linux Essentials\nVersion: 1.6\nTopic: 5 Security and File Permissions\nObjective: 5.1 Basic Security and Identifying User Types\nLesson: 1 of 1\nIntroduction\nThis lesson will focus on the basic terminology of the accounts, access controls and security of\nlocal Linux systems, the command line interface (CLI) tools in a Linux system for basic security\naccess controls and the basic files to support user and group accounts, including those used for\nelementary privilege escalation.\nBasic security in Linux systems is modeled after Unix access controls that, despite being nearly\nfifty years-old, are quite effective in comparison to some popular consumer operating systems of\nmuch newer lineage. Even some other, popular, Unix-based operating systems tend to “take\nliberties” that are focused on “ease-of-access,” while Linux does not.\nModern Linux desktop environments and interfaces simplify the creation and management of\nusers and often automate the assignment of access controls when a user logs in — e.g., to the\ndisplay, audio and other services — requiring virtually no manual system administrator\nintervention. However, it is important to understand the basic concepts of an underlying Linux\noperating system.\n\nAccounts\nSecurity involves many concepts, one of the most common being the general concept of access\ncontrols. Before one can tackle file access controls such as ownership and permissions, one must\nunderstand the basic concepts of Linux user accounts , which are broken out into several types.\nEvery user on a Linux system has an associated account which besides login information (like\nusername and password) also defines how, and where, the user can interact with the system.\nPrivileges and access controls define the “boundaries” within which each user can operate.\nIdentifiers (UIDs/GIDs)\nThe User  and Group Identifiers  (UIDs/GIDs) are the basic, enumerated references to accounts. Early\nimplementations were limited 16-bit (values 0 to 65535) integers, but 21st century systems support\n64-bit UIDs and GIDs. Users and groups are enumerated independently, so the same ID can stand\nfor both a user and group.\nEvery user has not only an UID, but also a primary GID . The primary GID for a user can be unique\nto that user alone, and may end up not being used by any other users. However, this group could\nalso be a group shared by numerous users. In addition to these primary groups, each user can be\nmember of other groups, too.\nBy default on Linux systems, every user is assigned to a group with the same name as their\nusername, and same GID as their UID. E.g., create a new user named newuser and, by default, its\ndefault group is newuser as well.\nThe Superuser Account\nOn Linux the superuser account is root, which always has UID 0. The superuser is sometimes\ncalled the system administrator , and has unlimited access and control over the system, including\nother users.\nThe default group for the superuser has the GID 0 and is also named root. The home directory for\nthe superuser is a dedicated, top level directory, /root, only accessible by the root user himself.\nStandard User Accounts\nAll accounts other than root are technically regular user accounts, but on a Linux system the\ncolloquial term user account  often means a “regular” (unprivileged) user account. They typically\nhave the following properties, with select exceptions:\n•UIDs starting at 1000 (4 digits), although some legacy systems may start at 500.\n\n      \n•A defined home directory, usually a subdirectory of /home, depending on the site-local\nconfiguration.\n•A defined login shell. In Linux the default shell is usually the Bourne Again Shell  (/bin/bash ),\nthough others may be available.\nIf a user account does not have a valid shell in their attributes, the user will not be able to open an\ninteractive shell. Usually /sbin/nologin  is used as an invalid shell. This may be purposeful, if the\nuser will only be authenticated for services other than console or SSH access, e.g., Secure FTP\n(sftp) access only.\nNOTETo avoid confusion, the term user account  will only apply to standard or regular\nuser accounts going forward. E.g., system account  will be used to explain a Linux\nuser account that is of the system user account type.\nSystem Accounts\nSystem accounts  are typically pre-created at system installation time. These are for facilities,\nprograms and services that will not run as the superuser. In an ideal world, these would all be\noperating system facilities.\nThe system accounts vary, but their attributes include:\n•UIDs are usually under 100 (2-digit) or 500-1000 (3-digit).\n•Either no dedicated home directory or a directory that is usua"}, "5.2": {"title": "Creating Users and Groups", "topic": "Security and File Permissions", "topic_num": "5", "concepts": [{"term": "Because the root account", "definition": "Because the root account is required to troubleshoot and fix errors, which might include file"}, {"term": "All of these files", "definition": "All of these files are updated by a suite of command-line tools for user and group management,"}, {"term": "WARNINGEven though the files", "definition": "WARNINGEven though the files are plain text, do not edit them directly. Always use the"}, {"term": "Once the new user account", "definition": "Once the new user account is created, you can use the id and groups commands to find out its"}, {"term": "This command", "definition": "This command is primarily used to change a user’s password. Any user can change their"}, {"term": "These options", "definition": "These options are available only for root. To see the full list of options, refer to the man pages."}], "commands": [{"command": "chsh -s /usr/bin/ksh", "context": "interactive mode?"}], "qa_pairs": [{"question": "For each of the following entries, indicate the file to which it refers:\n◦developer:x:1010:frank,grace,dave\n◦root:x:0:0:root:/root:/bin/bash\n◦henry:$1$.AbCdEfGh123456789A1b2C3d4.:18015:20:90:5:30::\n◦henry:x:1000:1000:User Henry:/home/henry:/bin/bash\n◦staff:!:dave:carol,emma", "answer": "For each of the following entries, indicate the file to which it refers:\n◦developer:x:1010:frank,grace,dave\n/etc/group\n◦root:x:0:0:root:/root:/bin/bash\n/etc/passwd\n◦henry:$1$.AbCdEfGh123456789A1b2C3d4.:18015:20:90:5:30::\n/etc/shadow\n◦henry:x:1000:1000:User Henry:/home/henry:/bin/bash\n/etc/passwd\n◦staff:!:dave:carol,emma\n/etc/gshadow", "difficulty": "intermediate"}, {"question": "Observe the following output to answer the next seven questions:\n# cat /etc/passwd | tail -3\ndave:x:1050:1050:User Dave:/home/dave:/bin/bash\ncarol:x:1051:1015:User Carol:/home/carol:/bin/sh\nhenry:x:1052:1005:User Henry:/home/henry:/bin/tcsh\n# cat /etc/group | tail -3\nweb_admin:x:1005:frank,emma\nweb_developer:x:1010:grace,kevin,christian\ndave:x:1050:\n# cat /etc/shadow | tail -3\ndave:$6$AbCdEfGh123456789A1b2C3D4e5F6G7h8i9:0:20:90:7:30::\ncarol:$6$q1w2e3r4t5y6u7i8AbcDeFgHiLmNoPqRsTu:18015:0:60:7:::\nhenry:!$6$123456789aBcDeFgHa1B2c3d4E5f6g7H8I9:18015:0:20:5:::\n# cat /etc/gshadow | tail -3\nweb_admin:!:frank:frank,emma\nweb_developer:!:kevin:grace,kevin,christian\ndave:!::\n◦What is the User ID (UID) and Group ID (GID) of carol?\n◦What shell is set for dave and henry?\n\n      \n◦What is the name of the primary group of henry?\n◦What are the members of the web_developer  group? Which of these are group\nadministrators?\n◦Which user cannot log into the system?\n◦Which user should change the password the next time they log into the system?\n◦How many days must pass before a password change is required for carol?", "answer": "Observe the following output to answer the next seven questions:\n# cat /etc/passwd | tail -3\ndave:x:1050:1050:User Dave:/home/dave:/bin/bash\ncarol:x:1051:1015:User Carol:/home/carol:/bin/sh\nhenry:x:1052:1005:User Henry:/home/henry:/bin/tcsh\n# cat /etc/group | tail -3\nweb_admin:x:1005:frank,emma\nweb_developer:x:1010:grace,kevin,christian\ndave:x:1050:\n# cat /etc/shadow | tail -3\ndave:$6$AbCdEfGh123456789A1b2C3D4e5F6G7h8i9:0:20:90:7:30::\ncarol:$6$q1w2e3r4t5y6u7i8AbcDeFgHiLmNoPqRsTu:18015:0:60:7:::\nhenry:!$6$123456789aBcDeFgHa1B2c3d4E5f6g7H8I9:18015:0:20:5:::\n# cat /etc/gshadow | tail -3\nweb_admin:!:frank:frank,emma\nweb_developer:!:kevin:grace,kevin,christian\ndave:!::\n◦What is the User ID (UID) and Group ID (GID) of carol?\n\n      \nThe UID is 1051 and the GID is 1015 (the third and fourth fields in /etc/passwd ).\n◦What shell is set for dave and henry?\ndave uses /bin/bash and henry uses /bin/tcsh (the seventh field in /etc/passwd ).\n◦What is the name of the primary group of henry?\nThe group name is web_admin  (the first field in /etc/group ).\n◦What are the members of the web_developer  group? Which of these are group\nadministrators?\nThe members are grace, kevin and christian  (the fourth field in /etc/group ), but only\nkevin is the administrator of the group (the third field in /etc/gshadow ).\n◦Which user cannot log into the system?\nThe henry user account is locked (it has an exclamation mark in front of the password\nhashes in /etc/shadow ).\n◦Which user should change the password the next time they log into the system?\nIf the third field (Date of Last Password Change) in /etc/shadow  is 0, the user should\nchange their password the next time they log into the system. Therefore, dave must change\ntheir password.\n◦How many days must pass before a password change is required for carol?\n60 days (the fifth field in /etc/shadow ).", "difficulty": "intermediate"}], "explanations": [], "summary": "Summary\nIn this lesson, you learned:\n•The fundamentals of user and group management in Linux\n•Manage user and group information stored in password and group databases\n•Maintain the skeleton directory\n•Add and remove user accounts\n•Add and remove group accounts\n•Change the password of user accounts\nThe following commands were discussed in this lesson:\nuseradd\nCreate a new user account.\ngroupadd\nCreate a new group account.\nuserdel\nDelete a user account.\ngroupdel\nDelete a group account.\npasswd\nChange the password of user accounts and control all aspects of password aging.", "lesson_excerpt": "Answers to Explorational Exercises\n1.Compare the results of last to w and who. What details are missing from each of the commands\ncompared to one another?\nThe w and who tools only list current users logged into the system, whereas last also lists users\nthat have disconnected. The w command lists system utilization, while who does not.\n2.Try issuing the commands who and w -his.\n◦What information has been removed from the output of the w command with the “no\nheader” ( -h) and “short” ( -s) options?\nThe header is not printed, which is useful for parsing, and the login time and select CPU\ninformation is not listed, respectively.\n◦What information has been added in the output the w command with the “ip address” ( -i)\noption?\nThis prints the IP address, instead of attempting DNS resolution, printing the hostname. This\noption to w better matches the default output of the last command.\n3.Which file is the file that stores a user account’s one-way password hash?\nThe file /etc/shadow  stores a user account’s one-way password hash, since it is not readable\nby a regular, unprivileged user account, unlike file /etc/passwd .\n4.Which file contains the list of groups a user account is a member of? What logic could be used\nto compile a list of a groups a user account is a member of?\nThe file /etc/group  has a CSV list of usernames in the last field, “members”, of any line for a\ngroup.\nAny line in the file /etc/group  where the user is listed in the final field, “members”, would\nmean the user is a member of that group — assuming it is correctly formatted (CSV delimited).\nAdditionally, the user’s primary group membership in the /etc/passwd  file will also have a\nmatching entry in the /etc/group  file for both the group name and GID.\n5.One or more (1+) of the following files are not readable by regular, unprivileged users, by\ndefault. Which ones?\n◦/etc/group\n◦/etc/passwd\n\n      \n◦/etc/shadow\n◦/etc/sudoers\nThe files /etc/shadow  and /etc/sudoers  are not readable by default, except by select\nservices or the superuser. These answers will be customized, based on the systems and\nusernames used in the laboratory.\n6.How would you change the current user’s login shell to the Korn Shell ( /usr/bin/ksh ) in non-\ninteractive mode?\n$ chsh -s /usr/bin/ksh\n7.Why is the home directory of the root user not placed within /home directory?\nBecause the root account is required to troubleshoot and fix errors, which might include file\nsystem issues related to the /home directory. In such cases, root should be fully functional\neven when the /home file system is not available yet.\n\n5.2 Creating Users and Groups\nReference to LPI objectives\nLinux Essentials version 1.6, Exam 010, Objective 5.2\nWeight\n2\nKey knowledge areas\n•User and group commands\n•User IDs\nPartial list of the used files, terms and utilities\n•/etc/passwd , /etc/shadow , /etc/group , /etc/skel/\n•useradd, groupadd\n•passwd\n\n      \n5.2 Lesson 1\nCertificate: Linux Essentials\nVersion: 1.6\nTopic: 5 Security and File Permissions\nObj", "full_lesson": "Answers to Explorational Exercises\n1.Compare the results of last to w and who. What details are missing from each of the commands\ncompared to one another?\nThe w and who tools only list current users logged into the system, whereas last also lists users\nthat have disconnected. The w command lists system utilization, while who does not.\n2.Try issuing the commands who and w -his.\n◦What information has been removed from the output of the w command with the “no\nheader” ( -h) and “short” ( -s) options?\nThe header is not printed, which is useful for parsing, and the login time and select CPU\ninformation is not listed, respectively.\n◦What information has been added in the output the w command with the “ip address” ( -i)\noption?\nThis prints the IP address, instead of attempting DNS resolution, printing the hostname. This\noption to w better matches the default output of the last command.\n3.Which file is the file that stores a user account’s one-way password hash?\nThe file /etc/shadow  stores a user account’s one-way password hash, since it is not readable\nby a regular, unprivileged user account, unlike file /etc/passwd .\n4.Which file contains the list of groups a user account is a member of? What logic could be used\nto compile a list of a groups a user account is a member of?\nThe file /etc/group  has a CSV list of usernames in the last field, “members”, of any line for a\ngroup.\nAny line in the file /etc/group  where the user is listed in the final field, “members”, would\nmean the user is a member of that group — assuming it is correctly formatted (CSV delimited).\nAdditionally, the user’s primary group membership in the /etc/passwd  file will also have a\nmatching entry in the /etc/group  file for both the group name and GID.\n5.One or more (1+) of the following files are not readable by regular, unprivileged users, by\ndefault. Which ones?\n◦/etc/group\n◦/etc/passwd\n\n      \n◦/etc/shadow\n◦/etc/sudoers\nThe files /etc/shadow  and /etc/sudoers  are not readable by default, except by select\nservices or the superuser. These answers will be customized, based on the systems and\nusernames used in the laboratory.\n6.How would you change the current user’s login shell to the Korn Shell ( /usr/bin/ksh ) in non-\ninteractive mode?\n$ chsh -s /usr/bin/ksh\n7.Why is the home directory of the root user not placed within /home directory?\nBecause the root account is required to troubleshoot and fix errors, which might include file\nsystem issues related to the /home directory. In such cases, root should be fully functional\neven when the /home file system is not available yet.\n\n5.2 Creating Users and Groups\nReference to LPI objectives\nLinux Essentials version 1.6, Exam 010, Objective 5.2\nWeight\n2\nKey knowledge areas\n•User and group commands\n•User IDs\nPartial list of the used files, terms and utilities\n•/etc/passwd , /etc/shadow , /etc/group , /etc/skel/\n•useradd, groupadd\n•passwd\n\n      \n5.2 Lesson 1\nCertificate: Linux Essentials\nVersion: 1.6\nTopic: 5 Security and File Permissions\nObjective: 5.2 Creating Users and Groups\nLesson: 1 of 1\nIntroduction\nManaging users and groups on a Linux machine is one of the key aspects of system\nadministration. In fact, Linux is a multi-user operating system in which multiple users can use the\nsame machine at the same time.\nInformation about users and groups is stored in four files within the /etc/ directory tree:\n/etc/passwd\na file of seven colon-delimited fields containing basic information about users\n/etc/group\na file of four colon-delimited fields containing basic information about groups\n/etc/shadow\na file of nine colon-delimited fields containing encrypted user passwords\n/etc/gshadow\na file of four colon-delimited fields file containing encrypted group passwords\n\nAll of these files are updated by a suite of command-line tools for user and group management,\nwhich we’ll discuss later in this lesson. They can also be managed by graphical applications,\nspecific to each Linux distribution, which provide simpler and more immediate management\ninterfaces.\nWARNINGEven though the files are plain text, do not edit them directly. Always use the\ntools provided with your distribution for this purpose.\nThe File /etc/passwd\n/etc/passwd  is a world-readable file that contains a list of users, each on a separate line:\nfrank:x:1001:1001::/home/frank:/bin/bash\nEach line consists of seven colon-delimited fields:\nUsername\nThe name used when the user logs into the system.\nPassword\nThe encrypted password (or an x if shadow passwords are used).\nUser ID (UID)\nThe ID number assigned to the user in the system.\nGroup ID (GID)\nThe primary group number of the user in the system.\nGECOS\nAn optional comment field, which is used to add extra information about the user (such as the\nfull name). The field can contain multiple comma-separated entries.\nHome directory\nThe absolute path of the user’s home directory.\nShell\nThe absolute path of the program that is automatically launched when the user logs into the\nsystem (usually an interactive shel"}, "5.3": {"title": "Managing File Permissions and Ownership", "topic": "Security and File Permissions", "topic_num": "5", "concepts": [{"term": "This", "definition": "This is done through a three-level permissions system: every file on disk is owned by a user and a"}, {"term": "But there", "definition": "But there is much more information available for each file, including type, size, ownership and"}, {"term": "There", "definition": "There are three other files in that directory, but they are hidden. On Linux, files whose name"}, {"term": "If you", "definition": "If you are the user carol and try to list the contents of Another_Directory , you will get an error"}, {"term": "TIP If a permission value", "definition": "TIP If a permission value is odd, the file surely is executable!"}, {"term": "Unless you", "definition": "Unless you are the system administrator (root), you cannot change ownership of a file owned by"}], "commands": [{"command": "ls -l", "context": "more. To see this information you must ask ls for a “long form” listing, using the -l parameter:"}, {"command": "ls -lh", "context": "same follows for filesizes in the megabyte ( M) and gigabyte ( G) ranges:"}, {"command": "ls -lh HugeFile.zip test.sh", "context": "To only show information on a specific set of files, add the names of these files to ls:"}, {"command": "ls -l Another_Directory/", "context": "directory contents instead:"}, {"command": "ls -l -d Another_Directory/", "context": "To avoid this and query information about the directory itself, add the -d parameter to ls:"}, {"command": "ls -l", "context": "The directory listing we have retrieved using ls -l before is incomplete:"}, {"command": "ls -l -a", "context": "ls:"}, {"command": "ls -ld Another_Directory/", "context": "a directory named Another_Directory , with the following permissions:"}, {"command": "ls -l Another_Directory/", "context": "message, as your user lacks read permission for that directory:"}, {"command": "sh Another_Directory/hello.sh", "context": "containing it. All that is needed is the complete filename."}, {"command": "chmod ug+rw-x,o-rwx text.txt", "context": "Both modes will lead to the same end result. So, for example, the commands:"}, {"command": "chmod 660 text.txt", "context": "and"}, {"command": "ls -l text.txt", "context": "For example, imagine we have a file called text.txt  with the following permission set:"}, {"command": "chmod g+w text.txt", "context": "permissions ( w)”. So, the command would be:"}, {"command": "ls -l text.txt", "context": "Let’s check the result with ls:"}, {"command": "chmod u-r text.txt", "context": "user ( u) revoke ( -), read permissions ( r)”. So the parameter is u-r, like so:"}, {"command": "ls -l text.txt", "context": "user ( u) revoke ( -), read permissions ( r)”. So the parameter is u-r, like so:"}, {"command": "chmod a=rw- text.txt", "context": "a), set exactly ( =), read ( r), write ( w), and no execute ( -)”. So:"}, {"command": "ls -l text.txt", "context": "a), set exactly ( =), read ( r), write ( w), and no execute ( -)”. So:"}, {"command": "chmod u+rwx,g-x text.txt", "context": "them with a comma ( ,):"}], "qa_pairs": [{"question": "Create a directory named emptydir  using the command mkdir emptydir . Now, using ls, list\nthe permissions for the directory emptydir .", "answer": "Create a directory named emptydir  using the command mkdir emptydir . Now, using ls, list\nthe permissions for the directory emptydir .\nAdd the -d parameter to ls to see the file attributes of a directory, instead of listing its\ncontents. Therefore the answer is:\nls -l -d emptydir\nBonus points if you merged the two parameters in one, as in ls -ld emptydir .", "difficulty": "intermediate"}, {"question": "Create an empty file named emptyfile  with the command touch emptyfile . Now, using\nchmod with symbolic notation, add execute permissions for the owner of the file emptyfile ,\nand remove write and execute permissions for everyone else. Do this using only one chmod\ncommand.", "answer": "Create an empty file named emptyfile  with the command touch emptyfile . Now, using\nchmod in symbolic notation, add execute permissions for the owner of the file emptyfile , and\nremove write and execute permissions for everyone else. Do this using only one chmod\ncommand.\nThink about it this way:\n◦“For the user who owns the file ( u) add ( +) execute ( x) permissions”, so u+x.\n◦“For the group ( g) and other users ( o), remove ( -) write ( w) and execute ( x) permissions”, so\ngo-wx.\nTo combine these two sets of permissions, we add a comma between them. So the final\nresult is:\nchmod u+x,go-wx emptyfile", "difficulty": "intermediate"}, {"question": "What will be the permissions for a file called text.txt  after you use the command chmod 754\ntext.txt ?", "answer": "What will be the permissions of a file called text.txt  after I use the command chmod 754\ntext.txt ?\nRemember that in numeric notation each digit represents a set of three permissions, each one\nwith a respective value: read  is 4, write  is 2, execute  is 1 and no permission is 0. We get the\nvalue for a digit by adding the corresponding values for each permission. 7 is 4+2+1, or rwx, 5\nis 4+0+1, so r-x and 4 is just read, or r--. The permissions for text.txt  would be\nrwxr-xr--", "difficulty": "basic"}, {"question": "Let’s assume a file named test.sh is a shell script with the following permissions and\nownership:\n-rwxr-sr-x 1 carol root     33 Dec 11 10:36 test.sh\n◦What are the permissions for the owner of the file?\n◦If the user john runs this script, under which user’s privileges will it be run?\n◦Using the numeric notation, which should be the syntax of chmod to “unset” the special\npermission granted to this file?", "answer": "Let’s assume a file named test.sh is a shell script with the following permissions and\n\n      \nownership:\n-rwxr-sr-x 1 carol root     33 Dec 11 10:36 test.sh\n◦What are the permissions for the owner of the file?\nThe permissions for the owner (2nd to 4th characters in the output of ls -l) are rwx, so the\nanswer is: “to read, to write to and to execute the file”.\n◦If the user john runs this script, under which user’s privileges will it be run?\nPay attention to the permissions for the group . They are r-s, which means the SGID bit is\nset. The group who owns this file is root, so the script, even when started by a regular user,\nwill be run with root privileges.\n◦Using the numeric notation, which should be the syntax of chmod to “unset” the special\npermission granted to this file?\nWe can “unset” the special permissions by passing a 4th digit, 0, to chmod. The current\npermissions are 755, so the command should be chmod 0755 .", "difficulty": "intermediate"}, {"question": "Consider this file:\n$ ls -l /dev/sdb1\nbrw-rw---- 1 root disk 8, 17 Dec 21 18:51 /dev/sdb1\nWhich kind of file is sdb1? And who can write to it?", "answer": "Consider this file:\n$ ls -l /dev/sdb1\nbrw-rw---- 1 root disk 8, 17 Dec 21 18:51 /dev/sdb1\nWhich kind of file is sdb1? And who can write to it?\nThe first character of the output from ls -l shows the kind of file. b is a block device , usually a\ndisk (internal or external), connected to the machine. The owner ( root) and any users of the\ngroup disk can write to it.", "difficulty": "intermediate"}, {"question": "Consider the following 4 files:\ndrwxr-xr-t 2 carol carol 4,0K Dec 20 18:46 Another_Directory\n----r--r-- 1 carol carol    0 Dec 11 10:55 foo.bar\n-rw-rw-r-- 1 carol carol 1,2G Dec 20 18:22 HugeFile.zip\ndrwxr-sr-x 2 carol users 4,0K Jan 18 17:26 Sample_Directory\nWrite down the corresponding permissions for each file and directory using numeric 4-digit\nnotation.\nAnother_Directory\nfoo.bar\nHugeFile.zip\nSample_Directory", "answer": "Consider the following 4 files:\ndrwxr-xr-t 2 carol carol 4,0K Dec 20 18:46 Another_Directory\n----r--r-- 1 carol carol    0 Dec 11 10:55 foo.bar\n-rw-rw-r-- 1 carol carol 1,2G Dec 20 18:22 HugeFile.zip\ndrwxr-sr-x 2 carol users 4,0K Jan 18 17:26 Sample_Directory\nWrite down the corresponding permissions for each file and directory using 4-digit numeric\nnotation.\n\nThe corresponding permissions, in numeric notation, are as follows:\nAnother_Directory\nAnswer: 1755\n1 for the sticky bit, 755 for the regular permissions ( rwx for the user, r-x for group and\nothers).\nfoo.bar\nAnswer: 0044\nNo special permissions (so the first digit is 0), no permissions for the user ( ---) and just read\n(r—r--) for group and others.\nHugeFile.zip\nAnswer: 0664\nNo special permissions, so the first digit is 0. 6 (rw-) for the user and group, 4 (r--) for the\nothers.\nSample_Directory\nAnswer: 2755\n2 for the SGID bit, 7 (rwx) for the user, 5 (r-x) for the group and others.", "difficulty": "basic"}], "explanations": ["belonging to the shadow group.\n8.Run the ls -l /usr/bin/passwd  command. Which special bit is set and what is its meaning?\n# ls -l /usr/bin/passwd\n-rwsr-xr-x 1 root root 42096 mag 17  2015 /usr/bin/passwd\nThe passwd command has the SUID bit set (the fourth character of this line), which means that\nthe command is executed with the privileges of the file’s owner (thus root). This is how\nordinary users can change their password."], "summary": "Summary\nAs a multi-user system, Linux needs a way to track who owns and who can access each file. This is\ndone through a three-level permissions system, and in this lesson we learned all about how this\nsystem works.\nIn this lesson you have learned how use ls to get information about file permissions, how to\ncontrol or change who can create, delete or modify a file with chmod, both in numeric  and\nsymbolic  notation and how to change the ownership of files with chown and chgrp.\nThe following commands were discussed in this lesson:\nls\nList files, optionally including details such as permissions.\nchmod\nChange the permissions of a file or directory.\nchown\nChange the owning user and/or group of a file or directory.\nchgrp\nChange the owning group of a file or directory.", "lesson_excerpt": "# groupadd web_admin\n# groupadd db_admin\n# cat /etc/group | grep admin\nsys_admin:x:1020:\nweb_admin:x:1021:\ndb_admin:x:1022:\nThe GIDs for the sys_admin , web_admin  and db_admin  groups are 1020, 1021 and 1022\nrespectively.\n5.Add a new user account named carol with UID 1035 and set sys_admin  as its primary group\nand web_admin  and db_admin  as its secondary groups.\n# useradd -u 1035 -g 1020 -G web_admin,db_admin carol\n# id carol\nuid=1035(carol) gid=1020(sys_admin) groups=1020(sys_admin),1021(web_admin),1022(db_admin)\n6.Delete the dave and carol user accounts and the sys_admin , web_admin  and db_admin \ngroups that you have previously created.\n# userdel -r dave\n# userdel -r carol\n# groupdel sys_admin\n# groupdel web_admin\n# groupdel db_admin\n7.Run the ls -l /etc/passwd /etc/group /etc/shadow /etc/gshadow  command and\ndescribe the output that it gives you in terms of file permissions. Which of these four files are\nshadowed for security reasons? Assume your system uses shadow passwords.\n# ls -l /etc/passwd /etc/group /etc/shadow /etc/gshadow\n-rw-r--r-- 1 root root    853 mag  1 08:00 /etc/group\n-rw-r----- 1 root shadow 1203 mag  1 08:00 /etc/gshadow\n-rw-r--r-- 1 root root   1354 mag  1 08:00 /etc/passwd\n-rw-r----- 1 root shadow 1563 mag  1 08:00 /etc/shadow\nThe /etc/passwd  and /etc/group  files are world readable and are shadowed for security\nreasons. When shadow passwords are used, you can see an x in the second field of these files\nbecause the encrypted passwords for users and groups are stored in /etc/shadow  and\n/etc/gshadow , which are readable only by root and, in some systems, also by members\n\nbelonging to the shadow group.\n8.Run the ls -l /usr/bin/passwd  command. Which special bit is set and what is its meaning?\n# ls -l /usr/bin/passwd\n-rwsr-xr-x 1 root root 42096 mag 17  2015 /usr/bin/passwd\nThe passwd command has the SUID bit set (the fourth character of this line), which means that\nthe command is executed with the privileges of the file’s owner (thus root). This is how\nordinary users can change their password.\n\n      \n5.3 Managing File Permissions and Ownership\nReference to LPI objectives\nLinux Essentials version 1.6, Exam 010, Objective 5.3\nWeight\n2\nKey knowledge areas\n•File and directory permissions and ownership\nPartial list of the used files, terms and utilities\n•ls -l, ls -a\n•chmod, chown\n\n5.3 Lesson 1\nCertificate: Linux Essentials\nVersion: 1.6\nTopic: 5 Security and File Permissions\nObjective: 5.3 Managing File Permissions and Ownership\nLesson: 1 of 1\nIntroduction\nBeing a multi-user system, Linux needs some way to track who owns each file and whether or not\na user is allowed to perform actions on that file. This is to ensure the privacy of users who might\nwant to keep the content of their files confidential, as well as to ensure collaboration by making\ncertain files accessible to multiple users.\nThis is done through a three-level permissions system: every file on disk is owned by a user and a\nuser group and has three sets of permiss", "full_lesson": "# groupadd web_admin\n# groupadd db_admin\n# cat /etc/group | grep admin\nsys_admin:x:1020:\nweb_admin:x:1021:\ndb_admin:x:1022:\nThe GIDs for the sys_admin , web_admin  and db_admin  groups are 1020, 1021 and 1022\nrespectively.\n5.Add a new user account named carol with UID 1035 and set sys_admin  as its primary group\nand web_admin  and db_admin  as its secondary groups.\n# useradd -u 1035 -g 1020 -G web_admin,db_admin carol\n# id carol\nuid=1035(carol) gid=1020(sys_admin) groups=1020(sys_admin),1021(web_admin),1022(db_admin)\n6.Delete the dave and carol user accounts and the sys_admin , web_admin  and db_admin \ngroups that you have previously created.\n# userdel -r dave\n# userdel -r carol\n# groupdel sys_admin\n# groupdel web_admin\n# groupdel db_admin\n7.Run the ls -l /etc/passwd /etc/group /etc/shadow /etc/gshadow  command and\ndescribe the output that it gives you in terms of file permissions. Which of these four files are\nshadowed for security reasons? Assume your system uses shadow passwords.\n# ls -l /etc/passwd /etc/group /etc/shadow /etc/gshadow\n-rw-r--r-- 1 root root    853 mag  1 08:00 /etc/group\n-rw-r----- 1 root shadow 1203 mag  1 08:00 /etc/gshadow\n-rw-r--r-- 1 root root   1354 mag  1 08:00 /etc/passwd\n-rw-r----- 1 root shadow 1563 mag  1 08:00 /etc/shadow\nThe /etc/passwd  and /etc/group  files are world readable and are shadowed for security\nreasons. When shadow passwords are used, you can see an x in the second field of these files\nbecause the encrypted passwords for users and groups are stored in /etc/shadow  and\n/etc/gshadow , which are readable only by root and, in some systems, also by members\n\nbelonging to the shadow group.\n8.Run the ls -l /usr/bin/passwd  command. Which special bit is set and what is its meaning?\n# ls -l /usr/bin/passwd\n-rwsr-xr-x 1 root root 42096 mag 17  2015 /usr/bin/passwd\nThe passwd command has the SUID bit set (the fourth character of this line), which means that\nthe command is executed with the privileges of the file’s owner (thus root). This is how\nordinary users can change their password.\n\n      \n5.3 Managing File Permissions and Ownership\nReference to LPI objectives\nLinux Essentials version 1.6, Exam 010, Objective 5.3\nWeight\n2\nKey knowledge areas\n•File and directory permissions and ownership\nPartial list of the used files, terms and utilities\n•ls -l, ls -a\n•chmod, chown\n\n5.3 Lesson 1\nCertificate: Linux Essentials\nVersion: 1.6\nTopic: 5 Security and File Permissions\nObjective: 5.3 Managing File Permissions and Ownership\nLesson: 1 of 1\nIntroduction\nBeing a multi-user system, Linux needs some way to track who owns each file and whether or not\na user is allowed to perform actions on that file. This is to ensure the privacy of users who might\nwant to keep the content of their files confidential, as well as to ensure collaboration by making\ncertain files accessible to multiple users.\nThis is done through a three-level permissions system: every file on disk is owned by a user and a\nuser group and has three sets of permissions: one for its owner, one the group who owns the file\nand one for everyone else. In this lesson, you will learn how to query the permissions for a file\nand how to manipulate them.\nQuerying Information about Files and Directories\nThe command ls is used to get a listing of the contents of any directory. In this basic form, all you\nget are the filenames:\n$ ls\n\n      \nAnother_Directory  picture.jpg  text.txt\nBut there is much more information available for each file, including type, size, ownership and\nmore. To see this information you must ask ls for a “long form” listing, using the -l parameter:\n$ ls -l\ntotal 536\ndrwxrwxr-x 2 carol carol   4096 Dec 10 15:57 Another_Directory\n-rw------- 1 carol carol 539663 Dec 10 10:43 picture.jpg\n-rw-rw-r-- 1 carol carol   1881 Dec 10 15:57 text.txt\nEach column on the output above has a meaning:\n•The first column on the listing shows the file type and permissions.\nFor example, on drwxrwxr-x :\n◦The first character, d, indicates the file type.\n◦The next three characters, rwx, indicate the permissions for the owner of the file, also\nreferred to as user  or u.\n◦The next three characters, rwx, indicate the permissions of the group  owning the file, also\nreferred to as g.\n◦The last three characters, r-x, indicate the permissions for anyone else, also known as\nothers  or o.\n•The second  column indicates the number of hard links pointing to that file. For a directory, this\nmeans the number of subdirectories, plus a link to itself ( .) and the parent directory ( ..).\n•The third  and fourth  columns show ownership information: respectively the user and group\nthat own the file.\n•The fifth column shows the filesize, in bytes.\n•The sixth  column shows the precise date and time, or timestamp , when the file was last\nmodified.\n•The seventh  and last column shows the file name.\nIf you wish to see the filesizes in “human readable” format, add the -h parameter to ls. Files less\nthan one kilobyte in size will have the size shown in bytes. Files with"}, "5.4": {"title": "Special Directories and Files", "topic": "Security and File Permissions", "topic_num": "5", "concepts": [{"term": "This", "definition": "This is also true for the sticky bit, represented by the t in the third group of permissions."}, {"term": "Lowercase t", "definition": "Lowercase t means the sticky bit is set and that others have execute permissions. Uppercase T"}, {"term": "This", "definition": "This is a multi-step process. The first step is to create the directory:"}, {"term": "This", "definition": "This is done by setting the sticky bit (represented by a t) on the directory. Remember that it is"}, {"term": "Temporary files", "definition": "Temporary files are files used by programs to store data that is only needed for a short time. These"}, {"term": "Note that there", "definition": "Note that there is nothing which prevents a program to create temporary files elsewhere on the"}, {"term": "TIPAn inode", "definition": "TIPAn inode  is a data structure that stores attributes for an object (like a file or directory)"}, {"term": "Hard links", "definition": "Hard links are entries in the filesystem which have different names but point to the same data on"}, {"term": "But which one", "definition": "But which one is the original and which one is the link? You can’t really tell, as for all practical"}, {"term": "Since hard links", "definition": "Since hard links are treated as regular files, they can be deleted with rm and renamed or moved"}, {"term": "This", "definition": "This is easier to understand with an example. Say that we have a file named original.txt  in the"}, {"term": "See how the link", "definition": "See how the link is constructed: softlink  points to ( →) original.txt . However, let’s see what"}], "commands": [{"command": "chmod 4 emptyfile", "context": "Now, let’s try the first command, chmod 4 emptyfile :"}, {"command": "ls -l emptyfile", "context": "Now, let’s try the first command, chmod 4 emptyfile :"}, {"command": "chmod 44 emptyfile", "context": "emptyfile ?"}, {"command": "ls -l emptyfile", "context": "emptyfile ?"}, {"command": "ls -ld /tmp", "context": "3.Consider the permissions for the temporary directory on a Linux system, /tmp:"}, {"command": "chmod u-x test.sh", "context": "Now, run the following commands:"}, {"command": "ls -l test.sh", "context": "Now, run the following commands:"}, {"command": "mkdir Box", "context": "This is a multi-step process. The first step is to create the directory:"}, {"command": "chown :users Box/", "context": "bits, it makes sense to use the symbolic mode:"}, {"command": "chmod g+wxs Box/", "context": "bits, it makes sense to use the symbolic mode:"}, {"command": "chmod o+t Box/", "context": "set on the permissions for others ( o)."}, {"command": "chmod g+wxs,o+t Box/", "context": "Of course, you can specify SGID and the sticky bit using only one chmod command:"}, {"command": "ls -ldh /tmp/ /var/tmp/", "context": "output of ls -l. For example, let’s check the permissions for the /tmp and /var/tmp  directories:"}, {"command": "chmod 1755 temp", "context": "as the first digit. For example:"}, {"command": "chmod +t temp", "context": "it. Like so:"}, {"command": "ln TARGET LINK_NAME", "context": "The command to create a hard link on Linux is ln. The basic syntax is:"}, {"command": "ln target.txt /home/carol/Documents/hardlink", "context": "For example, the command"}, {"command": "ls -li", "context": "You can check this by using the -i parameter of ls. Consider the following contents of a directory:"}, {"command": "ln -s target.txt /home/carol/Documents/softlink", "context": "The command used to create a symbolic link is also ln, but with the -s parameter added. Like so:"}, {"command": "ls -lh", "context": "ls:"}], "qa_pairs": [{"question": "Imagine a program needs to create a one-use temporary file that will never be needed again\nafter the program is closed. What would be the correct directory in which to to create this file?", "answer": "Imagine a program needs to create a one-use temporary file that will never be needed again\nafter the program is closed. What would be the correct directory in which to create this file?\nSince we don’t care about the file after the program finishes running, the correct directory is\n/tmp.", "difficulty": "intermediate"}, {"question": "Which is the temporary directory that must  be cleared during the boot process?", "answer": "Which is the temporary directory that must  be cleared during the boot process?\nThe directory is /run or, on some systems, /var/run .", "difficulty": "intermediate"}, {"question": "What is the parameter for chmod in symbolic  mode to enable the sticky bit on a directory?", "answer": "What is the parameter for chmod in symbolic  mode to enable the sticky bit on a directory?\nThe symbol for the sticky bit in symbolic mode is t. Since we want to enable (add) this\npermission to the directory, the parameter should be +t.", "difficulty": "basic"}, {"question": "Imagine there is a file named document.txt  on the directory /home/carol/Documents . What\nis the command to create a symbolic link to it named text.txt  on the current directory?", "answer": "Imagine there is a file named document.txt  on the directory /home/carol/Documents . What\nis the command to create a symbolic link to it named text.txt  in the current directory?\nln -s is the command to create a symbolic link. Since you should specify the full path to the\nfile you are linking to, the command is:\n$ ln -s /home/carol/Documents/document.txt text.txt", "difficulty": "intermediate"}, {"question": "Explain the difference between a hard link to a file and a copy of this file.\n\n      \nExplorational Exercises", "answer": "Explain the difference between a hard link to a file and a copy of this file.\nA hard link is just another name for a file. Even though it looks like a duplicate of the original\nfile, for all purposes both the link and the original are the same, as they point to the same data\non disk. Changes made to the contents of the link will be reflected on the original, and vice-\nversa. A copy is a completely independent entity, occupying a different place on disk. Changes\nto the copy will not be reflected on the original, and vice-versa.\n\nAnswers to Explorational Exercises", "difficulty": "advanced"}, {"question": "Imagine that inside a directory you create a file called recipes.txt . Inside this directory, you\nwill also create a hard link to this file, called receitas.txt , and a symbolic (or soft) link to this\ncalled rezepte.txt .\n$ touch recipes.txt\n$ ln recipes.txt receitas.txt\n$ ln -s receitas.txt rezepte.txt\nThe contents of the directory should appear like so:\n$ ls -lhi\ntotal 160K\n5388833 -rw-r--r-- 4 carol carol 77K jun 17 17:25 receitas.txt\n5388833 -rw-r--r-- 4 carol carol 77K jun 17 17:25 recipes.txt\n5388837 lrwxrwxrwx 1 carol carol  12 jun 24 10:12 rezepte.txt -> receitas.txt\nRemember that, as a hard link, receitas.txt  points to the same inode that recipes.txt .\nWhat would happen to the soft link rezepte.txt  if the name receitas.txt  is deleted? Why?", "answer": "Imagine a program needs to create a one-use temporary file that will never be needed again\nafter the program is closed. What would be the correct directory in which to create this file?\nSince we don’t care about the file after the program finishes running, the correct directory is\n/tmp.", "difficulty": "advanced"}, {"question": "Imagine you have a flash drive plugged into your system, and mounted on\n/media/youruser/FlashA . You want to create in your home directory a link called\nschematics.pdf , pointing to the file esquema.pdf  in the root directory of the flash drive. So,\nyou type the command:\n$ ln /media/youruser/FlashA/esquema.pdf ~/schematics.pdf\nWhat would happen? Why?", "answer": "Which is the temporary directory that must  be cleared during the boot process?\nThe directory is /run or, on some systems, /var/run .", "difficulty": "advanced"}, {"question": "Consider the following output of ls -lah:\n$ ls -lah\ntotal 3,1M\ndrwxr-xr-x 2 carol carol 4,0K jun 17 17:27 .\ndrwxr-xr-x 5 carol carol 4,0K jun 17 17:29 ..\n-rw-rw-r-- 1 carol carol 2,8M jun 17 15:45 compressed.zip\n-rw-r--r-- 4 carol carol  77K jun 17 17:25 document.txt\n-rw-rw-r-- 1 carol carol 216K jun 17 17:25 image.png", "answer": "What is the parameter for chmod in symbolic  mode to enable the sticky bit on a directory?\nThe symbol for the sticky bit in symbolic mode is t. Since we want to enable (add) this\npermission to the directory, the parameter should be +t.", "difficulty": "basic"}], "explanations": [], "summary": "Summary\nIn this lesson, you learned:\n•Where temporary files are stored.\n•What is the special permission applied to them.\n•What links are.\n•The difference between symbolic  and hard  links.\n•How to create links.\n•How to move, rename or remove them.\nThe following commands were discussed in this lesson:\n•ln\n•The -i parameter to ls", "lesson_excerpt": "Answers to Explorational Exercises\n1.Try this on a terminal: create an empty file called emptyfile  with the command touch\nemptyfile . Now “zero out” the permissions for the file with chmod 000 emptyfile . What will\nhappen if you change the permissions for emptyfile  by passing only one value for chmod in\nnumeric notation, such as chmod 4 emptyfile ? What if we use two, such as chmod 44\nemptyfile ? What can we learn about the way chmod reads the numerical value?\nRemember that we “zeroed out” the permissions for emptyfile . So, its initial state would be:\n---------- 1 carol carol    0 Dec 11 10:55 emptyfile\nNow, let’s try the first command, chmod 4 emptyfile :\n$ chmod 4 emptyfile\n$ ls -l emptyfile\n-------r-- 1 carol carol 0 Dec 11 10:55 emptyfile\nThe permissions for others  were changed. And what if we try two digits, such as chmod 44\nemptyfile ?\n$ chmod 44 emptyfile\n$ ls -l emptyfile\n----r--r-- 1 carol carol 0 Dec 11 10:55 emptyfile\nNow, the permissions for group  and others  were affected. From this, we can conclude that in\nnumeric notation chmod reads the value “backwards”, from the least significant digit ( others ) to\nthe most significant one ( user ). If you pass one digit, you modify the permissions for others .\nWith two digits you modify group  and others , and with three you modify user , group  and others\nand with four digits you modify user , group , others  and the special permissions.\n2.Can you execute a file for which you have execute, but not read permissions ( --x)? Why or\nwhy not?\nAt first, the answer seems obvious: If you have execute permission, the file should run. This\napplies to programs in binary format that are executed directly by the kernel. However, there\nare programs (e.g. shell scripts) that must first be read and interpreted, so in these cases the\nread permission ( r) must also be set.\n\n3.Consider the permissions for the temporary directory on a Linux system, /tmp:\n$ ls -ld /tmp\ndrwxrwxrwt  19 root root  16K Dec 21 18:58 tmp\nUser, group and others have full permissions. But can a regular user delete any files inside this\ndirectory? Why is this?\n/tmp is what we call a world writeable  directory, meaning that any user can write to it. But we\ndon’t want one user modifying files created by others, so the sticky bit_ is set (as indicated by\nthe t on the permissions for others ). This means that a user can delete files in /tmp, but only if\nthey created that file.\n4.A file called test.sh has the following permissions: -rwsr-xr-x , meaning the SUID bit is set.\nNow, run the following commands:\n$ chmod u-x test.sh\n$ ls -l test.sh\n-rwSr-xr-x 1 carol carol 33 Dec 11 10:36 test.sh\nWhat did we do? What does the uppercase S mean?\nWe removed execute permissions for the user who owns the file. The s (or t) takes the place of\nthe x on the output of ls -l, so the system needs a way to show if the user has execute\npermissions or not. It does this by changing the case of the special character.\nA lowercase s on the first group of permissio", "full_lesson": "Answers to Explorational Exercises\n1.Try this on a terminal: create an empty file called emptyfile  with the command touch\nemptyfile . Now “zero out” the permissions for the file with chmod 000 emptyfile . What will\nhappen if you change the permissions for emptyfile  by passing only one value for chmod in\nnumeric notation, such as chmod 4 emptyfile ? What if we use two, such as chmod 44\nemptyfile ? What can we learn about the way chmod reads the numerical value?\nRemember that we “zeroed out” the permissions for emptyfile . So, its initial state would be:\n---------- 1 carol carol    0 Dec 11 10:55 emptyfile\nNow, let’s try the first command, chmod 4 emptyfile :\n$ chmod 4 emptyfile\n$ ls -l emptyfile\n-------r-- 1 carol carol 0 Dec 11 10:55 emptyfile\nThe permissions for others  were changed. And what if we try two digits, such as chmod 44\nemptyfile ?\n$ chmod 44 emptyfile\n$ ls -l emptyfile\n----r--r-- 1 carol carol 0 Dec 11 10:55 emptyfile\nNow, the permissions for group  and others  were affected. From this, we can conclude that in\nnumeric notation chmod reads the value “backwards”, from the least significant digit ( others ) to\nthe most significant one ( user ). If you pass one digit, you modify the permissions for others .\nWith two digits you modify group  and others , and with three you modify user , group  and others\nand with four digits you modify user , group , others  and the special permissions.\n2.Can you execute a file for which you have execute, but not read permissions ( --x)? Why or\nwhy not?\nAt first, the answer seems obvious: If you have execute permission, the file should run. This\napplies to programs in binary format that are executed directly by the kernel. However, there\nare programs (e.g. shell scripts) that must first be read and interpreted, so in these cases the\nread permission ( r) must also be set.\n\n3.Consider the permissions for the temporary directory on a Linux system, /tmp:\n$ ls -ld /tmp\ndrwxrwxrwt  19 root root  16K Dec 21 18:58 tmp\nUser, group and others have full permissions. But can a regular user delete any files inside this\ndirectory? Why is this?\n/tmp is what we call a world writeable  directory, meaning that any user can write to it. But we\ndon’t want one user modifying files created by others, so the sticky bit_ is set (as indicated by\nthe t on the permissions for others ). This means that a user can delete files in /tmp, but only if\nthey created that file.\n4.A file called test.sh has the following permissions: -rwsr-xr-x , meaning the SUID bit is set.\nNow, run the following commands:\n$ chmod u-x test.sh\n$ ls -l test.sh\n-rwSr-xr-x 1 carol carol 33 Dec 11 10:36 test.sh\nWhat did we do? What does the uppercase S mean?\nWe removed execute permissions for the user who owns the file. The s (or t) takes the place of\nthe x on the output of ls -l, so the system needs a way to show if the user has execute\npermissions or not. It does this by changing the case of the special character.\nA lowercase s on the first group of permissions means that the user who owns the file has\nexecute permissions and that the SUID bit is set. An uppercase S means that the user who owns\nthe file lacks ( -) execute permissions and that the SUID bit is set.\nThe same can be said for SGID. A lowercase s on the second group of permissions means that\nthe group who owns the file has execute permissions and that the SGID bit is set. An uppercase\nS means that the group who owns the file lacks ( -) execute permissions and that the SGID bit is\nset.\nThis is also true for the sticky bit, represented by the t in the third group of permissions.\nLowercase t means the sticky bit is set and that others have execute permissions. Uppercase T\nmeans the sticky bit is set and that others do not have execute permissions.\n5.How would you create a directory named Box where all the files are automatically owned by\nthe group users, and can only be deleted by the user who created them?\n\n      \nThis is a multi-step process. The first step is to create the directory:\n$ mkdir Box\nWe want every file created inside this directory to be automatically assigned to the group\nusers. We can do this by setting this group as the owner of the directory, and then by setting\nthe SGID bit on it. We also need to make sure that any member of the group can write to that\ndirectory.\nSince we do not care about what the other permissions are, and want to “flip” only the special\nbits, it makes sense to use the symbolic mode:\n$ chown :users Box/\n$ chmod g+wxs Box/\nNote that if you current user does not belong to the group users, you will have to use the\ncommand sudo before the commands above to do the change as root.\nNow for the last part, making sure that only the user who created a file is allowed to delete it.\nThis is done by setting the sticky bit (represented by a t) on the directory. Remember that it is\nset on the permissions for others ( o).\n$ chmod o+t Box/\nThe permissions on the directory Box should appear as follows:\ndrwxrwsr-t 2 carol users  4,0K Jan 18 1"}};

const TOPICS = {
  '1': 'The Linux Community & Open Source',
  '2': 'Finding Your Way on Linux',
  '3': 'The Power of the Command Line',
  '4': 'The Linux Operating System',
  '5': 'Security & File Permissions'
};

const ENCOURAGEMENTS = [
  {big:'🎯',h:'Nailed it!',p:'You\'re building real understanding.'},
  {big:'🧠',h:'Great recall!',p:'That knowledge is sticking.'},
  {big:'⚡',h:'Quick thinking!',p:'Your Linux skills are growing.'},
  {big:'🚀',h:'On fire!',p:'Keep this momentum going.'},
  {big:'💪',h:'Solid work!',p:'Every answer strengthens your knowledge.'},
];

const STORAGE_KEY = 'lpi_brilliant_v2';
let S = loadState();

function loadState(){try{const s=JSON.parse(localStorage.getItem(STORAGE_KEY));if(s&&s.version===2)return s}catch(e){}return defaultState()}
function defaultState(){return{version:2,mode:'challenge',topicFilter:null,currentSection:null,sectionTab:'lesson',cards:{},streak:0,lastStudyDate:null,totalReviews:0,mastery:{},fcIdx:0,fcFlipped:false,fcFilter:'due'}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(S))}

function updateStreak(){
  const today=new Date().toDateString();
  if(S.lastStudyDate!==today){
    const yesterday=new Date(Date.now()-86400000).toDateString();
    S.streak=(S.lastStudyDate===yesterday)?S.streak+1:1;
    S.lastStudyDate=today;save();
  }
}

function getCardState(id){if(!S.cards[id])S.cards[id]={interval:0,ease:2.5,due:0,reps:0,lapses:0};return S.cards[id]}
function gradeCard(cardId,grade){
  const c=getCardState(cardId),now=Date.now();
  if(grade===0){c.reps=0;c.interval=1;c.lapses++;c.ease=Math.max(1.3,c.ease-0.2)}
  else{if(c.reps===0)c.interval=1;else if(c.reps===1)c.interval=3;else c.interval=Math.round(c.interval*c.ease);c.reps++;c.ease+=grade===3?0.15:grade===1?-0.15:0;c.ease=Math.max(1.3,c.ease)}
  c.due=now+c.interval*86400000;S.totalReviews++;updateStreak();
  const secId=cardId.split('::')[0];
  if(!S.mastery[secId])S.mastery[secId]={seen:0,correct:0,total:0,level:0};
  S.mastery[secId].seen++;S.mastery[secId].total++;
  if(grade>=2)S.mastery[secId].correct++;
  S.mastery[secId].level=Math.min(3,Math.floor((S.mastery[secId].correct/Math.max(1,S.mastery[secId].total))*4));
  save();
}
function isDue(id){const c=S.cards[id];return !c||Date.now()>=c.due}

function buildAllCards(){
  const cards=[];
  for(const[secId,sec]of Object.entries(DATA)){
    // Q&A pairs - keep short, skip overly long ones
    sec.qa_pairs.forEach((qa,i)=>{
      if(qa.question.length<250)cards.push({id:`${secId}::qa::${i}`,type:'question',section:secId,topic:sec.topic_num,difficulty:qa.difficulty,front:qa.question.substring(0,200),back:qa.answer.substring(0,300),sectionTitle:sec.title});
    });
    // Commands: forward (cmd→meaning) AND reverse (meaning→cmd)
    sec.commands.forEach((cmd,i)=>{if(cmd.command.length>3&&cmd.command.length<60&&cmd.context.length>5){
      cards.push({id:`${secId}::cmd::${i}`,type:'command',section:secId,topic:sec.topic_num,difficulty:'intermediate',front:`💻 What does this do?\n\n$ ${cmd.command}`,back:cmd.context,sectionTitle:sec.title});
      cards.push({id:`${secId}::cmdR::${i}`,type:'reverse',section:secId,topic:sec.topic_num,difficulty:'intermediate',front:`⌨️ What command?\n\n${cmd.context}`,back:`$ ${cmd.command}`,sectionTitle:sec.title});
    }});
    // Concepts: forward (term→def) AND reverse (def→term)
    sec.concepts.forEach((c,i)=>{if(c.term.length>3&&c.term.length<35&&!/^(There|This|But|On|The|It|A |An )/i.test(c.term)){
      // Remove the term itself from the definition to avoid giving it away
      const cleanDef=c.definition.replace(new RegExp(c.term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),'_____').substring(0,200);
      cards.push({id:`${secId}::concept::${i}`,type:'concept',section:secId,topic:sec.topic_num,difficulty:'basic',front:`📝 Define:\n\n${c.term}`,back:cleanDef,sectionTitle:sec.title});
      cards.push({id:`${secId}::conceptR::${i}`,type:'reverse',section:secId,topic:sec.topic_num,difficulty:'basic',front:`🔍 What term?\n\n${cleanDef.substring(0,150)}`,back:c.term,sectionTitle:sec.title});
    }});
  }
  // Shuffle by default using seeded shuffle (consistent per session)
  return shuffleArray(cards);
}
function shuffleArray(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*( i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
const ALL_CARDS=buildAllCards();
function getDueCards(){return ALL_CARDS.filter(c=>isDue(c.id))}
function getCardsBySection(secId){return ALL_CARDS.filter(c=>c.section===secId)}

const root=document.getElementById('root');
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// Track if we just graded (to show encouragement)
let showEncouragement=false;
let lastGrade=-1;

function render(){
  let html=`<div class="header"><h1>🐧 Linux Essentials</h1>${S.streak>0?`<div class="streak">🔥 ${S.streak}</div>`:''}</div>
  <div class="nav" id="nav">
    <button data-m="challenge" class="${S.mode==='challenge'?'active':''}">⚡ Practice</button>
    <button data-m="learn" class="${S.mode==='learn'?'active':''}">📖 Learn</button>
    <button data-m="terminal" class="${S.mode==='terminal'?'active':''}">💻 Terminal</button>
    <button data-m="flashcards" class="${S.mode==='flashcards'?'active':''}">🃏 Cards</button>
    <button data-m="progress" class="${S.mode==='progress'?'active':''}">📊 Stats</button>
  </div>`;
  switch(S.mode){
    case 'challenge':html+=renderChallenge();break;
    case 'learn':html+=renderLearn();break;
    case 'terminal':html+=renderTerminal();break;
    case 'flashcards':html+=renderFlashcards();break;
    case 'progress':html+=renderProgress();break;
  }
  root.innerHTML=html;
  bindEvents();
  if(S.mode==='terminal')bindTerminalEvents();
}

function renderChallenge(){
  if(showEncouragement&&lastGrade>=2){
    const e=ENCOURAGEMENTS[Math.floor(Math.random()*ENCOURAGEMENTS.length)];
    showEncouragement=false;
    setTimeout(()=>render(),1500);
    return`<div class="encourage"><div class="big">${e.big}</div><h3>${e.h}</h3><p>${e.p}</p></div>`;
  }
  showEncouragement=false;

  if(S.currentSection) return renderSectionChallenge();
  const due=getDueCards();
  let html=renderPills();
  html+=`<div style="text-align:center;margin-bottom:1.2rem;color:var(--muted);font-size:0.85rem"><strong style="color:var(--primary)">${due.length}</strong> questions waiting for you</div>`;
  html+=`<div class="grid">`;
  for(const[id,sec]of Object.entries(DATA)){
    if(S.topicFilter&&sec.topic_num!==S.topicFilter)continue;
    const m=S.mastery[id]||{level:0};
    const sectionDue=getCardsBySection(id).filter(c=>isDue(c.id)).length;
    const totalCards=getCardsBySection(id).length;
    const pct=totalCards?Math.round(((totalCards-sectionDue)/totalCards)*100):0;
    const colors=['var(--card)','var(--amber-light)','var(--primary-light)','var(--green-light)'];
    html+=`<div class="sec-card" data-sec="${id}">
      <div class="icon" style="background:${colors[m.level]}">${['📘','📙','📕','✅'][m.level]}</div>
      <div class="info"><h3>${sec.title}</h3><div class="meta">Topic ${sec.topic_num} · ${sectionDue} due</div></div>
      <div class="ring ring-${m.level}">${pct}%</div>
    </div>`;
  }
  html+=`</div>`;
  return html;
}

function renderSectionChallenge(){
  const sec=DATA[S.currentSection];
  const cards=getCardsBySection(S.currentSection).filter(c=>isDue(c.id));
  const allCards=getCardsBySection(S.currentSection);
  const done=allCards.length-cards.length;
  const pct=allCards.length?Math.round((done/allCards.length)*100):100;

  if(cards.length===0){
    return`<button class="back-btn" data-back>← Back</button>
      <div class="encourage"><div class="big">🎉</div><h3>Section complete!</h3><p>All ${allCards.length} cards reviewed. Come back later for spaced review.</p></div>`;
  }
  const card=cards[0];
  const isNew=!S.cards[card.id]||S.cards[card.id].reps===0;

  return`<button class="back-btn" data-back>← Back</button>
    <div class="focus">
      <div class="focus-progress"><div class="bar"><div class="fill" style="width:${pct}%"></div></div><span>${done}/${allCards.length}</span></div>
      <div class="focus-label">${isNew?'🆕 New':'🔄 Review'} · ${card.type}</div>
      <div class="focus-q">${esc(card.front)}</div>
      <button class="btn btn-primary" id="revealBtn">Show Answer</button>
      <button class="btn btn-outline btn-sm" id="hintBtn" style="margin-left:0.5rem">💡 Hint</button>
      <div class="answer answer-hidden" id="hintBox" style="border-left-color:var(--amber);background:var(--amber-light);margin-top:1rem">${getHint(card)}</div>
      <div class="answer answer-hidden" id="answerBox">${esc(card.back)}</div>
      <div class="grades answer-hidden" id="gradeBox">
        <div class="grade grade-0" data-grade="0"><span class="emoji">😵</span><span class="label">Missed</span></div>
        <div class="grade grade-1" data-grade="1"><span class="emoji">😅</span><span class="label">Hard</span></div>
        <div class="grade grade-2" data-grade="2"><span class="emoji">👍</span><span class="label">Good</span></div>
        <div class="grade grade-3" data-grade="3"><span class="emoji">⚡</span><span class="label">Easy</span></div>
      </div>
    </div>`;
}

function getHint(card){
  const sec=DATA[card.section];
  if(sec.explanations&&sec.explanations.length>0)return esc(sec.explanations[0].substring(0,250)+'...');
  const summary=sec.summary||'';
  return esc(summary.substring(0,200)+'...');
}

function renderLearn(){
  if(S.currentSection)return renderSectionLearn();
  let html=renderPills()+`<div class="grid">`;
  for(const[id,sec]of Object.entries(DATA)){
    if(S.topicFilter&&sec.topic_num!==S.topicFilter)continue;
    const m=S.mastery[id]||{level:0};
    const colors=['var(--card)','var(--amber-light)','var(--primary-light)','var(--green-light)'];
    html+=`<div class="sec-card" data-sec="${id}">
      <div class="icon" style="background:${colors[m.level]}">📖</div>
      <div class="info"><h3>${sec.title}</h3><div class="meta">Topic ${sec.topic_num}: ${sec.topic}</div></div>
    </div>`;
  }
  return html+`</div>`;
}

function renderSectionLearn(){
  const sec=DATA[S.currentSection];
  const tab=S.sectionTab||'lesson';
  let html=`<button class="back-btn" data-back>← Back</button><div class="panel"><h2>${S.currentSection} — ${sec.title}</h2>
    <div class="tabs">
      <button data-tab="lesson" class="${tab==='lesson'?'active':''}">Lesson</button>
      <button data-tab="concepts" class="${tab==='concepts'?'active':''}">Concepts</button>
      <button data-tab="commands" class="${tab==='commands'?'active':''}">Commands</button>
      <button data-tab="exercises" class="${tab==='exercises'?'active':''}">Exercises</button>
    </div>`;
  if(tab==='lesson'){
    html+=`<div class="lesson-text">${esc(sec.full_lesson||sec.lesson_excerpt)}</div>`;
  }else if(tab==='concepts'){
    const valid=sec.concepts.filter(c=>c.term.length>3&&c.term.length<35&&!/^(There|This|But|On|The|It|A |An )/i.test(c.term));
    if(valid.length===0)html+=`<p style="color:var(--muted)">See lesson text for concepts.</p>`;
    else valid.forEach(c=>{html+=`<div style="background:var(--card);padding:0.8rem 1rem;border-radius:8px;margin-bottom:0.5rem;border-left:3px solid var(--primary)"><strong style="color:var(--primary)">${esc(c.term)}</strong><p style="font-size:0.84rem;margin-top:0.2rem;color:var(--muted)">${esc(c.definition)}</p></div>`});
  }else if(tab==='commands'){
    if(!sec.commands.length)html+=`<p style="color:var(--muted)">No commands in this section.</p>`;
    else sec.commands.forEach(cmd=>{html+=`<div style="background:#1e1e2e;padding:0.6rem 1rem;border-radius:8px;margin-bottom:0.4rem;font-family:monospace"><code style="color:#a6e3a1">$ ${esc(cmd.command)}</code><p style="font-size:0.78rem;color:#a6adc8;margin-top:0.2rem">${esc(cmd.context)}</p></div>`});
  }else if(tab==='exercises'){
    sec.qa_pairs.forEach((qa,i)=>{html+=`<div style="background:var(--card);padding:1rem;border-radius:8px;margin-bottom:0.8rem"><p style="font-size:0.88rem;white-space:pre-wrap;word-break:break-word;margin-bottom:0.8rem"><strong>Q${i+1}.</strong> ${esc(qa.question)}</p><button class="btn btn-outline btn-sm" onclick="this.nextElementSibling.classList.toggle('answer-hidden')">Show Answer</button><div class="answer answer-hidden" style="margin-top:0.8rem">${esc(qa.answer)}</div></div>`});
  }
  return html+`</div>`;
}

function renderFlashcards(){
  let filtered=ALL_CARDS;
  if(S.topicFilter)filtered=filtered.filter(c=>c.topic===S.topicFilter);
  if(S.fcFilter==='due')filtered=filtered.filter(c=>isDue(c.id));
  else if(S.fcFilter==='new')filtered=filtered.filter(c=>!S.cards[c.id]);

  let html=renderPills();

  html+=`<div class="fc-wrap"><div class="fc ${S.fcFlipped?'flipped':''}" id="flashcard">
    <div class="fc-face fc-front"><span class="fc-type">${card.type} · ${card.sectionTitle}</span><h3>${esc(card.front)}</h3></div>

  <div class="fc-nav"><button data-fc="prev">←</button><span style="color:var(--muted);font-size:0.8rem">${idx+1}/${filtered.length}</span><button data-fc="next">→</button><button data-fc="shuffle">🔀 Reshuffle</button></div>`;
  if(S.fcFlipped){
    html+=`<div class="grades" style="margin-top:1rem">
      <div class="grade grade-0" data-grade="0" data-card="${card.id}"><span class="emoji">😵</span><span class="label">Missed</span></div>

      <div class="grade grade-3" data-grade="3" data-card="${card.id}"><span class="emoji">⚡</span><span class="label">Easy</span></div>
    </div>`;
  }
  return html;
}

function renderProgress(){
  const total=ALL_CARDS.length,reviewed=Object.keys(S.cards).length;
  const mastered=Object.values(S.cards).filter(c=>c.reps>=3).length;
  const due=getDueCards().length;
  let html=`<div class="stats">
    <div class="stat"><div class="n">${S.totalReviews}</div><div class="l">Reviews</div></div>
    <div class="stat"><div class="n">${reviewed}/${total}</div><div class="l">Cards Seen</div></div>
    <div class="stat"><div class="n">${mastered}</div><div class="l">Mastered</div></div>
    <div class="stat"><div class="n">${due}</div><div class="l">Due</div></div>
  </div>
  <div class="progress-bar" style="margin-bottom:1.5rem"><div class="progress-fill pf-primary" style="width:${(reviewed/total)*100}%"></div></div>`;

  for(const[num,name]of Object.entries(TOPICS)){
    html+=`<div style="margin-bottom:1rem"><div style="font-weight:600;font-size:0.85rem;margin-bottom:0.4rem">Topic ${num}: ${name}</div>`;
    Object.entries(DATA).filter(([,s])=>s.topic_num===num).forEach(([id,sec])=>{
      const m=S.mastery[id]||{level:0};
      const cards=getCardsBySection(id);
      const pct=cards.length?Math.round((cards.filter(c=>!isDue(c.id)).length/cards.length)*100):0;
      html+=`<div style="display:flex;align-items:center;gap:0.5rem;padding:0.3rem 0;font-size:0.82rem">
        <span>${['⬜','🟨','🟦','🟩'][m.level]}</span><span style="flex:1">${sec.title}</span><span style="color:var(--muted)">${pct}%</span></div>`;
    });
    html+=`</div>`;
  }
  html+=`<button class="btn btn-outline btn-sm" onclick="if(confirm('Reset all progress?')){localStorage.removeItem('${STORAGE_KEY}');location.reload()}">Reset Progress</button>`;
  return html;
}

function renderPills(){
  let h=`<div class="pills"><button class="${!S.topicFilter?'active':''}" data-topic="">All</button>`;
  for(const[num,name]of Object.entries(TOPICS))h+=`<button class="${S.topicFilter===num?'active':''}" data-topic="${num}">T${num}</button>`;
  return h+`</div>`;
}

function execCommand(input){
  const cmd=input.trim();if(!cmd)return;

    const lab=TERM_LABS.find(l=>l.id===currentLab);

function simulateCommand(cmd){
  const parts=cmd.split(/\s+/),base=parts[0];
  switch(base){
    case'pwd':return VFS.cwd;
    case'whoami':return VFS.user;
    case'hostname':return'linux-lab';
    case'id':return parts[1]==='-un'?VFS.user:parts[1]==='-Gn'?'student sudo users':'uid=1000(student) gid=1000(student) groups=1000(student),27(sudo)';
    case'who':return'student  pts/0  2026-06-05 10:00';
    case'w':return' 14:00 up 2 days, 1 user\nUSER  TTY   FROM  LOGIN@  WHAT\nstudent pts/0 :0    10:00   bash';
    case'users':return'student';

    case'uname':return parts.includes('-a')?'Linux linux-lab 5.15.0 x86_64 GNU/Linux':'Linux';

    case'cat':{const p=resolvePath(parts[1]),f=VFS.files[p];if(!f)return`cat: ${parts[1]}: No such file or directory`;if(f.type==='d')return`cat: ${parts[1]}: Is a directory`;return f.content||`[contents of ${parts[1]}]`}
    case'ls':{let target=VFS.cwd,showAll=false,showLong=false;for(let i=1;i<parts.length;i++){if(parts[i].startsWith('-')){if(parts[i].includes('a'))showAll=true;if(parts[i].includes('l'))showLong=true}else target=resolvePath(parts[i])}const dir=VFS.files[target];if(!dir)return`ls: cannot access '${parts[parts.length-1]}': No such file or directory`;if(dir.type==='f'){return showLong?`${dir.perms} 1 ${dir.owner} ${dir.group} ${dir.size} Jun 5 10:00 ${target.split('/').pop()}`:target.split('/').pop()}let items=dir.children||[];if(showAll)items=['.','..', ...items];if(showLong)return items.map(n=>{if(n==='.'||n==='..')return`drwxr-xr-x 2 student student 4096 Jun 5 10:00 ${n}`;const fp=target+'/'+n,f=VFS.files[fp];return f?`${f.perms} 1 ${f.owner} ${f.group} ${f.size||4096} Jun 5 10:00 ${n}`:`drwxr-xr-x 2 student student 4096 Jun 5 10:00 ${n}`}).join('\n');return items.join('  ')}
    case'cd':{const t=parts[1]||VFS.home;VFS.cwd=resolvePath(t==='~'?VFS.home:t);return null}
    case'mkdir':{const n=parts[parts.length-1],p=resolvePath(n);VFS.files[p]={type:'d',children:[]};const par=VFS.cwd;if(VFS.files[par]&&VFS.files[par].children)VFS.files[par].children.push(n);return null}
    case'touch':{const n=parts[1],p=resolvePath(n);VFS.files[p]={type:'f',perms:'-rw-r--r--',owner:VFS.user,group:VFS.user,size:0};const par=VFS.cwd;if(VFS.files[par]&&VFS.files[par].children&&!VFS.files[par].children.includes(n))VFS.files[par].children.push(n);return null}
    case'cp':{const s=parts[1],d=parts[2];const sp=resolvePath(s);if(!VFS.files[sp])return`cp: cannot stat '${s}': No such file or directory`;VFS.files[resolvePath(d)]={...VFS.files[sp]};return null}
    case'mv':{const s=parts[1],d=parts[2];const sp=resolvePath(s);if(!VFS.files[sp])return`mv: cannot stat '${s}': No such file or directory`;VFS.files[resolvePath(d)]=VFS.files[sp];delete VFS.files[sp];return null}
    case'rm':{const target=parts.filter(p=>!p.startsWith('-'))[1];if(!target)return'rm: missing operand';const p=resolvePath(target);if(!VFS.files[p])return`rm: cannot remove '${target}': No such file or directory`;delete VFS.files[p];return null}
    case'rmdir':{const p=resolvePath(parts[1]);delete VFS.files[p];return null}
    case'chmod':case'chown':return null;
    case'grep':{const pat=parts[1]?.replace(/['"]/g,''),file=parts[2];if(!file)return'Usage: grep PATTERN FILE';const p=resolvePath(file),f=VFS.files[p];if(!f)return`grep: ${file}: No such file or directory`;return f.content?f.content.split('\n').filter(l=>l.includes(pat)).join('\n'):`[matches for "${pat}"]`}
    case'wc':{const file=parts[parts.length-1],p=resolvePath(file),f=VFS.files[p];if(!f)return`wc: ${file}: No such file or directory`;if(f.content){const l=f.content.split('\n').length;return parts.includes('-l')?`${l} ${file}`:`  ${l}  ${f.content.split(/\s+/).length} ${f.content.length} ${file}`}return parts.includes('-l')?`5 ${file}`:`  5  25 100 ${file}`}
    case'head':{const n=parts.indexOf('-n')>-1?parseInt(parts[parts.indexOf('-n')+1]):parts[1]?.startsWith('-')?parseInt(parts[1].slice(1)):10;const file=parts[parts.length-1],p=resolvePath(file),f=VFS.files[p];if(!f)return`head: cannot open '${file}'`;return f.content?f.content.split('\n').slice(0,n).join('\n'):`[first ${n} lines]`}
    case'tail':return`[last 10 lines of ${parts[parts.length-1]}]`;
