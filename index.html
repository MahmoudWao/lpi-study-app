the /etc/passwd  file and redirect it to a new file in the your user’s\nDocuments  directory.\n$ tail /etc/passwd > Documents/newfile", "difficulty": "basic"}], "explanations": [], "summary": "Summary\nIn this lab you learned:\n•Types of redirection\n•How to use the redirection operators\n•How to use pipes to filter command output\nCommands used in this lesson:\ncut\nRemoves sections from each line of a file.\ncat\nDisplays or concatenates files.\nfind\nSearches for files in a directory hierarchy.\nless\nDisplays a file, allowing the user to scroll one line at the time.\nmore\nDisplays a file, a page at the time.\nhead\nDisplays the first 10 lines of a file.\ntail\nDisplays the last 10 lines of a file.\nsort\nSorts files.\nwc\nCounts by default the lines, words or bytes of a file.\n\nSummary\nIn this lab you learned:\n•Regular expressions meta-characters\n•How to create patterns with regular expressions\n•How to search within the files\nCommands used in the exercises:\ngrep\nSearches for characters or strings within a file", "lesson_excerpt": "3.2 Searching and Extracting Data from Files\nReference to LPI objectives\nLinux Essentials version 1.6, Exam 010, Objective 3.2\nWeight\n3\nKey Knowledge Areas\n•Command line pipes\n•I/O redirection\n•Basic Regular Expressions using ., [ ], *, and ?\nPartial list of the used files, terms and utilities\n•grep\n•less\n•cat, head, tail\n•sort\n•cut\n•wc\n\n3.2 Lesson 1\nCertificate: Linux Essentials\nVersion: 1.6\nTopic: 3 The Power of the Command Line\nObjective: 3.2 Searching and Extracting Data from Files\nLesson: 1 of 2\nIntroduction\nIn this lab we will be focusing on redirecting or transmitting information from one source to\nanother with the help of specific tools. The Linux command line redirects the information through\nspecific standard channels. The standard input ( stdin  or channel 0) of the command is considered\nto be the keyboard and the standard output ( stdout  or channel 1) is considered the screen. There is\nalso another channel that is meant to redirect error output ( stderr  or channel 2) of a command or\na program’s error messages. The input and/or output can be redirected.\nWhen running a command, sometimes we want to transmit certain information to the command\nor redirect the output to a specific file. Each of these functionalities will be discussed in the next\ntwo sections.\nI/O Redirection\nI/O redirection enables the user to redirect information from or to a command by using a text file.\nAs described earlier, the standard input, output and error output can be redirected, and the\ninformation can be taken from text files.\n\n      \nRedirecting Standard Output\nTo redirect standard output to a file, instead of the screen, we need to use the > operator followed\nby the name of the file. If the file doesn’t exist, a new one will be created, otherwise, the\ninformation will overwrite the existing file.\nIn order to see the contents of the file that we just created, we can use the cat command. By\ndefault, this command displays the contents of a file on the screen. Consult the manual page to\nfind out more about its functionalities.\nThe example below demonstrates the functionality of the operator. In the first instance, a new file\nis created containing the text “Hello World!”:\n$ echo \"Hello World!\" > text\n$ cat text\nHello World!\nIn the second invocation, the same file is overwritten with the new text:\n$ echo \"Hello!\" > text\n$ cat text\nHello!\nIf we want to add new information at the end of the file, we need to use the >> operator. This\noperator also creates a new file if it cannot find an existing one.\nThe first example shows the addition of the text. As it can be seen, the new text was added on the\nfollowing line:\n$ echo \"Hello to you too!\" >> text\n$ cat text\nHello!\nHello to you too!\nThe second example demonstrates that a new file will be created:\n$ echo \"Hello to you too!\" >> text2\n$ cat text2\nHello to you too!\n\nRedirecting Standard Error\nIn order to redirect just the error messages, a user will need to employ the 2> operator followed\nby the name of the file in whic", "full_lesson": "3.2 Searching and Extracting Data from Files\nReference to LPI objectives\nLinux Essentials version 1.6, Exam 010, Objective 3.2\nWeight\n3\nKey Knowledge Areas\n•Command line pipes\n•I/O redirection\n•Basic Regular Expressions using ., [ ], *, and ?\nPartial list of the used files, terms and utilities\n•grep\n•less\n•cat, head, tail\n•sort\n•cut\n•wc\n\n3.2 Lesson 1\nCertificate: Linux Essentials\nVersion: 1.6\nTopic: 3 The Power of the Command Line\nObjective: 3.2 Searching and Extracting Data from Files\nLesson: 1 of 2\nIntroduction\nIn this lab we will be focusing on redirecting or transmitting information from one source to\nanother with the help of specific tools. The Linux command line redirects the information through\nspecific standard channels. The standard input ( stdin  or channel 0) of the command is considered\nto be the keyboard and the standard output ( stdout  or channel 1) is considered the screen. There is\nalso another channel that is meant to redirect error output ( stderr  or channel 2) of a command or\na program’s error messages. The input and/or output can be redirected.\nWhen running a command, sometimes we want to transmit certain information to the command\nor redirect the output to a specific file. Each of these functionalities will be discussed in the next\ntwo sections.\nI/O Redirection\nI/O redirection enables the user to redirect information from or to a command by using a text file.\nAs described earlier, the standard input, output and error output can be redirected, and the\ninformation can be taken from text files.\n\n      \nRedirecting Standard Output\nTo redirect standard output to a file, instead of the screen, we need to use the > operator followed\nby the name of the file. If the file doesn’t exist, a new one will be created, otherwise, the\ninformation will overwrite the existing file.\nIn order to see the contents of the file that we just created, we can use the cat command. By\ndefault, this command displays the contents of a file on the screen. Consult the manual page to\nfind out more about its functionalities.\nThe example below demonstrates the functionality of the operator. In the first instance, a new file\nis created containing the text “Hello World!”:\n$ echo \"Hello World!\" > text\n$ cat text\nHello World!\nIn the second invocation, the same file is overwritten with the new text:\n$ echo \"Hello!\" > text\n$ cat text\nHello!\nIf we want to add new information at the end of the file, we need to use the >> operator. This\noperator also creates a new file if it cannot find an existing one.\nThe first example shows the addition of the text. As it can be seen, the new text was added on the\nfollowing line:\n$ echo \"Hello to you too!\" >> text\n$ cat text\nHello!\nHello to you too!\nThe second example demonstrates that a new file will be created:\n$ echo \"Hello to you too!\" >> text2\n$ cat text2\nHello to you too!\n\nRedirecting Standard Error\nIn order to redirect just the error messages, a user will need to employ the 2> operator followed\nby the name of the file in which the errors will be written. If the file doesn’t exist, a new one will\nbe created, otherwise the file will be overwritten.\nAs explained, the channel for redirecting the standard error is channel 2 . When redirecting the\nstandard error, the channel must be specified, contrary to the other standard output where\nchannel 1  is set by default. For example, the following command searches for a file or directory\nnamed games and only writes the error into the text-error  file, while displaying the standard\noutput on the screen:\n$ find /usr games 2> text-error\n/usr\n/usr/share\n/usr/share/misc\n---------Omitted output----------\n/usr/lib/libmagic.so.1.0.0\n/usr/lib/libdns.so.81\n/usr/games\n$ cat text-error\nfind: `games': No such file or directory\nNOTE For more information about the find command, consult its man page.\nFor example, the following command will run without errors, therefore no information will be\nwritten in the file text-error :\n$ sort /etc/passwd 2> text-error\n$ cat text-error\nAs well as the standard output, the standard error can also be appended to a file with the 2>>\noperator. This will add the new error at the end of the file. If the file doesn’t exist, a new one will\nbe created. The first example shows the addition of the new information into the file, whereas the\nsecond example shows that the command creates a new file where an existing one can’t be found\nwith the same name:\n$ sort /etc 2>> text-error\n$ cat text-error\nsort: read failed: /etc: Is a directory\n\n      \n$ sort /etc/shadow 2>> text-error2\n$ cat text-error2\nsort: open failed: /etc/shadow: Permission denied\nUsing this type of redirection, only the error messages will be redirected to the file, the normal\noutput will be written on the screen or go through standard output or stdout .\nThere is one particular file that technically is a bit bucket  (a file that accepts input and doesn’t do\nanything with it): /dev/null . You can redirect any irrelevant information that you might not\nwant displayed or redirec"}, "3.3": {"title": "Turning Commands into a Script", "topic": "The Power of the Command Line", "topic_num": "3", "concepts": [{"term": "This exercise", "definition": "This exercise is to show you that grep can also receive input from different commands and it"}, {"term": "Each of these locations", "definition": "Each of these locations is where the shell expects to find a command, delimited with colons ( :)."}, {"term": "There", "definition": "There are three solutions to this issue: we can move new_script  into one of the PATH directories,"}, {"term": "This line", "definition": "This line is called a bang line  or more commonly a shebang . It indicates to the system how we want"}, {"term": "Text editors", "definit eck user input in scripts.\nCommands used in the exercises:\nshift\nThis will remove the first element of an array.\nSpecial Variables:\n$?\nContains the exit code of the last command executed.\n$@, $*\nContain all arguments passed to the script, as an array.", "lesson_excerpt": "read, write and execute as the group permissions. Your answer might be different, depending\non the command that you chose and the pattern that you created.\n$ cat contents.txt | tr -s \" \" | grep \"^....rwx\"\nThis exercise is to show you that grep can also receive input from different commands and it\ncan help in filtering generated information.\n\n      \n3.3 Turning Commands into a Script\nReference to LPI objectives\nLinux Essentials version 1.6, Exam 010, Objective 3.3\nWeight\n4\nKey knowledge areas\n•Basic shell scripting\n•Awareness of common text editors (vi and nano)\nPartial list of the used files, terms and utilities\n•#! (shebang)\n•/bin/bash\n•Variables\n•Arguments\n•for loops\n•echo\n•Exit status\n\n3.3 Lesson 1\nCertificate: Linux Essentials\nVersion: 1.6\nTopic: 3 The Power of the Command Line\nObjective: 3.3 Turning Commands into a Script\nLesson: 1 of 2\nIntroduction\nWe have been learning to execute commands from the shell thus far, but we can also enter\ncommands into a file, and then set that file to be executable. When the file is executed, those\ncommands are run one after the other. These executable files are called scripts , and they are an\nabsolutely crucial tool for any Linux system administrator. Essentially, we can consider Bash to be\na programming language as well as a shell.\nPrinting Output\nLet’s begin by demonstrating a command that you may have seen in previous lessons: echo will\nprint an argument to standard output.\n$ echo \"Hello World!\"\nHello World!\nNow, we will use file redirection to send this command to a new file called new_script .\n\n      \n$ echo 'echo \"Hello World!\"' > new_script\n$ cat new_script\necho \"Hello World!\"\nThe file new_script  now contains the same command as before.\nMaking a Script Executable\nLet’s demonstrate some of the steps required to make this file execute the way we expect it to. A\nuser’s first thought might be to simply type the name of the script, the way they might type in the\nname of any other command:\n$ new_script\n/bin/bash: new_script: command not found\nWe can safely assume that new_script  exists in our current location, but notice that the error\nmessage isn’t telling us that the file doesn’t exist, it is telling us that the command  doesn’t exist. It\nwould be useful to discuss how Linux handles commands and executables.\nCommands and PATH\nWhen we type the ls command into the shell, for example, we are executing a file called ls that\nexists in our filesystem. You can prove this by using which:\n$ which ls\n/bin/ls\nIt would quickly become tiresome to type in the absolute path of ls every time we wish to look at\nthe contents of a directory, so Bash has an environment variable  which contains all the directories\nwhere we might find the commands we wish to run. You can view the contents of this variable by\nusing echo.\n$ echo $PATH\n/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:/sn\nap/bin\nEach of these locations is where the shell expects to find a command, delimited with colons ( ", "full_lesson": "read, write and execute as the group permissions. Your answer might be different, depending\non the command that you chose and the pattern that you created.\n$ cat contents.txt | tr -s \" \" | grep \"^....rwx\"\nThis exercise is to show you that grep can also receive input from different commands and it\ncan help in filtering generated information.\n\n      \n3.3 Turning Commands into a Script\nReference to LPI objectives\nLinux Essentials version 1.6, Exam 010, Objective 3.3\nWeight\n4\nKey knowledge areas\n•Basic shell scripting\n•Awareness of common text editors (vi and nano)\nPartial list of the used files, terms and utilities\n•#! (shebang)\n•/bin/bash\n•Variables\n•Arguments\n•for loops\n•echo\n•Exit status\n\n3.3 Lesson 1\nCertificate: Linux Essentials\nVersion: 1.6\nTopic: 3 The Power of the Command Line\nObjective: 3.3 Turning Commands into a Script\nLesson: 1 of 2\nIntroduction\nWe have been learning to execute commands from the shell thus far, but we can also enter\ncommands into a file, and then set that file to be executable. When the file is executed, those\ncommands are run one after the other. These executable files are called scripts , and they are an\nabsolutely crucial tool for any Linux system administrator. Essentially, we can consider Bash to be\na programming language as well as a shell.\nPrinting Output\nLet’s begin by demonstrating a command that you may have seen in previous lessons: echo will\nprint an argument to standard output.\n$ echo \"Hello World!\"\nHello World!\nNow, we will use file redirection to send this command to a new file called new_script .\n\n      \n$ echo 'echo \"Hello World!\"' > new_script\n$ cat new_script\necho \"Hello World!\"\nThe file new_script  now contains the same command as before.\nMaking a Script Executable\nLet’s demonstrate some of the steps required to make this file execute the way we expect it to. A\nuser’s first thought might be to simply type the name of the script, the way they might type in the\nname of any other command:\n$ new_script\n/bin/bash: new_script: command not found\nWe can safely assume that new_script  exists in our current location, but notice that the error\nmessage isn’t telling us that the file doesn’t exist, it is telling us that the command  doesn’t exist. It\nwould be useful to discuss how Linux handles commands and executables.\nCommands and PATH\nWhen we type the ls command into the shell, for example, we are executing a file called ls that\nexists in our filesystem. You can prove this by using which:\n$ which ls\n/bin/ls\nIt would quickly become tiresome to type in the absolute path of ls every time we wish to look at\nthe contents of a directory, so Bash has an environment variable  which contains all the directories\nwhere we might find the commands we wish to run. You can view the contents of this variable by\nusing echo.\n$ echo $PATH\n/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:/sn\nap/bin\nEach of these locations is where the shell expects to find a command, delimited with colons ( :).\nYou will notice that /bin is present, but it is safe to assume that our current location is not. The\n\nshell will search for new_script  in each of these directories, but it will not find it and therefore\nwill throw the error we saw above.\nThere are three solutions to this issue: we can move new_script  into one of the PATH directories,\nwe can add our current directory to PATH, or we can change the way we attempt to call the script.\nThe latter solution is easiest, it simply requires us to specify the current location  when calling the\nscript using dot slash ( ./).\n$ ./new_script\n/bin/bash: ./new_script: Permission denied\nThe error message has changed, which indicates that we have made some progress.\nExecute Permissions\nThe first investigation a user should do in this case is to use ls -l to look at the file:\n$ ls -l new_script\n-rw-rw-r-- 1 user user 20 Apr 30 12:12 new_script\nWe can see that the permissions for this file are set to 664 by default. We have not set this file to\nhave execute permissions  yet.\n$ chmod +x new_script\n$ ls -l new_script\n-rwxrwxr-x 1 user user 20 Apr 30 12:12 new_script\nThis command has given execute permissions to all users. Be aware that this might be a security\nrisk, but for now this is an acceptable level of permission.\n$ ./new_script\nHello World!\nWe are now able to execute our script.\nDefining the Interpreter\nAs we have demonstrated, we were able to simply enter text into a file, set it as an executable, and\n\n      \nrun it. new_script  is functionally still a normal text file, but we managed to have it be\ninterpreted by Bash. But what if it is written in Perl, or Python?\nIt is very good practice to specify the type of interpreter we want to use in the first line of a script.\nThis line is called a bang line  or more commonly a shebang . It indicates to the system how we want\nthis file to be executed. Since we are learning Bash, we will be using the absolute path to our Bash\nexecutable, once again using which:\n$ which bash\n/bin/bash\nO"}, "4.1": {"title": "Choosing an Operating System", "topic": "The Linux Operating System", "topic_num": "4", "concepts": [{"term": "No matter if you", "definition": "No matter if you are using your computer system at home, at the university or within an"}, {"term": "Kernel that", "definition": "Kernel that is in use  when the distribution boots."}, {"term": "Distributions such as Ubuntu", "definition": "Distributions such as Ubuntu are more targeted for small business or home and hobbyist users."}, {"term": "Some Linux distributions", "definition": "Some Linux distributions are related to each other. Ubuntu, for example, is based on Debian"}, {"term": "Although it", "definition": "Although it is proprietary software and is not free, often the operating system license is included"}], "commands": [{"command": "uname -r", "context": "version of the Linux kernel that you are running by reading the kernel release :"}, {"command": "uname -s", "context": "operating system:"}], "qa_pairs": [{"question": "Which project makes up the common component of all Linux distributions?\nCentOS\nRed Hat\nUbuntu\nLinux Kernel\nCoreOS", "answer": "Which project makes up the common component of all Linux distributions?\nCentOS\nRed Hat\nUbuntu\nLinux Kernel X\nCoreOS", "difficulty": "intermediate"}, {"question": "Which operating system is reported in use for macOS from Apple?\nOS X\nOSX\nDarwin\nMacOS", "answer": "Which operating system is reported in use for OS X from Apple?\nOS X\nOSX\nDarwin X\nMacOS", "difficulty": "intermediate"}, {"question": "How does a Linux distribution differ from the Linux kernel?\nThe kernel is part of a distribution, the\ndistribution as applications to surround the\nkernel to make it useful\nThe kernel is the Linux distribution\nAll distributions that use the same kernel are\nthe same", "answer": "How does a Linux distribution differ from the Linux kernel?\nThe kernel is part of a distribution, the\ndistribution as applications to surround the\nkernel to make it usefulX\nThe kernel is the Linux distribution\nAll distributions that use the same kernel are\nthe same", "difficulty": "basic"}, {"question": "Which of the following is a desktop environment in Linux?\nMint\nElementary\nZorin\nGnome", "answer": "Which of the following is a desktop environment in Linux?\nMint\nElementary\nZorin\nGnome X", "difficulty": "intermediate"}, {"question": "Which component of an operating system allows access to hardware?\n\nDrivers\nShells\nService\nApplication", "answer": "Which component of an operating system allows access to hardware?\n\nDrivers X\nShells\nService\nApplication", "difficulty": "intermediate"}], "explanations": [], "summary": "Summary\nIn this section you have learned how to differentiate between different operating systems\ncommonly available. We discussed:\n•Linux Based Operating Systems\n•UNIX\n•macOS\n•Windows Based Operation Systems\nWithin the Linux category we could further break the selection down into distributions with long\nterm support and those with a shorter support cycle. LTS versions being more suited to the\nEnterprise and shorter term support being targeted toward home and hobby users.\n•Enterprise Grade Linux Distributions\n◦Red Hat Enterprise Linux\n◦CentOS\n◦SUSE Linux Enterprise Server\n◦Debian GNU/Linux\n◦Ubuntu LTS\n•Consumer Grade Linux Distributions\n◦Fedora\n◦Ubuntu non-LTS\n◦openSUSE\n•Experimental and Hacker Linux Distributions\n◦Arch\n◦Gentoo", "lesson_excerpt": "Topic 4: The Linux Operating System\n\n      \n4.1 Choosing an Operating System\nReference to LPI objectives\nLinux Essentials version 1.6, Exam 010, Objective 4.1\nWeight\n1\nKey knowledge areas\n•Differences between Windows, OS X and Linux\n•Distribution life cycle management\nPartial list of the used files, terms and utilities\n•GUI versus command line, desktop configuration\n•Maintenance cycles, beta and stable\n\n4.1 Lesson 1\nCertificate: Linux Essentials\nVersion: 1.6\nTopic: 4 The Linux Operating System\nObjective: 4.1 Choosing an Operating System\nLesson: 1 of 1\nIntroduction\nNo matter if you are using your computer system at home, at the university or within an\nenterprise, there still has to be a decision made on the operating system that you will use. This\ndecision may be made by you, especially if it is your computer, but you may also be responsible\nfor making the choice across systems in your business. As always, being well-informed about the\nchoices available will aid you in making a responsible decision. In this lesson we aim to help keep\nyou informed of the operating system choices that you may be considering.\nWhat is an Operating System\nOne of the first things that we must be sure of before we begin our journey in choosing an\noperating system is to understand what we mean by the term. The operating system lies at the\nheart of your computer and allows applications to run within and on top of it. Additionally, the\noperating system will contain drivers to access the computer’s hardware such as disks and\npartitions, screens, keyboards, network cards and so on. We often abbreviate the operating\nsystem to simply the OS. Today there are many operating systems available for both business\ncomputer usage as well as for those looking for something in the home. If we want to simplify the\nselection available to us, we can group selections as follows:\n\n      \n•Linux-based Operating Systems\n◦Enterprise Linux\n◦Consumer Linux\n•UNIX\n•macOS\n•Windows-based Operation Systems\n◦Windows Servers\n◦Windows Desktops\nChoosing a Linux Distribution\nThe Linux Kernel and Linux Distributions\nWhen talking about Linux distributions the operating system is Linux. Linux is the kernel  and at\nthe core of every Linux distribution. The software of the Linux kernel is maintained by a group of\nindividuals, lead by Linus Torvalds. Torvalds is employed by an industry consortium called The\nLinux Foundation  to work on the Linux kernel.\nNOTEThe Linux kernel was first developed by Linus Torvalds, a student from Finland,\nback in 1991. In 1992, the first Kernel release under the GNU General Public\nLicense version 2 (GPLv2) was version 0.12.\nLinux Kernel\nAs we have mentioned, all Linux distributions run the same operating system, Linux.\nLinux Distribution\nWhen people talk about Red Hat Linux, or Ubuntu Linux they are referring to the Linux\ndistribution . The Linux distribution will ship with a Linux kernel and an environment that\nmakes the kernel useful in a way that we can interact with it. At a min", "full_lesson": "Topic 4: The Linux Operating System\n\n      \n4.1 Choosing an Operating System\nReference to LPI objectives\nLinux Essentials version 1.6, Exam 010, Objective 4.1\nWeight\n1\nKey knowledge areas\n•Differences between Windows, OS X and Linux\n•Distribution life cycle management\nPartial list of the used files, terms and utilities\n•GUI versus command line, desktop configuration\n•Maintenance cycles, beta and stable\n\n4.1 Lesson 1\nCertificate: Linux Essentials\nVersion: 1.6\nTopic: 4 The Linux Operating System\nObjective: 4.1 Choosing an Operating System\nLesson: 1 of 1\nIntroduction\nNo matter if you are using your computer system at home, at the university or within an\nenterprise, there still has to be a decision made on the operating system that you will use. This\ndecision may be made by you, especially if it is your computer, but you may also be responsible\nfor making the choice across systems in your business. As always, being well-informed about the\nchoices available will aid you in making a responsible decision. In this lesson we aim to help keep\nyou informed of the operating system choices that you may be considering.\nWhat is an Operating System\nOne of the first things that we must be sure of before we begin our journey in choosing an\noperating system is to understand what we mean by the term. The operating system lies at the\nheart of your computer and allows applications to run within and on top of it. Additionally, the\noperating system will contain drivers to access the computer’s hardware such as disks and\npartitions, screens, keyboards, network cards and so on. We often abbreviate the operating\nsystem to simply the OS. Today there are many operating systems available for both business\ncomputer usage as well as for those looking for something in the home. If we want to simplify the\nselection available to us, we can group selections as follows:\n\n      \n•Linux-based Operating Systems\n◦Enterprise Linux\n◦Consumer Linux\n•UNIX\n•macOS\n•Windows-based Operation Systems\n◦Windows Servers\n◦Windows Desktops\nChoosing a Linux Distribution\nThe Linux Kernel and Linux Distributions\nWhen talking about Linux distributions the operating system is Linux. Linux is the kernel  and at\nthe core of every Linux distribution. The software of the Linux kernel is maintained by a group of\nindividuals, lead by Linus Torvalds. Torvalds is employed by an industry consortium called The\nLinux Foundation  to work on the Linux kernel.\nNOTEThe Linux kernel was first developed by Linus Torvalds, a student from Finland,\nback in 1991. In 1992, the first Kernel release under the GNU General Public\nLicense version 2 (GPLv2) was version 0.12.\nLinux Kernel\nAs we have mentioned, all Linux distributions run the same operating system, Linux.\nLinux Distribution\nWhen people talk about Red Hat Linux, or Ubuntu Linux they are referring to the Linux\ndistribution . The Linux distribution will ship with a Linux kernel and an environment that\nmakes the kernel useful in a way that we can interact with it. At a minimum we would need a\ncommand line shell such as Bash and a set of basic commands allowing us to access and\nmanage the system. Often, of course, the Linux distribution will have a full Desktop\nEnvironment such as Gnome or KDE.\nEven though each Linux distribution runs the Linux operating system, distributions can and do\nvary on the version of the operating system that is used. By this, we mean, the version of the Linux\nKernel that is in use  when the distribution boots.\nTIPIf you have access to a Linux command line at the moment, you can easily check the\n\nversion of the Linux kernel that you are running by reading the kernel release :\n$ uname -r\n4.15.0-1019-aws\nTypes of Linux Distributions\nIt may seem an obvious choice to always run the latest version of the Linux kernel but it is not\nquite as simple as that. We can vaguely categorize Linux distributions into three sets:\n•Enterprise Grade Linux Distributions\n◦Red Hat Enterprise Linux\n◦CentOS\n◦SUSE Linux Enterprise Server\n◦Debian GNU/Linux\n◦Ubuntu LTS\n•Consumer Grade Linux Distributions\n◦Fedora\n◦Ubuntu non-LTS\n◦openSUSE\n•Experimental and Hacker Linux Distributions\n◦Arch\n◦Gentoo\nThis, of course, is a just a very small subset of possible distributions but the importance is the\ndifference between enterprise , consumer  and experimental  distributions and why each exists.\nEnterprise Grade Linux\nDistributions such as CentOS ( Community Enterprise OS ) are designed to be deployed within\nlarge organizations using enterprise hardware. The needs of the enterprise are very different\nfrom the needs of the small business, hobbyist or home user. In order to ensure the availability\nof their services, enterprise users have higher requirements regarding the stability of their\nhard- and software. Therefore, enterprise Linux distributions tend to include older releases of\nthe kernel and other software, which are known to work reliably. Often the distributions port\nimportant updates like security fixes back to these stable versions. In r"}, "4.2": {"title": "Understanding Computer Hardware", "topic": "The Linux Operating System", "topic_num": "4", "concepts": [{"term": "Even the cloud", "definition": "Even the cloud is ultimately backed by hardware."}, {"term": "There", "definition": "There are a large number of motherboard configurations. They support different processors and"}, {"term": "Administrators", "definition": "Administrators are mostly exposed to motherboard configuration when there is a need to identify"}, {"term": "When power", "definition": "When power is first applied there is motherboard specific hardware that must be configured and"}, {"term": "There", "definition": "There are very few firmware settings of interest to general users so only individuals responsible"}, {"term": "There", "definition": "There are several ways to obtain information about system memory. As a user, the total amount"}, {"term": "Core", "definition": "Core refers to an individual CPU. In addition to core representing a physical CPU, Hyper-"}, {"term": "SSDs", "definition": "SSDs are effectively more sophisticated versions of USB memory sticks with significantly larger"}, {"term": "Storage capacity", "definition": "Storage capacity is constantly increasing for HDDs and SSDs. Today, 5 terabyte HDDs and 1"}, {"term": "Users see partitions as if they", "definition": "Users see partitions as if they are individual devices. This makes it easy to overlook the fact that"}, {"term": "Device files", "definition": "Device files are found in the /dev directory and identify physical devices, device access, and"}, {"term": "While it", "definition": "While it is beyond the scope of this lesson to cover the contents of the /dev directory it is"}], "commands": [{"command": "uname -r", "context": "line."}, {"command": "free -m", "context": "would be to run the command free along with the parameter -m to use megabytes in the output:"}, {"command": "lscpu", "context": "command lscpu. Output from a Raspberry Pi B+:"}, {"command": "lsblk", "context": "Partitions  and Drivers  lessons that follow:"}, {"command": "ls -l mmcblk *", "context": "as a prefix:"}], "qa_pairs": [{"question": "Describe these terms:\nProcessor\nCPU\nGPU", "answer": "Describe these terms:\nProcessor\nA general term that applies to any type of processor. Often used incorrectly as a synonym for\nCPU.\nCPU\nA Central Processing Unit. A processing unit providing support for general purpose\ncomputational tasks.\nGPU\nA Graphical Processing Unit. A processing unit optimized for supporting activities relating to\nthe presentation of graphics.", "difficulty": "advanced"}, {"question": "If you are primarily running video editing applications (a computationally intensive activity)\nwhich components and characteristics would you expect to have impact on system usability:\nCPU cores - CPU speed - Available system memory - Storage system - GPU - Video display", "answer": "If you are primarily running video editing applications (a computationally intensive activity)\nwhich components and characteristics would you expect to have impact on system usability:\nCPU cores\nYes. Multiple cores support the concurrent presentation and rendering tasks required by\nvideo editing.\nCPU speed\nYes. Video rendering requires a significant amount of computational activity.\nAvailable system memory\nLikely. The uncompressed video used in editing is large. General purpose systems often\ncome with 8 gigabytes of memory. 16 or even 32 gigabytes of memory allows the system to\nhandle more frames of uncompressed video making editing activities more efficient.\nStorage system\nYes. Video files are large. The overhead of local SSD drives supports more efficient transfer.\nSlower network drives are likely to be counterproductive.\nGPU\nNo. GPU primarily impacts the presentation of the rendered video.\nVideo display\nNo. The video display primarily impacts the presentation of the rendered video.", "difficulty": "intermediate"}, {"question": "What would you expect the name of the device file in /dev to be for partition 3 of the third\nSATA drive in a system:\nsd3p3\nsdcp3\nsdc3\n\nExplorational Exercises", "answer": "What would you expect the name of the device file in /dev to be for partition 3 of the third\nSATA drive in a system:\nsd3p3 Not correct. Drive 3 would be sdc not sd3\nsdcp3 Not correct. Partition 3 would be 3 not p3\nsdc3 Correct", "difficulty": "intermediate"}, {"question": "Run the lsblk command on your system. Identify the parameters below. If a system is not\nimmediately available, consider the lsblk -f  listing for the Raspberry Pi system mentioned in\nthe “Storage” section above:\n$ lsblk -f\nNAME        FSTYPE LABEL  UUID                                 MOUNTPOINT\nmmcblk0\n+-mmcblk0p1 vfat   boot   9304-D9FD                            /boot\n+-mmcblk0p2 ext4   rootfs 29075e46-f0d4-44e2-a9e7-55ac02d6e6cc /\n◦The type of devices and how many\n◦The partition structure of each device\n◦The type of file system and mount for each partition", "answer": "Describe these terms:\nProcessor\nA general term that applies to any type of processor. Often used incorrectly as a synonym for\nCPU.\nCPU\nA Central Processing Unit. A processing unit providing support for general purpose\ncomputational tasks.\nGPU\nA Graphical Processing Unit. A processing unit optimized for supporting activities relating to\nthe presentation of graphics.", "difficulty": "intermediate"}], "explanations": ["Answers to Explorational Exercises\n1.Retrieve the current kernel release of your Linux system if you have access to the command\nline.\n$ uname -r\n4.15.0-47-generic\n2.Using your preferred search engine locate and identify public cloud providers available to you.\nThese could include AWS, Google Cloud, Rackspace and many more. Choose one and see which\noperating systems are available to deploy.\nAWS, as an example, allows you to deploy many Linux distributions such as Debian, Red Hat,\nSUSE or Ubuntu as well as Windows."], "summary": "Summary\nA system is the sum of its components. Different components impact cost, performance, and\nusability in different ways. While there are common configurations for workstations and servers\nthere is no single best configuration.", "lesson_excerpt": "Answers to Explorational Exercises\n1.Retrieve the current kernel release of your Linux system if you have access to the command\nline.\n$ uname -r\n4.15.0-47-generic\n2.Using your preferred search engine locate and identify public cloud providers available to you.\nThese could include AWS, Google Cloud, Rackspace and many more. Choose one and see which\noperating systems are available to deploy.\nAWS, as an example, allows you to deploy many Linux distributions such as Debian, Red Hat,\nSUSE or Ubuntu as well as Windows.\n\n4.2 Understanding Computer Hardware\nReference to LPI objectives\nLinux Essentials version 1.6, Exam 010, Objective 4.2\nWeight\n2\nKey Knowledge Areas\n•Hardware\nPartial list of the used files, terms and utilities\n•Motherboards, processors, power supplies, optical drives, peripherals\n•Hard drives, solid state disks and partitions, /dev/sd*\n•Drivers\n\n      \n4.2 Lesson 1\nCertificate: Linux Essentials\nVersion: 1.6\nTopic: 4 The Linux Operating System\nObjective: 4.2 Understanding Computer Hardware\nLesson: 1 of 1\nIntroduction\nWithout hardware, software is nothing more than another form of literature. Hardware processes\nthe commands described by the software and provides mechanisms for storage, input, and output.\nEven the cloud is ultimately backed by hardware.\nAs an operating system, one of Linux' responsibilities is providing software with interfaces to\naccess a system’s hardware. Most configuration specifics are beyond the scope of this lesson.\nHowever, users are often concerned with the performance, capacity, and other factors of system\nhardware since they impact the ability of a system to adequately support specific applications.\nThis lesson discusses hardware as separate physical items using standard connectors and\ninterfaces. The standards are relatively static. But the form factor, performance, and capacity\ncharacteristics of hardware are constantly evolving. Regardless of how changes may blur physical\ndistinctions the conceptual aspects of hardware described in this lesson still apply.\nNOTEAt various points within this lesson command line examples are used to\ndemonstrate ways to access information about hardware. Most examples are from\na Raspberry Pi B+ but should apply to most systems. Understanding these\ncommands is not required to understand this material.\n\nPower Supplies\nAll of the active components in a computer system require electricity to operate. Unfortunately,\nmost sources of electricity are not appropriate. Computer system hardware requires specific\nvoltages with relatively tight tolerances. Which is not what is available from your local wall outlet.\nPower supplies normalize available sources of power. Standard voltage requirements allow\nmanufacturers to create hardware components that can be used in systems anywhere in the\nworld. Desktop power supplies tend to use the electricity from wall outlets as a source. Server\npower supplies tend to be more critical so they can often connect to multiple sources to assure\nthat they contin", "full_lesson": "Answers to Explorational Exercises\n1.Retrieve the current kernel release of your Linux system if you have access to the command\nline.\n$ uname -r\n4.15.0-47-generic\n2.Using your preferred search engine locate and identify public cloud providers available to you.\nThese could include AWS, Google Cloud, Rackspace and many more. Choose one and see which\noperating systems are available to deploy.\nAWS, as an example, allows you to deploy many Linux distributions such as Debian, Red Hat,\nSUSE or Ubuntu as well as Windows.\n\n4.2 Understanding Computer Hardware\nReference to LPI objectives\nLinux Essentials version 1.6, Exam 010, Objective 4.2\nWeight\n2\nKey Knowledge Areas\n•Hardware\nPartial list of the used files, terms and utilities\n•Motherboards, processors, power supplies, optical drives, peripherals\n•Hard drives, solid state disks and partitions, /dev/sd*\n•Drivers\n\n      \n4.2 Lesson 1\nCertificate: Linux Essentials\nVersion: 1.6\nTopic: 4 The Linux Operating System\nObjective: 4.2 Understanding Computer Hardware\nLesson: 1 of 1\nIntroduction\nWithout hardware, software is nothing more than another form of literature. Hardware processes\nthe commands described by the software and provides mechanisms for storage, input, and output.\nEven the cloud is ultimately backed by hardware.\nAs an operating system, one of Linux' responsibilities is providing software with interfaces to\naccess a system’s hardware. Most configuration specifics are beyond the scope of this lesson.\nHowever, users are often concerned with the performance, capacity, and other factors of system\nhardware since they impact the ability of a system to adequately support specific applications.\nThis lesson discusses hardware as separate physical items using standard connectors and\ninterfaces. The standards are relatively static. But the form factor, performance, and capacity\ncharacteristics of hardware are constantly evolving. Regardless of how changes may blur physical\ndistinctions the conceptual aspects of hardware described in this lesson still apply.\nNOTEAt various points within this lesson command line examples are used to\ndemonstrate ways to access information about hardware. Most examples are from\na Raspberry Pi B+ but should apply to most systems. Understanding these\ncommands is not required to understand this material.\n\nPower Supplies\nAll of the active components in a computer system require electricity to operate. Unfortunately,\nmost sources of electricity are not appropriate. Computer system hardware requires specific\nvoltages with relatively tight tolerances. Which is not what is available from your local wall outlet.\nPower supplies normalize available sources of power. Standard voltage requirements allow\nmanufacturers to create hardware components that can be used in systems anywhere in the\nworld. Desktop power supplies tend to use the electricity from wall outlets as a source. Server\npower supplies tend to be more critical so they can often connect to multiple sources to assure\nthat they continue operating if one source fails.\nConsuming power generates heat. Excessive heat can cause system components to operate slowly\nor even fail. Most systems have some form of fan to move air for more efficient cooling.\nComponents such as processors often generate heat that air flow alone cannot dissipate. These hot\ncomponents attach special fins known as heat sinks to help dissipate the heat they generate. Heat\nsinks often have their own small local fan to ensure adequate air flow.\nMotherboard\nAll of a system’s hardware needs to interconnect. A motherboard normalizes that interconnection\nusing standardized connectors and form factors. It also provides support for the configuration\nand electrical needs of those connectors.\nThere are a large number of motherboard configurations. They support different processors and\nmemory systems. They have different combinations of standardized connectors. And they adapt to\nthe different sizes of the packaging that contains them. Except perhaps for the ability to connect\nspecific external devices, motherboard configuration is effectively transparent to users.\nAdministrators are mostly exposed to motherboard configuration when there is a need to identify\nspecific devices.\nWhen power is first applied there is motherboard specific hardware that must be configured and\ninitialized before the system can operate. Motherboards use programming stored in nonvolatile\nmemory known as firmware to deal with motherboard specific hardware. The original form of\nmotherboard firmware was known as BIOS ( Basic Input/Output System ). Beyond basic\nconfiguration settings BIOS was mostly responsible for identifying, loading, and transferring\noperation to an operating system such as Linux. As hardware evolved, firmware expanded to\nsupport larger disks, diagnostics, graphical interfaces, networking, and other advanced\ncapabilities independent of any loaded operating system. Early attempts to advance firmware\nbeyond basic BIOS was often specific to a motherboard"}, "4.3": {"title": "Where Data is Stored", "topic": "The Linux Operating System", "topic_num": "4", "concepts": [{"term": "Configuration data on Linux", "definition": "Configuration data on Linux is traditionally stored in text files too, although there are various"}, {"term": "Some of these dotfiles", "definition": "Some of these dotfiles are Bash scripts that customize the user’s shell session and are sourced as"}, {"term": "Linux kernel", "definition": "Linux kernel is in charge of allocating resources to them (keyboard, mouse, disks, memory,"}, {"term": "TIPBecause it", "definition": "TIPBecause it is a critical feature of the operating system, more than one kernel and its"}, {"term": "These device files", "definition": "These device files are used as an interface between the devices and the processes using them."}, {"term": "Are those in which data", "definition": "Are those in which data is read and written in blocks which can be individually addressed."}, {"term": "Are those in which data", "definition": "Are those in which data is read and written sequentially one character at a time. Examples"}, {"term": "Notice how the first character", "definition": "Notice how the first character is b for block devices and c for character devices."}, {"term": "Because logs", "definition": "Because logs are data that varies over time, they are normally found in /var/log ."}, {"term": "Most log files", "definition": "Most log ance, to search for boot messages:"}], "qa_pairs": [{"question": "Use the which command to find out the location of the following programs and complete the\ntable:\nProgram which command Path to Executable\n(output)User needs root\nprivileges?\nswapon\nkill\ncut\nusermod\ncron\nps", "answer": "Use the which command to find out the location of the following programs and complete the\ntable:\nProgram which command Path to Binary\n(output)User needs root\nprivileges?\nswapon which swapon /sbin/swapon Yes\nkill which kill /bin/kill No\ncut which cut /usr/bin/cut No\nusermod which usermod /usr/sbin/usermod Yes\ncron which cron /usr/sbin/cron Yes\nps which ps /bin/ps No", "difficulty": "intermediate"}, {"question": "Where are the following files to be found?\nFile /etc ~\n.bashrc\nbash.bashrc\npasswd\n.profile\nresolv.conf\nsysctl.conf", "answer": "Where are the following files to be found?\nFile /etc ~\n.bashrc X\nbash.bashrc X\npasswd X\n.profile X\nresolv.conf X\nsysctl.conf X", "difficulty": "basic"}, {"question": "Explain the meaning of the number elements for kernel file vmlinuz-4.15.0-50-generic \nfound in /boot:\nNumber Element Meaning\n4\n15\n0\n50", "answer": "Explain the meaning of the number elements for kernel file vmlinuz-4.15.0-50-generic \nfound in /boot:\nNumber Element Meaning\n4 Kernel version\n15 Major revision\n0 Minor revision\n50 Patch number", "difficulty": "advanced"}, {"question": "What command would you use to list all hard drives and partitions in /dev?\n\n      \n\nGuided Exercises", "answer": "What command would you use to list all hard drives and partitions in /dev?\n\nls /dev/sd*\n\n      \nAnswers to Guided Exercises", "difficulty": "intermediate"}, {"question": "Have a look at the following listing of top and answer the following questions:\ncarol@debian:~$ top\ntop - 13:39:16 up 31 min,  1 user,  load average: 0.12, 0.15, 0.10\nTasks:  73 total,   2 running,  71 sleeping,   0 stopped,   0 zombie\n%Cpu(s):  1.1 us,  0.4 sy,  0.0 ni, 98.6 rc X\npasswd X\n.profile X\nresolv.conf X\nsysctl.conf X", "difficulty": "intermediate"}, {"question": "In combination with grep, what commands would you use to find out the following\ninformation about your Linux system?\n◦When the system was last rebooted ( wtmp)\n◦Which hard disks are installed ( kern.log )\n◦When the last login occurred ( auth.log )", "answer": "Explain the meaning of the number elements for kernel file vmlinuz-4.15.0-50-generic \nfound in /boot:\nNumber Element Meaning\n4 Kernel version\n15 Major revision\n0 Minor revision\n50 Patch number", "difficulty": "intermediate"}, {"question": "What two commands would you use to have the kernel ring buffer displayed?", "answer": "What command would you use to list all hard drives and partitions in /dev?\n\nls /dev/sd*\n\n      \nAnswers to Guided Exercises", "difficulty": "basic"}, {"question": "Indicate where the following log messages belong:\n◦Jul 10 13:37:39 debian dbus[303]: [system] Successfully activated service\n'org.freedesktop.nm_dispatcher'\n/var/log/auth.log\n/var/log/kern.log\n/var/log/syslog\n/var/log/messages", "answer": "Indicate where the following log messages belong:\n◦Jul 10 13:37:39 debian dbus[303]: [system] Successfully activated service\n'org.freedesktop.nm_dispatcher'\n/var/log/auth.log", "difficulty": "basic"}], "explanations": ["Other interesting options for journalctl  include:\n-b, --boot\nIt shows boot information.\n-u\nIt shows messages about a specified unit. Roughly, a unit can be defined as any resource\nhandled by systemd. For example journalctl -u apache2.service  is used to read\nmessages about the apache2 web server.\n-f\nIt shows most recent journal messages and keeps printing new entries as they are appended to\nthe journal — much like tail -f."], "summary": "cat\nConcatenate/print file content.\nfree\nDisplay amount of free and used memory in the system.\nls\nList directory contents.\nwhich\nShow location of program.\n\n      \ncat\nConcatenate/print file content.\ndmesg\nPrint the kernel ring buffer.\necho\nDisplay a line of text or a newline.\nfile\nDetermine file type.\ngrep\nPrint lines matching a pattern.\nlast\nShow a listing of last logged in users.\nless\nDisplay contents of file one page at a time.\nls\nList directory contents.\njournalctl\nQuery the systemd journal.\ntail\nDisplay the last lines of a file.", "lesson_excerpt": "4.3 Where Data is Stored\nReference to LPI objectives\nLinux Essentials version 1.6, Exam 010, Objective 4.3\nWeight\n3\nKey knowledge areas\n•Programs and configuration\n•Processes\n•Memory addresses\n•System messaging\n•Logging\nPartial list of the used files, terms and utilities\n•ps, top, free\n•syslog, dmesg\n•/etc/, /var/log/\n•/boot/, /proc/, /dev/, /sys/\n\n4.3 Lesson 1\nCertificate: Linux Essentials\nVersion: 1.6\nTopic: 4 The Linux Operating System\nObjective: 4.3 Where Data is Stored\nLesson: 1 of 2\nIntroduction\nFor an operating system, everything is considered data. For Linux, everything is considered a file:\nprograms, regular files, directories, block devices (hard disks, etc.), character devices (consoles,\netc.), kernel processes, sockets, partitions, links, etc. The Linux directory structure, starting from\nthe root  /, is a collection of files containing data. The fact that everything is a file is a powerful\nfeature of Linux as it allows for tweaking virtually every single aspect of the system.\nIn this lesson we will be discussing the different locations in which important data is stored as\nestablished by the Linux Filesystem Hierarchy Standard (FHS) . Some of these locations are real\ndirectories which store data persistently on disks, whereas others are pseudo filesystems loaded\nin memory which give us access to kernel subsystem data such as running processes, use of\nmemory, hardware configuration and so on. The data stored in these virtual directories is used by\na number of commands that allow us to monitor and handle it.\nPrograms and their Configuration\nImportant data on a Linux system are — no doubt — its programs and their configuration files.\nThe former are executable files containing sets of instructions to be run by the computer’s\n\n      \nprocessor, whereas the latter are usually text documents that control the operation of a program.\nExecutable files can be either binary files or text files. Executable text files are called scripts.\nConfiguration data on Linux is traditionally stored in text files too, although there are various\nstyles of representing configuration data.\nWhere Binary Files are Stored\nLike any other file, executable files live in directories hanging ultimately from /. More specifically,\nprograms are distributed across a three-tier structure: the first tier ( /) includes programs that can\nbe necessary in single-user mode, the second tier ( /usr) contains most multi-user programs and\nthe third tier ( /usr/local ) is used to store software that is not provided by the distribution and\nhas been compiled locally.\nTypical locations for programs include:\n/sbin\nIt contains essential binaries for system administration such as parted or ip.\n/bin\nIt contains essential binaries for all users such as ls, mv, or mkdir.\n/usr/sbin\nIt stores binaries for system administration such as deluser, or groupadd .\n/usr/bin\nIt includes most executable files — such as free, pstree, sudo or man — that can be used by all\nusers.\n/usr/local/sbin\nIt is used to ", "full_lesson": "4.3 Where Data is Stored\nReference to LPI objectives\nLinux Essentials version 1.6, Exam 010, Objective 4.3\nWeight\n3\nKey knowledge areas\n•Programs and configuration\n•Processes\n•Memory addresses\n•System messaging\n•Logging\nPartial list of the used files, terms and utilities\n•ps, top, free\n•syslog, dmesg\n•/etc/, /var/log/\n•/boot/, /proc/, /dev/, /sys/\n\n4.3 Lesson 1\nCertificate: Linux Essentials\nVersion: 1.6\nTopic: 4 The Linux Operating System\nObjective: 4.3 Where Data is Stored\nLesson: 1 of 2\nIntroduction\nFor an operating system, everything is considered data. For Linux, everything is considered a file:\nprograms, regular files, directories, block devices (hard disks, etc.), character devices (consoles,\netc.), kernel processes, sockets, partitions, links, etc. The Linux directory structure, starting from\nthe root  /, is a collection of files containing data. The fact that everything is a file is a powerful\nfeature of Linux as it allows for tweaking virtually every single aspect of the system.\nIn this lesson we will be discussing the different locations in which important data is stored as\nestablished by the Linux Filesystem Hierarchy Standard (FHS) . Some of these locations are real\ndirectories which store data persistently on disks, whereas others are pseudo filesystems loaded\nin memory which give us access to kernel subsystem data such as running processes, use of\nmemory, hardware configuration and so on. The data stored in these virtual directories is used by\na number of commands that allow us to monitor and handle it.\nPrograms and their Configuration\nImportant data on a Linux system are — no doubt — its programs and their configuration files.\nThe former are executable files containing sets of instructions to be run by the computer’s\n\n      \nprocessor, whereas the latter are usually text documents that control the operation of a program.\nExecutable files can be either binary files or text files. Executable text files are called scripts.\nConfiguration data on Linux is traditionally stored in text files too, although there are various\nstyles of representing configuration data.\nWhere Binary Files are Stored\nLike any other file, executable files live in directories hanging ultimately from /. More specifically,\nprograms are distributed across a three-tier structure: the first tier ( /) includes programs that can\nbe necessary in single-user mode, the second tier ( /usr) contains most multi-user programs and\nthe third tier ( /usr/local ) is used to store software that is not provided by the distribution and\nhas been compiled locally.\nTypical locations for programs include:\n/sbin\nIt contains essential binaries for system administration such as parted or ip.\n/bin\nIt contains essential binaries for all users such as ls, mv, or mkdir.\n/usr/sbin\nIt stores binaries for system administration such as deluser, or groupadd .\n/usr/bin\nIt includes most executable files — such as free, pstree, sudo or man — that can be used by all\nusers.\n/usr/local/sbin\nIt is used to store locally installed programs for system administration that are not managed by\nthe system’s package manager.\n/usr/local/bin\nIt serves the same purpose as /usr/local/sbin  but for regular user programs.\nRecently some distributions started to replace /bin and /sbin with symbolic links to /usr/bin \nand /usr/sbin .\nNOTE The /opt directory is sometimes used to store optional third-party applications.\nApart from these directories, regular users can have their own programs in either:\n\n•/home/$USER/bin\n•/home/$USER/.local/bin\nTIPYou can find out what directories are available for you to run binaries from by\nreferencing the PATH variable with echo $PATH . For more information on PATH,\nreview the lessons on variables and shell customization.\nWe can find the location of programs with the which command:\n$ which git\n/usr/bin/git\nWhere Configuration Files are Stored\nThe /etc Directory\nIn the early days of Unix there was a folder for each type of data, such as /bin for binaries and\n/boot for the kernel(s). However, /etc (meaning et cetera ) was created as a catch-all directory to\nstore any files that did not belong in the other categories. Most of these files were configuration\nfiles. With the passing of time more and more configuration files were added so /etc became the\nmain folder for configuration files of programs. As said above, a configuration file usually is a\nlocal, plain text (as opposed to binary) file which controls the operation of a program.\nIn /etc we can find different patterns for config files names:\n•Files with an ad hoc  extension or no extension at all, for example\ngroup\nSystem group database.\nhostname\nName of the host computer.\nhosts\nList of IP addresses and their hostname translations.\npasswd\nSystem user database — made up of seven fields separated by colons providing information\nabout the user.\n\n      \nprofile\nSystem-wide configuration file for Bash.\nshadow\nEncrypted file for user passwords.\n•Initialization files ending in rc:\nbash.bashrc\nSystem-wide .ba"}, "4.4": {"title": "Your Computer on the Network", "topic": "The Linux Operating System", "topic_num": "4", "concepts": [{"term": "Bash process", "definition": "Bash process is replaced by /bin/sh (instead of /bin/sh becoming a child process):"}, {"term": "Each link", "definition": "Each link is connected with an interface of a device. Each device can have multiple interfaces and"}, {"term": "Otherwise the packet", "definition": "Otherwise the packet is dropped. The exception to this rule is broadcast packets  (a packet sent to"}, {"term": "NOTEA protocol", "definition": "NOTEA protocol  is a set of procedures of doing something so that all parties following the"}, {"term": "In practice the netmask", "definition": "In practice the netmask is written in the decimal notation:"}, {"term": "This", "definition": "This means that this network ranges from 192.168.0.0  to 192.168.0.255 . Note that the first"}, {"term": "One of these use cases", "definition": "One of these use cases are private address assignments. The following subnets are reserved for"}, {"term": "There", "definition": "There are two main ways to configure IPv4 addresses on a computer. Either by assigning"}, {"term": "Routing", "definition": "Routing is the process in which a packet gets from the source network to the destination network."}, {"term": "There", "definition": "There are three major prefix types in IPv6:"}, {"term": "Wherein the prefix          0", "answer": "The following output is generated by the command from the previous exercise. How many TCP\nand UDP sockets are active?\nTotal: 978 (kernel 0)\nTCP:   4 (estab 0, closed 0, orphaned 0, synrecv 0, timewait 0/0), ports 0\nTransport Total     IP        IPv6\n*     0         -         -\nRAW   1         0         1\n\nUDP   7         5         2\nTCP   4         3         1\nINET      12        8         4\nFRAG      0         0         0\n11 TCP and UDP sockets are active.", "difficulty": "basic"}], "explanations": ["When the resolver performs a name lookup, it first checks the /etc/hosts  file to see if it contains\nan address for the requested name. If it does, it returns that address and does not contact the DNS.\nThis allows network administrators to provide name resolution without having to go through the\neffort of configuration a complete DNS server. Each line in that file contains one IP address\nfollowed by one or more names:\n127.0.0.1          localhost.localdomain   localhost\n::1                localhost.localdomain   localhost\n192.168.0.10       server\n2001:db8:0:abcd::f server\nTo perform a lookup in the DNS, use the command host:\n$ host"], "summary": "Summary\nThis topic covers networking your Linux computer. First we learned about the various levels of\nnetworking:\n•The link layer which connects devices directly.\n•The networking layer which provides routing between networks and a global address space.\n•The application layer where applications connect to each other.\nWe have seen how IPv4 and IPv6 are used to address individual computers, and how TCP and UDP\nenumerate sockets used by applications to connect to each other. We also learned how DNS is\nused to resolve names to IP addresses.\nCommands used in the exercises:\ndig\nQuery DNS information and provide verbose information about the DNS queries and\nresponses.\nhost\nQuery DNS information and provide condensed output.\nip\nConfigure networking on Linux, including network interfaces, addresses and routing.\nping\nTest the connectivity to a remote device.\nss\nShow information regarding sockets.", "lesson_excerpt": "Answers to Explorational Exercises\n1.Reconsider the top output from the guided exercises and answer the following questions:\n◦What two steps would you follow to kill the apache  web server?\nFirst, press k; then provide a kill value.\n◦In the summary area, how could you display the information about physical memory and\nswap using progress bars?\nBy pressing m once or twice.\n◦Now, sort the processes by memory usage:\nM\n◦Now that you have memory information displayed in progress bars and processes sorted by\nmemory usage, save these configurations so that you get them as default next time you use\ntop:\nW\n◦What file stores top’s configuration settings? Where does it live? How can you check for its\nexistence?\nThe file is ~/.config/procps/toprc  and lives in the user’s home directory ( ~). Since it is a\nhidden file (it resides in a directory whose name starts with a dot), we can check for its\nexistence with ls -a (list all files). This file can be generated by pressing Shift + W while in\ntop.\n2.Learn about the command exec in Bash. Try to demonstrate its functionality by starting a Bash\nsession, finding the Bash process with ps, then run exec /bin/sh  and search for the process\nwith the same PID again.\nexec replaces a process with another command. In the following example we can see that the\nBash process is replaced by /bin/sh (instead of /bin/sh becoming a child process):\n$ echo $$\n19877\n$ ps auxf | grep 19877 | head -1\ncarol  19877  0.0  0.0   7448  3984 pts/25   Ss   21:17   0:00  \\_ bash\n$ exec /bin/sh\n\n      \nsh-5.0$ ps auxf | grep 19877 | head -1\ncarol  19877  0.0  0.0   7448  3896 pts/25   Ss   21:17   0:00  \\_ /bin/sh\n3.Follow these steps to explore kernel events and udev’s dynamic management of devices:\n◦Hotplug a USB drive into your computer. Run dmesg and pay attention to the last lines. What\nis the most recent line?\nYou should get something along the lines of [ 1967.700468] sd 6:0:0:0: [sdb]\nAttached SCSI removable disk .\n◦Bearing in mind the output from the previous command, run ls /dev/sd*  and make sure\nyour USB drive appears in the listing. What is the output?\nDepending on the number of devices connected to your system, you should get something\nlike /dev/sda /dev/sda1 /dev/sdb /dev/sdb1 /dev/sdb2 . In our case, we find our\nUSB drive ( /dev/sdb ) and its two partitions ( /dev/sdb1  and /dev/sdb2 ).\n◦Now remove the USB drive and run dmesg again. How does the most recent line read?\nYou should get something along the lines of [ 2458.881695] usb 1-9: USB\ndisconnect, device number 6 .\n◦Run ls /dev/sd*  again and make sure your device disappeared from the listing. What is\nthe output?\nIn our case, /dev/sda /dev/sda1 .\n\n4.4 Your Computer on the Network\nReference to LPI objectives\nLinux Essentials version 1.6, Exam 010, Objective 4.4\nWeight\n2\nKey knowledge areas\n•Internet, network, routers\n•Querying DNS client configuration\n•Querying network configuration\nPartial list of the used files, terms and utilities\n•route, ip route show\n•ifconfig , ip addr sho", "full_lesson": "Answers to Explorational Exercises\n1.Reconsider the top output from the guided exercises and answer the following questions:\n◦What two steps would you follow to kill the apache  web server?\nFirst, press k; then provide a kill value.\n◦In the summary area, how could you display the information about physical memory and\nswap using progress bars?\nBy pressing m once or twice.\n◦Now, sort the processes by memory usage:\nM\n◦Now that you have memory information displayed in progress bars and processes sorted by\nmemory usage, save these configurations so that you get them as default next time you use\ntop:\nW\n◦What file stores top’s configuration settings? Where does it live? How can you check for its\nexistence?\nThe file is ~/.config/procps/toprc  and lives in the user’s home directory ( ~). Since it is a\nhidden file (it resides in a directory whose name starts with a dot), we can check for its\nexistence with ls -a (list all files). This file can be generated by pressing Shift + W while in\ntop.\n2.Learn about the command exec in Bash. Try to demonstrate its functionality by starting a Bash\nsession, finding the Bash process with ps, then run exec /bin/sh  and search for the process\nwith the same PID again.\nexec replaces a process with another command. In the following example we can see that the\nBash process is replaced by /bin/sh (instead of /bin/sh becoming a child process):\n$ echo $$\n19877\n$ ps auxf | grep 19877 | head -1\ncarol  19877  0.0  0.0   7448  3984 pts/25   Ss   21:17   0:00  \\_ bash\n$ exec /bin/sh\n\n      \nsh-5.0$ ps auxf | grep 19877 | head -1\ncarol  19877  0.0  0.0   7448  3896 pts/25   Ss   21:17   0:00  \\_ /bin/sh\n3.Follow these steps to explore kernel events and udev’s dynamic management of devices:\n◦Hotplug a USB drive into your computer. Run dmesg and pay attention to the last lines. What\nis the most recent line?\nYou should get something along the lines of [ 1967.700468] sd 6:0:0:0: [sdb]\nAttached SCSI removable disk .\n◦Bearing in mind the output from the previous command, run ls /dev/sd*  and make sure\nyour USB drive appears in the listing. What is the output?\nDepending on the number of devices connected to your system, you should get something\nlike /dev/sda /dev/sda1 /dev/sdb /dev/sdb1 /dev/sdb2 . In our case, we find our\nUSB drive ( /dev/sdb ) and its two partitions ( /dev/sdb1  and /dev/sdb2 ).\n◦Now remove the USB drive and run dmesg again. How does the most recent line read?\nYou should get something along the lines of [ 2458.881695] usb 1-9: USB\ndisconnect, device number 6 .\n◦Run ls /dev/sd*  again and make sure your device disappeared from the listing. What is\nthe output?\nIn our case, /dev/sda /dev/sda1 .\n\n4.4 Your Computer on the Network\nReference to LPI objectives\nLinux Essentials version 1.6, Exam 010, Objective 4.4\nWeight\n2\nKey knowledge areas\n•Internet, network, routers\n•Querying DNS client configuration\n•Querying network configuration\nPartial list of the used files, terms and utilities\n•route, ip route show\n•ifconfig , ip addr show\n•netstat, ss\n•/etc/resolv.conf , /etc/hosts\n•IPv4, IPv6\n•ping\n•host\n\n      \n4.4 Lesson 1\nCertificate: Linux Essentials\nVersion: 1.6\nTopic: 4 The Linux Operating System\nObjective: 4.4 Your Computer on the Network\nLesson: 1 of 1\nIntroduction\nIn today’s world, computing devices of any kind exchange information through networks. At the\nvery heart of the concept of computer networks are the physical connections between a device\nand its peer(s). These connections are called links , and they are the most basic connection between\ntwo different devices. Links can be established through various media, such as copper cables,\noptical fibres, radio waves or lasers.\nEach link is connected with an interface of a device. Each device can have multiple interfaces and\nthus be connected to multiple links. Through these links computers can form a network; a small\ncommunity of devices that can directly connect to each other. There are numerous examples of\nsuch networks in the world. To be able to communicate beyond the scope of a link layer network,\ndevices use routers. Think of link layer networks as islands connected by routers which connect\nthe islands — just like bridges which information has to travel to reach a device which is part of a\nremote island.\nThis model leads to several different layers of networking:\n\nLink Layer\nHandles the communication between directly connected devices.\nNetwork Layer\nHandles routing outside of individual networks and the unique addressing of devices beyond a\nsingle link layer network.\nApplication Layer\nEnables individual programs to connect to each other.\nWhen first invented, computer networks used the same methods of communication as telephones\nin that they were circuit switched. This means that a dedicated and direct link had to be formed\nbetween two nodes for them to be able to communicate. This method worked well, however, it\nrequired all the space on a given link for only two hosts to communicate.\nEventually computer networks moved over to somet"}, "5.1": {"title": "Basic Security and Identifying User Types", "topic": "Security and File Permissions", "topic_num": "5", "concepts": [{"term": "Basic security in Linux systems", "definition": "Basic security in Linux systems is modeled after Unix access controls that, despite being nearly"}, {"term": "On Linux the superuser account", "definition": "On Linux the superuser account is root, which always has UID 0. The superuser is sometimes"}, {"term": "All accounts other than root", "definition": "All accounts other than root are technically regular user accounts, but on a Linux system the"}, {"term": "System accounts", "definition": "System accounts  are typically pre-created at system installation time. These are for facilities,"}, {"term": "Service accounts", "definition": "Service accounts  are typically created when services are installed and configured. Similar to"}, {"term": "Listing basic user information", "definition": "Listing basic user information is a common, everyday practice on a Linux system. In some cases,"}, {"term": "Sharing passwords", "definition": "Sharing passwords is a very bad security practice, so there should be very few, if any, need for the"}, {"term": "What", "definition": "What is the biggest issue with using su to switch to the superuser ( root)? If a regular user’s"}, {"term": "This", "definition": "This is where user passwords are stored. They are hashed, for security."}, {"term": "WARNINGThese files", "definition": "WARNINGThese files are not designed to and should never be edited directly. This lesson"}, {"term": "There", "definition": "There are also files involved with basic privilege escalation
