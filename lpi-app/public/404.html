<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Redirecting...</title>
<script>
  // Redirect all 404s to index.html for SPA routing
  var path = window.location.pathname;
  window.location.replace('/lpi-study-app/' + '?p=' + encodeURIComponent(path));
</script>
</head>

</html>
